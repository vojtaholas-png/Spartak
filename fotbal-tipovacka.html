<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MS Fotbal 2026 \u2013 Tipovačka</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Nunito:wght@400;600;700;800;900&family=Teko:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --grass:#0a4a1a;--grass2:#0d5c20;--grass3:#116b26;
  --pitch:#1a7a30;--line:rgba(255,255,255,0.15);
  --gold:#f7c948;--gold2:#e0a800;
  --red:#e63946;--green:#2dc653;--dim:#7aab8a;
  --surface:rgba(0,0,0,0.35);--surface2:rgba(0,0,0,0.5);
  --white:#ffffff;--text:#e8f5eb;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:var(--grass);color:var(--text);
  font-family:'Nunito',sans-serif;font-weight:600;
  min-height:100vh;overflow-x:hidden;
}

/* ── PITCH BACKGROUND ── */
body::before{
  content:'';position:fixed;inset:0;z-index:0;
  background:
    repeating-linear-gradient(
      180deg,
      rgba(0,0,0,0.08) 0px, rgba(0,0,0,0.08) 60px,
      transparent 60px, transparent 120px
    ),
    linear-gradient(160deg,#0a4a1a 0%,#0d5c20 40%,#0a4a1a 100%);
}
body>*{position:relative;z-index:1;}

/* ── HEADER ── */
.header{
  position:relative;overflow:hidden;
  background:linear-gradient(180deg,rgba(0,0,0,0.7) 0%,rgba(0,0,0,0.4) 100%);
  border-bottom:3px solid var(--gold);
  padding:0;text-align:center;
}
/* Pitch top arc */
.header-pitch{
  position:relative;padding:28px 20px 24px;
  background:
    radial-gradient(ellipse 100% 80% at 50% 130%, rgba(255,255,255,0.04) 0%, transparent 70%);
}
/* Center circle */
.header-pitch::before{
  content:'';position:absolute;
  width:140px;height:140px;border-radius:50%;
  border:2px solid rgba(255,255,255,0.07);
  bottom:-30px;left:50%;transform:translateX(-50%);
}
/* Center line */
.header-pitch::after{
  content:'';position:absolute;
  left:0;right:0;bottom:0;height:2px;
  background:rgba(255,255,255,0.06);
}
.header-badge{
  display:inline-block;
  background:var(--gold);color:#000;
  font-family:'Teko',sans-serif;font-weight:700;font-size:11px;
  letter-spacing:4px;text-transform:uppercase;
  padding:3px 16px;border-radius:2px;margin-bottom:10px;
}
.header h1{
  font-family:'Black Han Sans',sans-serif;
  font-size:clamp(40px,9vw,76px);
  letter-spacing:2px;line-height:.9;
  background:linear-gradient(160deg,#fff 0%,var(--gold) 60%,#ff9500 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  filter:drop-shadow(0 0 30px rgba(247,201,72,.3));
}
.header-sub{
  font-family:'Teko',sans-serif;font-weight:400;
  font-size:13px;letter-spacing:5px;color:var(--dim);
  text-transform:uppercase;margin-top:6px;
}
.header-flags{
  display:flex;justify-content:center;gap:4px;
  margin-top:14px;font-size:20px;flex-wrap:wrap;opacity:.8;
}

/* ── SCORING BAR ── */
.scoring-bar{
  display:flex;justify-content:center;flex-wrap:wrap;
  background:rgba(0,0,0,0.4);border-bottom:1px solid rgba(247,201,72,.2);
}
.sc-item{
  padding:8px 16px;font-size:12px;color:var(--dim);font-weight:700;
  border-right:1px solid rgba(255,255,255,.05);white-space:nowrap;
  font-family:'Nunito';letter-spacing:.3px;
}
.sc-item:last-child{border-right:none;}
.sc-item b{font-family:'Teko';font-size:20px;color:var(--gold);margin-right:4px;vertical-align:middle;font-weight:700;}

/* ── LOGIN ── */
#login-screen{
  display:flex;flex-direction:column;align-items:center;
  padding:40px 16px 60px;min-height:60vh;
}
.login-h{
  font-family:'Black Han Sans';font-size:28px;letter-spacing:2px;
  color:var(--gold);margin-bottom:4px;
  text-shadow:0 0 20px rgba(247,201,72,.3);
}
.login-sub{color:var(--dim);font-size:13px;margin-bottom:28px;}
.player-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;max-width:520px;width:100%;}
@media(max-width:480px){.player-grid{grid-template-columns:repeat(2,1fr);}}
.player-btn{
  background:var(--surface);
  border:2px solid rgba(255,255,255,0.08);
  border-radius:14px;padding:18px 10px 14px;
  cursor:pointer;text-align:center;transition:all .2s;
  display:flex;flex-direction:column;align-items:center;gap:8px;
  backdrop-filter:blur(8px);
}
.player-btn:hover{border-color:var(--gold);background:rgba(247,201,72,.1);transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.4);}
.player-btn.no-pin{border-style:dashed;}
.avatar-wrap{width:52px;height:52px;border-radius:50%;overflow:hidden;flex-shrink:0;}
.avatar-wrap svg{width:100%;height:100%;}
.p-name{font-family:'Teko';font-weight:600;font-size:16px;letter-spacing:.5px;color:var(--white);}
.p-status{font-size:10px;color:var(--dim);font-weight:700;}

/* ── PIN OVERLAY ── */
.pin-overlay{position:fixed;inset:0;background:rgba(0,30,0,.88);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:900;padding:20px;}
.pin-box{
  background:rgba(10,50,20,.95);border:1px solid rgba(247,201,72,.2);
  border-radius:20px;padding:28px 24px;max-width:300px;width:100%;text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,.6);
}
.pin-who{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:16px;}
.pin-who-name{font-family:'Teko';font-weight:600;font-size:22px;color:var(--white);}
.pin-label{font-size:11px;color:var(--dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;font-weight:700;}
.pin-note{font-size:11px;color:var(--dim);line-height:1.5;margin-bottom:12px;}
.pin-dots{display:flex;justify-content:center;gap:10px;margin-bottom:16px;}
.pin-dot{width:13px;height:13px;border-radius:50%;border:2px solid var(--dim);background:transparent;transition:all .15s;}
.pin-dot.filled{background:var(--gold);border-color:var(--gold);box-shadow:0 0 8px rgba(247,201,72,.4);}
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.kbtn{
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);
  border-radius:10px;padding:14px;font-family:'Teko';font-weight:600;font-size:22px;
  color:var(--white);cursor:pointer;transition:all .12s;
}
.kbtn:hover{background:rgba(247,201,72,.15);border-color:rgba(247,201,72,.4);}
.kbtn:active{transform:scale(.92);}
.kbtn.sym{font-family:'Nunito';font-size:14px;font-weight:700;color:var(--dim);}
.kbtn.sym:hover{color:var(--white);}
.pin-err{color:var(--red);font-size:12px;font-weight:700;margin-top:8px;min-height:16px;}

/* ── USER BAR ── */
.user-bar{display:flex;align-items:center;gap:12px;background:rgba(0,0,0,.4);border-bottom:1px solid rgba(247,201,72,.15);padding:10px 16px;}
.ub-info{display:flex;align-items:center;gap:10px;flex:1;}
.ub-name{font-family:'Teko';font-weight:600;font-size:17px;letter-spacing:.5px;color:var(--white);}
.ub-sub{font-size:11px;color:var(--dim);font-weight:700;}
.logout-btn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:6px;color:var(--dim);font-size:12px;font-weight:700;padding:5px 12px;cursor:pointer;transition:all .18s;}
.logout-btn:hover{color:var(--white);border-color:rgba(255,255,255,.25);}

/* ── MAIN NAV ── */
.main-nav{display:flex;background:rgba(0,0,0,.5);border-bottom:2px solid rgba(255,255,255,.05);overflow-x:auto;scrollbar-width:none;}
.main-nav::-webkit-scrollbar{display:none;}
.nav-btn{flex:0 0 auto;padding:13px 22px;background:none;border:none;color:var(--dim);font-family:'Teko';font-weight:600;font-size:14px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;border-bottom:3px solid transparent;transition:all .15s;white-space:nowrap;}
.nav-btn:hover{color:var(--text);}
.nav-btn.active{color:var(--gold);border-bottom-color:var(--gold);}

/* ── CONTENT ── */
.content{max-width:900px;margin:0 auto;padding:18px 14px 40px;}
.inner-tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;}
.itab{background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.08);border-radius:6px;padding:6px 14px;font-family:'Teko';font-weight:600;font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--dim);cursor:pointer;transition:all .15s;}
.itab:hover{color:var(--text);}
.itab.active{background:rgba(247,201,72,.12);border-color:rgba(247,201,72,.4);color:var(--gold);}
.date-divider{font-family:'Teko';font-size:12px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--dim);padding:14px 0 6px;border-bottom:1px solid rgba(255,255,255,.06);margin-bottom:8px;}

/* ── MATCH CARD ── */
.match-card{margin-bottom:5px;}
.match-card .match-row{
  display:grid;grid-template-columns:88px 1fr auto 1fr 100px;
  align-items:stretch;
  background:var(--surface);border:1px solid rgba(255,255,255,.08);
  border-radius:10px 10px 0 0;overflow:hidden;transition:border-color .15s;min-height:52px;
  border-bottom:none;backdrop-filter:blur(4px);
}
.match-card:not(:has(.result-strip)):not(:has(.others-toggle)) .match-row{border-radius:10px;border-bottom:1px solid rgba(255,255,255,.08);}
.match-card.has-tip .match-row{border-left:3px solid rgba(45,198,83,.45);}
.match-card.locked .match-row{opacity:.7;}
.match-card .match-row:hover{border-color:rgba(255,255,255,.16);}
/* standalone row */
.match-row{display:grid;grid-template-columns:88px 1fr auto 1fr 100px;align-items:stretch;background:var(--surface);border:1px solid rgba(255,255,255,.08);border-radius:10px;overflow:hidden;min-height:52px;backdrop-filter:blur(4px);}

/* time */
.mr-time{display:flex;flex-direction:column;justify-content:center;align-items:center;padding:0 8px;border-right:1px solid rgba(255,255,255,.06);text-align:center;gap:2px;background:rgba(0,0,0,.2);}
.mr-date{font-size:10px;color:var(--dim);font-weight:700;}
.mr-clock{font-family:'Teko';font-weight:600;font-size:15px;letter-spacing:.3px;color:var(--text);}
.mr-lock{font-size:9px;font-weight:700;letter-spacing:.8px;}
.mr-lock.open{color:var(--green);}
.mr-lock.closed{color:var(--red);}

/* teams */
.mr-home{display:flex;align-items:center;gap:7px;padding:0 10px;justify-content:flex-end;}
.mr-away{display:flex;align-items:center;gap:7px;padding:0 10px;}
.t-flag{font-size:18px;line-height:1;flex-shrink:0;}
.t-name{font-family:'Teko';font-weight:600;font-size:14px;line-height:1.1;letter-spacing:.3px;color:var(--white);}
.t-name.right{text-align:right;}

/* score */
.mr-score{display:flex;align-items:center;gap:4px;padding:4px 8px;border-left:1px solid rgba(255,255,255,.06);border-right:1px solid rgba(255,255,255,.06);background:rgba(0,0,0,.25);}
.score-in{width:36px;height:34px;background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.12);border-radius:6px;color:var(--white);font-family:'Teko';font-weight:700;font-size:22px;text-align:center;padding:0;outline:none;-moz-appearance:textfield;transition:border-color .15s;}
.score-in::-webkit-inner-spin-button,.score-in::-webkit-outer-spin-button{-webkit-appearance:none;}
.score-in:focus{border-color:var(--gold);background:rgba(247,201,72,.08);}
.score-in:disabled{opacity:.35;cursor:not-allowed;}
.score-sep{font-family:'Teko';font-size:18px;color:var(--dim);font-weight:700;}
.score-static{font-family:'Teko';font-size:22px;color:var(--gold);min-width:36px;text-align:center;font-weight:700;}
.mr-result{display:flex;align-items:center;gap:3px;padding:4px 10px;border-left:1px solid rgba(255,255,255,.06);border-right:1px solid rgba(255,255,255,.06);background:rgba(247,201,72,.05);}
.res-num{font-family:'Teko';font-size:24px;color:var(--gold);font-weight:700;}
.res-sep{font-family:'Teko';font-size:18px;color:var(--dim);}

/* action */
.mr-action{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:5px 8px;gap:3px;border-left:1px solid rgba(255,255,255,.06);}
.save-btn{background:var(--gold);color:#000;border:none;border-radius:6px;padding:5px 10px;font-family:'Teko';font-weight:700;font-size:12px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .15s;white-space:nowrap;}
.save-btn:hover{background:var(--gold2);box-shadow:0 4px 12px rgba(247,201,72,.3);}
.tip-ok{font-size:10px;color:var(--green);font-weight:700;}
.pts-pill{font-size:9px;font-weight:700;padding:2px 5px;border-radius:3px;white-space:nowrap;}
.pts-exact{background:rgba(247,201,72,.2);color:var(--gold);}
.pts-win{background:rgba(45,198,83,.15);color:var(--green);}
.pts-zero{background:rgba(255,255,255,.06);color:var(--dim);}
.del-btn{background:rgba(230,57,70,.15);border:1px solid rgba(230,57,70,.3);border-radius:6px;color:var(--red);font-size:12px;font-weight:700;padding:3px 7px;cursor:pointer;transition:all .15s;}
.del-btn:hover{background:rgba(230,57,70,.3);}
.del-tip-btn{background:none;border:none;color:var(--dim);font-size:11px;font-weight:700;cursor:pointer;padding:2px 4px;transition:color .15s;}
.del-tip-btn:hover{color:var(--red);}

/* result strip */
.result-strip{
  padding:5px 14px 7px;display:flex;align-items:center;gap:8px;
  font-size:12px;color:var(--dim);font-weight:700;
  border:1px solid rgba(255,255,255,.08);border-top:none;border-radius:0 0 10px 10px;
  background:rgba(0,0,0,.25);backdrop-filter:blur(4px);
}
.result-strip .rs-score{font-family:'Teko';font-size:17px;color:var(--gold);font-weight:700;}

@media(max-width:580px){
  .match-card .match-row,.match-row{grid-template-columns:68px 1fr auto 1fr 82px;}
  .t-name{font-size:12px;}.t-flag{font-size:15px;}
  .score-in,.score-static{width:30px;height:30px;font-size:18px;}
  .mr-home,.mr-away{padding:0 6px;gap:4px;}.mr-time{padding:0 5px;}
  .save-btn{font-size:10px;padding:4px 7px;}
}

/* ── CHAMPION ── */
.champ-block{
  background:linear-gradient(135deg,rgba(247,201,72,.12) 0%,rgba(247,201,72,.04) 100%);
  border:2px solid rgba(247,201,72,.3);border-radius:14px;
  padding:18px 20px;margin-bottom:20px;
  box-shadow:0 0 30px rgba(247,201,72,.05);
  backdrop-filter:blur(8px);
}
.champ-title{font-family:'Black Han Sans';font-size:20px;letter-spacing:2px;color:var(--gold);margin-bottom:4px;display:flex;align-items:center;gap:8px;}
.champ-sub{font-size:12px;color:var(--dim);margin-bottom:14px;font-weight:700;}
.champ-select{width:100%;background:rgba(0,0,0,.4);border:2px solid rgba(247,201,72,.25);border-radius:10px;color:var(--white);padding:11px 14px;font-family:'Nunito';font-weight:700;font-size:15px;outline:none;cursor:pointer;transition:border-color .2s;}
.champ-select:focus{border-color:var(--gold);}
.champ-save{margin-top:10px;width:100%;background:var(--gold);color:#000;border:none;border-radius:10px;padding:11px;font-family:'Teko';font-weight:700;font-size:16px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s;}
.champ-save:hover{background:var(--gold2);box-shadow:0 6px 20px rgba(247,201,72,.3);}
.champ-saved{margin-top:10px;padding:10px 14px;background:rgba(45,198,83,.1);border:1px solid rgba(45,198,83,.3);border-radius:8px;font-size:13px;font-weight:700;color:var(--green);display:flex;align-items:center;gap:6px;}

/* ── LEADERBOARD ── */
.lb-table{display:flex;flex-direction:column;gap:8px;}
.lb-row{display:flex;align-items:center;gap:14px;background:var(--surface);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:14px 18px;transition:all .15s;backdrop-filter:blur(4px);}
.lb-row:hover{border-color:rgba(255,255,255,.16);box-shadow:0 4px 16px rgba(0,0,0,.3);}
.lb-rank{font-family:'Black Han Sans';font-size:26px;width:32px;text-align:center;color:var(--dim);}
.lb-rank.g{color:var(--gold);text-shadow:0 0 12px rgba(247,201,72,.4);}
.lb-rank.s{color:#c0c8d0;}
.lb-rank.b{color:#cd7f32;}
.lb-info{flex:1;}
.lb-name{font-family:'Teko';font-weight:700;font-size:22px;letter-spacing:.5px;color:var(--white);}
.lb-detail{font-size:11px;color:var(--dim);margin-top:2px;font-weight:700;}
.lb-pts{font-family:'Black Han Sans';font-size:32px;color:var(--gold);line-height:1;}
.lb-ptslabel{font-size:11px;color:var(--dim);font-weight:700;text-align:right;}

/* ── SECTION HEADER ── */
.sh{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.sh-title{font-family:'Black Han Sans';font-size:26px;letter-spacing:2px;color:var(--text);}
.sh-count{background:rgba(247,201,72,.12);border:1px solid rgba(247,201,72,.25);color:var(--gold);font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px;}

/* ── ADMIN ── */
.admin-card{background:var(--surface);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:20px;margin-bottom:18px;backdrop-filter:blur(4px);}
.admin-title{font-family:'Black Han Sans';font-size:18px;letter-spacing:2px;color:var(--gold);margin-bottom:12px;border-bottom:1px solid rgba(247,201,72,.15);padding-bottom:10px;}
.admin-row{display:grid;grid-template-columns:1fr 38px auto 38px 1fr auto auto;align-items:center;gap:6px;margin-bottom:8px;}
.res-team{font-family:'Teko';font-weight:600;font-size:13px;color:var(--text);}
.res-team.right{text-align:right;}
.res-input{width:38px;height:32px;background:rgba(0,0,0,.3);border:2px solid rgba(255,255,255,.12);border-radius:6px;color:var(--white);font-family:'Teko';font-size:20px;font-weight:700;text-align:center;outline:none;-moz-appearance:textfield;}
.res-input::-webkit-inner-spin-button,.res-input::-webkit-outer-spin-button{-webkit-appearance:none;}
.res-input:focus{border-color:var(--gold);}
.res-btn{background:var(--green);color:#000;border:none;border-radius:6px;padding:5px 10px;font-weight:700;font-size:12px;cursor:pointer;white-space:nowrap;}
.res-btn:hover{background:#25b04a;}
.po-select{background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.1);border-radius:7px;color:var(--white);padding:7px 8px;font-family:'Nunito';font-size:13px;font-weight:700;outline:none;width:100%;}
.po-row{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center;margin-bottom:10px;}
.po-label{font-family:'Teko';font-weight:600;font-size:14px;color:var(--gold);margin-bottom:5px;}

/* ── EMPTY ── */
.empty{text-align:center;padding:60px 20px;color:var(--dim);}
.empty-txt{font-size:14px;line-height:1.6;font-weight:700;}

/* ── TOAST ── */
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--gold);color:#000;font-family:'Teko';font-weight:700;font-size:15px;letter-spacing:1px;padding:10px 24px;border-radius:8px;transition:transform .28s ease;z-index:9999;white-space:nowrap;pointer-events:none;box-shadow:0 8px 24px rgba(247,201,72,.4);}
#toast.show{transform:translateX(-50%) translateY(0);}
#nav-admin{display:none;}
</style>
</head>
<body>

<div class="header">
  <div class="header-pitch">
    <div class="header-badge">Tipovačka</div>
    <h1>MS Fotbal<br>2026</h1>
    <div class="header-sub">USA &amp; Kanada &amp; Mexiko · 11. 6. – 19. 7. 2026</div>
    <div class="header-flags">🇺🇸🇨🇦🇲🇽🇧🇷🇦🇷🇫🇷🇪🇸🇩🇪🇵🇹🇳🇱🇨🇿</div>
  </div>
</div>

<div class="scoring-bar">
  <div class="sc-item"><b>20</b> Přesný výsledek</div>
  <div class="sc-item"><b>10</b> Správný vítěz</div>
  <div class="sc-item"><b>5</b> Celkový počet gólů</div>
  <div class="sc-item" style="color:var(--gold)"><b>50</b> Vítěz šampionátu ⚽</div>
</div>

<div id="login-screen">
  <div class="login-h">Kdo tipuje?</div>
  <div class="login-sub">Vyber se a zadej PIN</div>
  <div class="player-grid" id="player-grid"></div>
</div>

// ── FIREBASE SYNC ─────────────────────────────────────────
function startSync(){
  if(!db) return;
  var uids=['terka','martin','vojta','evelina','ola','dan','radim','petr'];
  uids.forEach(function(uid){
    db.collection('fotbal_tips').doc(uid).collection('matches').onSnapshot(function(snap){
      snap.forEach(function(doc){S.s('tip_'+uid+'_'+doc.id,doc.data());});
      snap.docChanges().forEach(function(ch){if(ch.type==='removed')S.d('tip_'+uid+'_'+ch.doc.id);});
      refreshView();
    },function(){});
  });
  db.collection('fotbal_results').onSnapshot(function(snap){
    snap.forEach(function(doc){S.s('result_'+doc.id,doc.data());});
    snap.docChanges().forEach(function(ch){if(ch.type==='removed')S.d('result_'+ch.doc.id);});
    refreshView();
  },function(){});
  db.collection('fotbal_config').doc('playoff_teams').onSnapshot(function(snap){if(snap.exists)S.s('po_teams',snap.data());refreshView();},function(){});
  uids.forEach(function(uid){
    db.collection('fotbal_champ_tips').doc(uid).onSnapshot(function(snap){
      if(snap.exists)S.s('champ_tip_'+uid,snap.data().team);else S.d('champ_tip_'+uid);refreshView();
    },function(){});
  });
  db.collection('fotbal_config').doc('champ_result').onSnapshot(function(snap){
    if(snap.exists)S.s('champ_result',snap.data().team);else S.d('champ_result');refreshView();
  },function(){});
}
function refreshView(){
  if(!currentUser)return;
  var a=document.querySelector('.nav-btn.active');if(!a)return;
  var n=a.textContent.trim().toLowerCase();
  if(n==='tipovat')renderMatchList();
  else if(n==='tabulka')renderLeaderboard();
  else if(n==='moje tipy')renderMoje();
}

// Generate round-robin matches for each group
function genGroup(grp,teams,startDate,times){
  var matches=[];
  var pairs=[];
  for(var i=0;i<teams.length;i++) for(var j=i+1;j<teams.length;j++) pairs.push([i,j]);
  // 6 matches per group, spread over 3 rounds (2 matches per round, 3 days)
  // round 1: 0-3, 1-2; round 2: 0-1, 2-3; round 3: 0-2, 1-3
  var rounds=[[[0,3],[1,2]],[[0,1],[2,3]],[[0,2],[1,3]]];
  var base=new Date(startDate).getTime();
  rounds.forEach(function(round,ri){
    var d=new Date(base+ri*86400000*7).toISOString().slice(0,10); // roughly spread
    round.forEach(function(pair,pi){
      matches.push({
        id:grp+'_'+teams[pair[0]].id+'_'+teams[pair[1]].id,
        group:grp,
        homeTeam:teams[pair[0]].id,
        awayTeam:teams[pair[1]].id,
        date:d,
        time:times[pi]
      });
    });
  });
  return matches;
}

  var d=document.createElement('button');d.className='kbtn sym';d.textContent='\u232b';d.addEventListener('click',kDel);kp.appendChild(d);

function kP(k){if(pinBuf.length>=4)return;pinBuf+=k;document.getElementById('po-err').textContent='';refreshPinUI();if(pinBuf.length===4)setTimeout(checkPin,80);}

function pinClose(){document.getElementById('pin-overlay').style.display='none';pinBuf='';pinFirst='';}
function checkPin(){
  if(pinMode==='login'){var ok=pinTarget==='admin'?ADMIN_PIN:getPin(pinTarget.id);if(pinBuf===ok){pinClose();doLogin();}else errPin('\u0160patný PIN');}

      var byDate={};
      future.forEach(function(m){if(!byDate[m.date])byDate[m.date]=[];byDate[m.date].push(m);});
      var dates=Object.keys(byDate).sort();
      var now=new Date();
      dates.forEach(function(date){
        var d=new Date(date+'T12:00:00');

function setGrp(g){
  activeGrp=g;
  document.querySelectorAll('#tab-tipovat .itab').forEach(function(t){t.classList.toggle('active',t.getAttribute('data-g')===g);});
  renderMatchList();
}

function calcPts(tip,result){
  if(tip.home===result.home&&tip.away===result.away)return 20;
  var p=0,rw=result.home>result.away?'H':result.home<result.away?'A':'D',tw=tip.home>tip.away?'H':tip.home<tip.away?'A':'D';
  if(rw===tw)p+=10;
  if((tip.home+tip.away)===(result.home+result.away))p+=5;
  return p;
}

function renderMatchList(){
  var el=document.getElementById('match-list');if(!el)return;
  var matches;
  if(activeGrp==='KO') matches=KNOCKOUT;
  else matches=GROUP_MATCHES.filter(function(m){return m.group===activeGrp;});
  var byDate={},dates,i;
  for(i=0;i<matches.length;i++){var m=matches[i];if(!byDate[m.date])byDate[m.date]=[];byDate[m.date].push(m);}
  dates=Object.keys(byDate).sort();el.innerHTML='';
  for(var d=0;d<dates.length;d++){
    var divEl=document.createElement('div');divEl.className='date-divider';
    divEl.textContent=new Date(dates[d]+'T12:00:00').toLocaleDateString('cs-CZ',{weekday:'long',day:'numeric',month:'long'});
    el.appendChild(divEl);
    var ms=byDate[dates[d]];for(i=0;i<ms.length;i++) el.appendChild(buildMatchCard(ms[i]));
  }
}

function buildMatchCard(m){
  var locked=isLocked(m),ht=getTeam(m.homeTeam),at=getTeam(m.awayTeam);
  var isAdmin=currentUser&&currentUser.id==='admin';
  var tip=(!isAdmin&&currentUser)?getTip(currentUser.id,m.id):null;
  var result=getResult(m.id);
  var card=document.createElement('div');card.className='match-card'+(tip?' has-tip':'')+(locked?' locked':'');
  var row=document.createElement('div');row.className='match-row';
  // Time
  var te=document.createElement('div');te.className='mr-time';
  te.innerHTML='<div class="mr-date">'+m.date.slice(5).replace('-','.')+'</div>'
    +'<div class="mr-clock">'+m.time+'</div>'
    +'<span class="mr-lock '+(locked?'closed':'open')+'">'+(locked?'Uzavřeno':'Otevřeno')+'</span>'
    +(m.label?'<div style="font-size:8px;color:var(--gold);font-weight:700;margin-top:1px;">'+m.label+'</div>':'');
  row.appendChild(te);
  // Home
  var he=document.createElement('div');he.className='mr-home';
  he.innerHTML='<span class="t-name right">'+ht.n+'</span><span class="t-flag">'+ht.f+'</span>';
  row.appendChild(he);
  // Score
  var se=document.createElement('div');
  if(isAdmin&&result){
    se.className='mr-result';
    se.innerHTML='<span class="res-num">'+result.home+'</span><span class="res-sep">:</span><span class="res-num">'+result.away+'</span>';
  }else{
    se.className='mr-score';
    var ih=document.createElement('input');ih.type='number';ih.className='score-in';ih.min=0;ih.max=20;ih.placeholder='0';
    ih.id=(isAdmin?'rh_':'h_')+m.id;if(tip!=null&&!isAdmin)ih.value=tip.home;if(locked)ih.disabled=true;
    var sep=document.createElement('span');sep.className='score-sep';sep.textContent=':';
    var ia=document.createElement('input');ia.type='number';ia.className='score-in';ia.min=0;ia.max=20;ia.placeholder='0';
    ia.id=(isAdmin?'ra_':'a_')+m.id;if(tip!=null&&!isAdmin)ia.value=tip.away;if(locked)ia.disabled=true;
    se.appendChild(ih);se.appendChild(sep);se.appendChild(ia);
  }
  row.appendChild(se);
  // Away
  var ae=document.createElement('div');ae.className='mr-away';
  ae.innerHTML='<span class="t-flag">'+at.f+'</span><span class="t-name">'+at.n+'</span>';
  row.appendChild(ae);
  // Action
  var act=document.createElement('div');act.className='mr-action';
  if(isAdmin){
    if(result){
      var okS=document.createElement('span');okS.className='tip-ok';okS.textContent='OK';act.appendChild(okS);
      (function(mid){var db2=document.createElement('button');db2.className='del-btn';db2.textContent='\u2715';
        db2.addEventListener('click',function(){if(confirm('Smazat výsledek?')){deleteResultLS(mid);showToast('Smazáno');renderMatchList();}});
        act.appendChild(db2);})(m.id);
    }else{
      (function(mid){var sb=document.createElement('button');sb.className='save-btn';sb.textContent='Uložit';
        sb.addEventListener('click',function(){
          var h=parseInt(document.getElementById('rh_'+mid).value),a=parseInt(document.getElementById('ra_'+mid).value);
          if(isNaN(h)||isNaN(a)){showToast('Zadej oba');return;}
          saveResultLS(mid,h,a);showToast('Uloženo!');renderMatchList();});
        act.appendChild(sb);})(m.id);
    }
  }else{
    if(locked){
      var sp=document.createElement('span');sp.className='tip-ok';
      sp.textContent=tip?'Uloženo':'Bez tipu';if(!tip)sp.style.cssText='font-size:10px;color:var(--red);font-weight:700;';
      act.appendChild(sp);
      if(tip&&result){var pts=calcPts(tip,result);var pp=document.createElement('span');pp.className='pts-pill '+(pts===20?'pts-exact':pts>0?'pts-win':'pts-zero');pp.textContent=pts===20?'+20!':pts>0?'+'+pts+'b':'0b';act.appendChild(pp);}
    }else{
      (function(mid,mm){
        var sb=document.createElement('button');sb.className='save-btn';sb.textContent='Uložit';
        sb.addEventListener('click',function(){
          if(!mm||isLocked(mm)){showToast('Uzavřeno!');return;}
          var h=parseInt(document.getElementById('h_'+mid).value),a=parseInt(document.getElementById('a_'+mid).value);
          if(isNaN(h)||isNaN(a)){showToast('Zadej výsledek');return;}
          saveTipLS(currentUser.id,mid,h,a);showToast('Tip uložen!');renderMatchList();});
        act.appendChild(sb);
        if(tip){
          var ok=document.createElement('span');ok.className='tip-ok';ok.textContent='\u2713';act.appendChild(ok);
          var db3=document.createElement('button');db3.className='del-tip-btn';db3.textContent='\u2715';
          db3.addEventListener('click',function(){
            if(!mm||isLocked(mm)){showToast('Uzavřeno!');return;}
            deleteTipLS(currentUser.id,mid);showToast('Tip smazán');renderMatchList();});
          act.appendChild(db3);}
      })(m.id,m);
    }
  }
  row.appendChild(act);card.appendChild(row);
  // Result strip for players
  if(!isAdmin&&result){
    var strip=document.createElement('div');strip.className='result-strip';
    strip.innerHTML='<span>Výsledek:</span><span class="rs-score">'+result.home+' : '+result.away+'</span><span style="color:var(--dim)">'+ht.n+' \u2013 '+at.n+'</span>';
    card.appendChild(strip);
  }
  return card;
}

// ── SCORING ───────────────────────────────────────────────
function playerScore(pid){
  var total=0,exact=0,wins=0,tipped=0,champOk=false,i,m,r,t,pts,rw,tw;
  for(i=0;i<ALL_MATCHES.length;i++){
    m=ALL_MATCHES[i];r=getResult(m.id);if(!r)continue;
    t=getTip(pid,m.id);if(!t)continue;
    tipped++;pts=calcPts(t,r);total+=pts;
    if(pts===20)exact++;
    else{rw=r.home>r.away?'H':r.home<r.away?'A':'D';tw=t.home>t.away?'H':t.home<t.away?'A':'D';if(rw===tw)wins++;}
  }
  var champ=getChampResult();if(champ&&getChampTip(pid)===champ){total+=50;champOk=true;}
  return {total:total,exact:exact,wins:wins,tipped:tipped,champOk:champOk};
}

// ── LEADERBOARD ───────────────────────────────────────────
function renderOdehrane(){
  var el=document.getElementById('tab-odehrane');
  var isAdmin=currentUser&&currentUser.id==='admin';
  var allM=GROUP_MATCHES.concat(KNOCKOUT);
  var done=allM.filter(function(m){return !!getResult(m.id);});
  done.sort(function(a,b){var da=a.date+a.time,db=b.date+b.time;return da<db?1:da>db?-1:0;});
  if(!done.length){el.innerHTML='<div style="padding:40px;text-align:center;color:rgba(255,255,255,.3);">Zatím žádné odehrané zápasy.</div>';return;}
  el.innerHTML='<div style="padding:16px 14px 80px;">';
  var byDate={};
  done.forEach(function(m){if(!byDate[m.date])byDate[m.date]=[];byDate[m.date].push(m);});
  var dates=Object.keys(byDate).sort().reverse();
  var html='<div style="padding:16px 14px 80px;">';
  dates.forEach(function(date){
    var d=new Date(date+'T12:00:00');
    var label=d.toLocaleDateString('cs-CZ',{weekday:'long',day:'numeric',month:'long'});
    html+='<div style="font-size:11px;font-weight:700;color:rgba(255,255,255,.3);letter-spacing:2px;text-transform:uppercase;padding:16px 0 8px;border-bottom:1px solid rgba(255,255,255,.07);margin-bottom:8px;">'+label+'</div>';
    byDate[date].forEach(function(m){
      var res=getResult(m.id);
      var ht=TEAMS[m.homeTeam],at=TEAMS[m.awayTeam];
      var myTip=(!isAdmin&&currentUser)?getTip(currentUser.id,m.id):null;
      var myPts=myTip&&res?calcPts(myTip,res):null;
      var ptsBadge='';
      if(myPts!==null){
        if(myPts===20)ptsBadge='<span style="background:rgba(247,201,72,.15);color:#f7c948;font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;margin-left:4px;">+20!</span>';
        else if(myPts>0)ptsBadge='<span style="background:rgba(255,255,255,.08);color:rgba(255,255,255,.5);font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;margin-left:4px;">+'+myPts+'b</span>';
        else ptsBadge='<span style="background:rgba(255,255,255,.05);color:rgba(255,255,255,.2);font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;margin-left:4px;">0b</span>';
      }
      var myTipStr=myTip?('<span style="font-size:11px;color:rgba(255,255,255,.3);">Tvůj tip: '+myTip.home+':'+myTip.away+'</span>'+ptsBadge):'<span style="font-size:11px;color:rgba(255,71,87,.5);">Bez tipu</span>';
      html+='<div style="background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:12px 14px;margin-bottom:6px;">';
      html+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">';
      html+='<div style="font-size:13px;font-weight:600;color:#fff;">'+ht.flag+' '+ht.n+' <span style="color:rgba(255,255,255,.3);">vs</span> '+at.n+' '+at.flag+'</div>';
      html+='<div style="font-family:Anton,sans-serif;font-size:20px;color:#f7c948;">'+res.home+' : '+res.away+'</div>';
      html+='</div>';
      html+='<div>'+myTipStr+'</div>';
      html+='</div>';
    });
  });
  html+='</div>';
  el.innerHTML=html;
}

function renderLeaderboard(){
  var ranked=[],i,sc,p,med,rc;
  for(i=0;i<PLAYERS.length;i++){sc=playerScore(PLAYERS[i].id);ranked.push({p:PLAYERS[i],sc:sc});}
  ranked.sort(function(a,b){return b.sc.total-a.sc.total;});
  var html='<div class="sh"><div class="sh-title">Tabulka tipérů</div></div><div class="lb-table">';
  for(i=0;i<ranked.length;i++){
    p=ranked[i].p;sc=ranked[i].sc;
    med=i===0?'&#129351;':i===1?'&#129352;':i===2?'&#129353;':(i+1)+'.';rc=i===0?'g':i===1?'s':i===2?'b':'';
    html+='<div class="lb-row"><div class="lb-rank '+rc+'">'+med+'</div>'
      +'<div class="avatar-wrap" style="width:40px;height:40px;flex-shrink:0;">'+makeAvatar(p.id,p.gender)+'</div>'
      +'<div class="lb-info"><div class="lb-name">'+p.name+'</div>'
      +'<div class="lb-detail">Přesně: '+sc.exact+'\u00d7 \u00b7 Vítěz: '+sc.wins+'\u00d7 \u00b7 Tipy: '+sc.tipped+(sc.champOk?' \u00b7 ⚽+50b':'')+'</div></div>'
      +'<div><div class="lb-pts">'+sc.total+'</div><div class="lb-ptslabel">bodů</div></div></div>';
  }
  document.getElementById('tab-leaderboard').innerHTML=html+'</div>';
}

// ── MOJE TIPY ─────────────────────────────────────────────
function renderMoje(){
  var el=document.getElementById('tab-moje'),i,m,t,r,ht,at,pts,ph,rows=[];
  if(!currentUser||currentUser.id==='admin'){el.innerHTML='<div class="empty"><div class="empty-txt">Přihlas se jako hráč</div></div>';return;}
  for(i=0;i<ALL_MATCHES.length;i++){
    m=ALL_MATCHES[i];t=getTip(currentUser.id,m.id);if(!t)continue;
    r=getResult(m.id);ht=getTeam(m.homeTeam);at=getTeam(m.awayTeam);
    pts=r?calcPts(t,r):null;
    ph=pts===null?'':pts===20?'<span class="pts-pill pts-exact">+20!</span>':pts>0?'<span class="pts-pill pts-win">+'+pts+'b</span>':'<span class="pts-pill pts-zero">0b</span>';
    rows.push('<div class="match-card has-tip"><div class="match-row">'
      +'<div class="mr-time"><div class="mr-date">'+m.date.slice(5).replace('-','.')+'</div><div class="mr-clock">'+m.time+'</div></div>'
      +'<div class="mr-home"><span class="t-name right">'+ht.n+'</span><span class="t-flag">'+ht.f+'</span></div>'
      +'<div class="mr-score"><span class="score-static">'+t.home+'</span><span class="score-sep">:</span><span class="score-static">'+t.away+'</span></div>'
      +'<div class="mr-away"><span class="t-flag">'+at.f+'</span><span class="t-name">'+at.n+'</span></div>'
      +'<div class="mr-action">'+ph+(r?'<div style="font-size:9px;color:var(--dim)">Výsl: '+r.home+':'+r.away+'</div>':'')+'</div>'
      +'</div></div>');
  }
  el.innerHTML='<div class="sh"><div class="sh-title">Moje tipy</div><span class="sh-count">'+rows.length+'</span></div>'
    +(rows.length?rows.join(''):'<div class="empty"><div class="empty-txt">Zatím žádné tipy</div></div>');
}

// ── ADMIN ─────────────────────────────────────────────────
var adminGrp='A';
function renderAdmin(){
  var el=document.getElementById('tab-admin'),i,m,pt,champR;
  if(!currentUser||currentUser.id!=='admin'){el.innerHTML='';return;}
  pt=getPoT();champR=getChampResult();
  var champOpts='';
  ALL_TEAMS.filter(function(t){return t.id!=='TBD';}).forEach(function(t){champOpts+='<option value="'+t.id+'"'+(champR===t.id?' selected':'')+'>'+t.f+' '+t.n+'</option>';});

  el.innerHTML='<div class="admin-card"><div class="admin-title">Zadat výsledky</div>'
    +'<div class="inner-tabs" style="margin-bottom:14px">'
    +GROUP_KEYS.map(function(g){return '<div class="itab'+(adminGrp===g?' active':'')+'" data-g="'+g+'">'+(g==='KO'?'Vyřaz.':'Sk. '+g)+'</div>';}).join('')
    +'</div><div id="admin-res"></div></div>'
    +'<div class="admin-card"><div class="admin-title">⚽ Vítěz šampionátu</div>'
    +'<select class="po-select" id="champ-result-sel">'+champOpts+'</select>'
    +'<button class="save-btn" style="margin-top:10px;width:100%" id="save-champ-btn">Uložit šampiona</button>'
    +(champR?'<div style="margin-top:8px;font-size:12px;color:var(--green);font-weight:700;">\u2705 '+getTeam(champR).f+' '+getTeam(champR).n+'</div>':'')
    +'</div>';

  el.querySelectorAll('.itab').forEach(function(t){t.addEventListener('click',function(){switchAG(t.getAttribute('data-g'));});});
  document.getElementById('save-champ-btn').addEventListener('click',function(){
    var sel=document.getElementById('champ-result-sel');if(!sel||!sel.value){showToast('Vyber tým');return;}
    saveChampResultLS(sel.value);showToast('\u0160ampion uložen!');renderAdmin();
  });
  renderAR();
}
function switchAG(g){
  adminGrp=g;
  document.querySelectorAll('#tab-admin .itab').forEach(function(t){t.classList.toggle('active',t.getAttribute('data-g')===g);});
  renderAR();
}
function renderAR(){
  var el=document.getElementById('admin-res');if(!el)return;
  var matches=adminGrp==='KO'?KNOCKOUT:GROUP_MATCHES.filter(function(m){return m.group===adminGrp;});
  el.innerHTML='';
  matches.forEach(function(m){
    var ht=getTeam(m.homeTeam),at=getTeam(m.awayTeam),r=getResult(m.id);
    var row=document.createElement('div');row.className='admin-row';
    row.innerHTML='<div class="res-team right">'+ht.f+' '+ht.n+'</div>'
      +'<input type="number" class="res-input" id="rh_'+m.id+'" value="'+(r!=null?r.home:'')+'" min="0" max="20">'
      +'<span style="font-size:18px;color:var(--dim);font-family:Teko">:</span>'
      +'<input type="number" class="res-input" id="ra_'+m.id+'" value="'+(r!=null?r.away:'')+'" min="0" max="20">'
      +'<div class="res-team">'+at.n+' '+at.f+'</div>';
    var sb=document.createElement('button');sb.className='res-btn';sb.textContent='\u2713';
    sb.addEventListener('click',function(){
      var h=parseInt(document.getElementById('rh_'+m.id).value),a=parseInt(document.getElementById('ra_'+m.id).value);
      if(isNaN(h)||isNaN(a)){showToast('Zadej oba');return;}
      saveResultLS(m.id,h,a);showToast('Uloženo!');renderAR();});
    row.appendChild(sb);
    if(r){var db=document.createElement('button');db.className='del-btn';db.textContent='\u2715';
      db.addEventListener('click',function(){if(confirm('Smazat?')){deleteResultLS(m.id);showToast('Smazáno');renderAR();}});
      row.appendChild(db);}
    el.appendChild(row);
  });
}

// ── TOAST ─────────────────────────────────────────────────
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2500);}

(function(){
  var saved=S.g('session'),user=null,i;
  if(saved){
    if(saved.id==='admin')user={id:'admin',name:'Admin',gender:'m'};
    else for(i=0;i<PLAYERS.length;i++) if(PLAYERS[i].id===saved.id&&getPin(PLAYERS[i].id)){user=PLAYERS[i];break;}
  }
  if(user)showApp(user);else renderPlayerGrid();
  startSync();
})();
