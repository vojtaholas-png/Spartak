<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MS Fotbal 2026 – Tipovačka</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#070d1a;
  --bg2:#0c1428;
  --surface:#111d35;
  --surface2:#162240;
  --border:rgba(255,255,255,0.07);
  --border2:rgba(255,255,255,0.13);
  --accent:#00e5a0;
  --accent2:#00c285;
  --gold:#f5c842;
  --red:#ff4757;
  --dim:#4a6080;
  --text:#dce8ff;
  --white:#ffffff;
  --card-radius:14px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  background:var(--bg);color:var(--text);
  font-family:'DM Sans',sans-serif;font-weight:500;
  min-height:100vh;overflow-x:hidden;
}

/* ── ANIMATED BACKGROUND ── */
body::before{
  content:'';position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 80% 50% at 20% -10%, rgba(0,229,160,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 110%, rgba(0,150,255,0.05) 0%, transparent 60%),
    linear-gradient(180deg, #070d1a 0%, #050b14 100%);
  pointer-events:none;
}
body>*{position:relative;z-index:1;}

/* ── HEADER ── */
.header{
  position:relative;overflow:hidden;
  background:linear-gradient(160deg,#0c1a35 0%,#071020 100%);
  border-bottom:1px solid var(--border2);
}
.header::after{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse 100% 200% at 50% 120%, rgba(0,229,160,0.07) 0%, transparent 60%);
  pointer-events:none;
}
.header-inner{padding:32px 20px 28px;text-align:center;position:relative;}

/* Grid lines decoration */
.header-inner::before{
  content:'';position:absolute;inset:0;opacity:.04;
  background-image:
    linear-gradient(rgba(255,255,255,.8) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.8) 1px, transparent 1px);
  background-size:40px 40px;
  mask-image:radial-gradient(ellipse at 50% 50%, black 30%, transparent 80%);
}

.header-eyebrow{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(0,229,160,0.1);border:1px solid rgba(0,229,160,0.25);
  border-radius:100px;padding:4px 14px;
  font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;
  color:var(--accent);margin-bottom:16px;font-family:'Space Grotesk',sans-serif;
}
.header-eyebrow::before{content:'⚽';font-size:12px;}

.header h1{
  font-family:'Syne',sans-serif;font-weight:800;
  font-size:clamp(38px,10vw,80px);
  line-height:.88;letter-spacing:-2px;
  background:linear-gradient(135deg,#ffffff 0%,#c8d8ff 40%,var(--accent) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.header-sub{
  font-size:12px;letter-spacing:4px;color:var(--dim);
  text-transform:uppercase;margin-top:12px;font-family:'Space Grotesk';font-weight:500;
}
.header-flags{
  display:flex;justify-content:center;gap:6px;margin-top:16px;font-size:18px;flex-wrap:wrap;opacity:.6;
}

/* ── SCORING BAR ── */
.scoring-bar{
  display:flex;justify-content:center;flex-wrap:wrap;
  background:var(--bg2);border-bottom:1px solid var(--border);
}
.sc-item{
  padding:10px 18px;font-size:11px;color:var(--dim);font-weight:600;
  border-right:1px solid var(--border);white-space:nowrap;
  font-family:'Space Grotesk';letter-spacing:.3px;
}
.sc-item:last-child{border-right:none;}
.sc-item b{font-family:'Syne';font-size:18px;color:var(--accent);margin-right:5px;vertical-align:middle;font-weight:700;}

/* ── LOGIN ── */
#login-screen{
  display:flex;flex-direction:column;align-items:center;
  padding:48px 16px 80px;min-height:60vh;
}
.login-h{
  font-family:'Syne';font-weight:800;font-size:26px;letter-spacing:-1px;
  color:var(--white);margin-bottom:4px;
}
.login-sub{color:var(--dim);font-size:13px;margin-bottom:32px;font-weight:500;}
.player-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;max-width:480px;width:100%;}
@media(max-width:480px){.player-grid{grid-template-columns:repeat(2,1fr);}}

.player-btn{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:16px;padding:20px 10px 16px;
  cursor:pointer;text-align:center;transition:all .2s cubic-bezier(.34,1.56,.64,1);
  display:flex;flex-direction:column;align-items:center;gap:10px;
}
.player-btn:hover{
  border-color:rgba(0,229,160,0.4);
  background:rgba(0,229,160,0.05);
  transform:translateY(-4px);
  box-shadow:0 12px 32px rgba(0,0,0,.4), 0 0 0 1px rgba(0,229,160,0.15);
}
.player-btn.no-pin{border-style:dashed;border-color:rgba(255,255,255,0.05);}
.avatar-wrap{width:52px;height:52px;border-radius:50%;overflow:hidden;flex-shrink:0;}
.avatar-wrap svg{width:100%;height:100%;}
.p-name{font-family:'Syne';font-weight:700;font-size:14px;color:var(--white);letter-spacing:-.3px;}
.p-status{font-size:10px;color:var(--dim);font-weight:600;letter-spacing:.3px;}

/* ── PIN OVERLAY ── */
.pin-overlay{
  position:fixed;inset:0;
  background:rgba(5,10,20,.9);backdrop-filter:blur(16px);
  display:flex;align-items:center;justify-content:center;z-index:900;padding:20px;
}
.pin-box{
  background:var(--surface);border:1px solid var(--border2);
  border-radius:24px;padding:32px 24px;max-width:300px;width:100%;text-align:center;
  box-shadow:0 24px 64px rgba(0,0,0,.7), 0 0 0 1px rgba(0,229,160,0.08);
}
.pin-who{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:20px;}
.pin-who-name{font-family:'Syne';font-weight:700;font-size:20px;color:var(--white);}
.pin-label{font-size:11px;color:var(--dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;font-weight:600;}
.pin-note{font-size:11px;color:var(--dim);line-height:1.5;margin-bottom:12px;}
.pin-dots{display:flex;justify-content:center;gap:12px;margin-bottom:20px;}
.pin-dot{width:12px;height:12px;border-radius:50%;border:2px solid var(--border2);background:transparent;transition:all .15s;}
.pin-dot.filled{background:var(--accent);border-color:var(--accent);box-shadow:0 0 10px rgba(0,229,160,.4);}
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.kbtn{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:12px;padding:14px;font-family:'Syne';font-weight:700;font-size:20px;
  color:var(--white);cursor:pointer;transition:all .12s;
}
.kbtn:hover{background:rgba(0,229,160,0.1);border-color:rgba(0,229,160,0.3);}
.kbtn:active{transform:scale(.91);}
.kbtn.sym{font-family:'DM Sans';font-size:14px;font-weight:600;color:var(--dim);}
.kbtn.sym:hover{color:var(--white);}
.pin-err{color:var(--red);font-size:12px;font-weight:700;margin-top:10px;min-height:16px;}

/* ── USER BAR ── */
.user-bar{
  display:flex;align-items:center;gap:12px;
  background:var(--bg2);border-bottom:1px solid var(--border);
  padding:10px 18px;
}
.ub-info{display:flex;align-items:center;gap:10px;flex:1;}
.ub-name{font-family:'Syne';font-weight:700;font-size:15px;color:var(--white);}
.ub-sub{font-size:11px;color:var(--dim);font-weight:500;}
.logout-btn{
  background:transparent;border:1px solid var(--border);border-radius:8px;
  color:var(--dim);font-size:12px;font-weight:600;padding:6px 14px;cursor:pointer;
  transition:all .18s;font-family:'DM Sans';
}
.logout-btn:hover{color:var(--white);border-color:var(--border2);}

/* ── MAIN NAV ── */
.main-nav{
  display:flex;background:var(--bg2);
  border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;
  padding:0 6px;
}
.main-nav::-webkit-scrollbar{display:none;}
.nav-btn{
  flex:0 0 auto;padding:14px 20px;background:none;border:none;
  color:var(--dim);font-family:'Space Grotesk';font-weight:600;font-size:12px;
  letter-spacing:1px;text-transform:uppercase;cursor:pointer;
  border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;
}
.nav-btn:hover{color:var(--text);}
.nav-btn.active{color:var(--accent);border-bottom-color:var(--accent);}

/* ── CONTENT ── */
.content{max-width:900px;margin:0 auto;padding:20px 14px 60px;}

.inner-tabs{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap;}
.itab{
  background:var(--surface);border:1px solid var(--border);border-radius:8px;
  padding:6px 13px;font-family:'Space Grotesk';font-weight:600;font-size:11px;
  letter-spacing:.8px;text-transform:uppercase;color:var(--dim);cursor:pointer;transition:all .15s;
}
.itab:hover{color:var(--text);}
.itab.active{background:rgba(0,229,160,.1);border-color:rgba(0,229,160,.35);color:var(--accent);}

.date-divider{
  font-family:'Space Grotesk';font-size:11px;font-weight:600;
  letter-spacing:2.5px;text-transform:uppercase;color:var(--dim);
  padding:16px 0 8px;border-bottom:1px solid var(--border);margin-bottom:8px;
  display:flex;align-items:center;gap:10px;
}
.date-divider::after{content:'';flex:1;height:1px;background:var(--border);}

/* ── MATCH CARD ── */
.match-card{margin-bottom:5px;}
.match-row{
  display:grid;grid-template-columns:78px 1fr auto 1fr 96px;
  align-items:stretch;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--card-radius);overflow:hidden;
  transition:border-color .2s;min-height:56px;
  backdrop-filter:blur(4px);
}
.match-card:has(.result-strip) .match-row{border-radius:var(--card-radius) var(--card-radius) 0 0;border-bottom:none;}
.match-card.has-tip .match-row{border-left:2px solid rgba(0,229,160,.5);}
.match-card.locked .match-row{opacity:.65;}
.match-row:hover{border-color:var(--border2);}

/* time */
.mr-time{
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  padding:0 8px;border-right:1px solid var(--border);text-align:center;gap:2px;
  background:var(--bg2);
}
.mr-date{font-size:10px;color:var(--dim);font-weight:600;letter-spacing:.3px;}
.mr-clock{font-family:'Syne';font-weight:700;font-size:14px;color:var(--text);}
.mr-lock{font-size:9px;font-weight:700;letter-spacing:.5px;}
.mr-lock.open{color:var(--accent);}
.mr-lock.closed{color:var(--red);}

/* teams */
.mr-home{display:flex;align-items:center;gap:6px;padding:0 10px;justify-content:flex-end;}
.mr-away{display:flex;align-items:center;gap:6px;padding:0 10px;}
.t-flag{font-size:18px;line-height:1;flex-shrink:0;}
.t-name{font-family:'Space Grotesk';font-weight:600;font-size:13px;color:var(--white);letter-spacing:-.2px;}
.t-name.right{text-align:right;}

/* score inputs */
.mr-score{
  display:flex;align-items:center;gap:4px;padding:4px 8px;
  border-left:1px solid var(--border);border-right:1px solid var(--border);
  background:rgba(0,0,0,.25);
}
.score-in{
  width:36px;height:36px;
  background:var(--surface2);border:1.5px solid var(--border2);
  border-radius:8px;color:var(--white);
  font-family:'Syne';font-weight:700;font-size:20px;
  text-align:center;padding:0;outline:none;
  -moz-appearance:textfield;transition:border-color .15s, box-shadow .15s;
}
.score-in::-webkit-inner-spin-button,.score-in::-webkit-outer-spin-button{-webkit-appearance:none;}
.score-in:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,229,160,.12);}
.score-in:disabled{opacity:.3;cursor:not-allowed;}
.score-sep{font-family:'Syne';font-size:16px;color:var(--dim);font-weight:700;}
.score-static{font-family:'Syne';font-size:20px;color:var(--accent);min-width:36px;text-align:center;font-weight:700;}

.mr-result{
  display:flex;align-items:center;gap:3px;padding:4px 10px;
  border-left:1px solid var(--border);border-right:1px solid var(--border);
  background:rgba(0,229,160,.04);
}
.res-num{font-family:'Syne';font-size:22px;color:var(--accent);font-weight:700;}
.res-sep{font-family:'Syne';font-size:16px;color:var(--dim);}

/* action */
.mr-action{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:6px 8px;gap:4px;border-left:1px solid var(--border);
}
.save-btn{
  background:var(--accent);color:#000;border:none;border-radius:7px;
  padding:5px 10px;font-family:'Space Grotesk';font-weight:700;
  font-size:11px;letter-spacing:.5px;cursor:pointer;transition:all .15s;white-space:nowrap;
}
.save-btn:hover{background:var(--accent2);box-shadow:0 4px 14px rgba(0,229,160,.3);}
.tip-ok{font-size:10px;color:var(--accent);font-weight:700;}
.pts-pill{font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;white-space:nowrap;}
.pts-exact{background:rgba(245,200,66,.18);color:var(--gold);}
.pts-win{background:rgba(0,229,160,.12);color:var(--accent);}
.pts-zero{background:var(--surface2);color:var(--dim);}
.del-btn{
  background:rgba(255,71,87,.1);border:1px solid rgba(255,71,87,.25);
  border-radius:6px;color:var(--red);font-size:11px;font-weight:700;
  padding:3px 8px;cursor:pointer;transition:all .15s;
}
.del-btn:hover{background:rgba(255,71,87,.25);}
.del-tip-btn{
  background:none;border:none;color:var(--dim);font-size:12px;
  font-weight:700;cursor:pointer;padding:2px 4px;transition:color .15s;
}
.del-tip-btn:hover{color:var(--red);}

/* result strip */
.result-strip{
  padding:6px 14px 8px;display:flex;align-items:center;gap:8px;
  font-size:12px;color:var(--dim);font-weight:600;
  border:1px solid var(--border);border-top:none;
  border-radius:0 0 var(--card-radius) var(--card-radius);
  background:rgba(0,229,160,.02);font-family:'Space Grotesk';
}
.result-strip .rs-score{
  font-family:'Syne';font-size:16px;color:var(--accent);font-weight:700;
}

@media(max-width:580px){
  .match-row{grid-template-columns:62px 1fr auto 1fr 78px;}
  .t-name{font-size:11px;}.t-flag{font-size:15px;}
  .score-in,.score-static{width:30px;height:30px;font-size:17px;}
  .mr-home,.mr-away{padding:0 6px;gap:3px;}.mr-time{padding:0 5px;}
  .save-btn{font-size:10px;padding:4px 7px;}
}

/* ── CHAMPION ── */
.champ-block{
  background:linear-gradient(135deg,rgba(0,229,160,.08) 0%,rgba(0,229,160,.02) 100%);
  border:1px solid rgba(0,229,160,.2);border-radius:18px;
  padding:22px 22px;margin-bottom:22px;
}
.champ-title{
  font-family:'Syne';font-weight:800;font-size:18px;letter-spacing:-.5px;
  color:var(--white);margin-bottom:4px;display:flex;align-items:center;gap:8px;
}
.champ-sub{font-size:12px;color:var(--dim);margin-bottom:16px;font-weight:500;}
.champ-select{
  width:100%;background:var(--surface2);border:1.5px solid var(--border2);
  border-radius:10px;color:var(--white);padding:12px 14px;
  font-family:'DM Sans';font-weight:600;font-size:15px;outline:none;cursor:pointer;
  transition:border-color .2s;
}
.champ-select:focus{border-color:var(--accent);}
.champ-save{
  margin-top:10px;width:100%;background:var(--accent);color:#000;border:none;
  border-radius:10px;padding:13px;font-family:'Syne';font-weight:700;
  font-size:14px;letter-spacing:.5px;cursor:pointer;transition:all .2s;
}
.champ-save:hover{background:var(--accent2);box-shadow:0 6px 24px rgba(0,229,160,.3);}
.champ-saved{
  margin-top:10px;padding:10px 14px;background:rgba(0,229,160,.08);
  border:1px solid rgba(0,229,160,.2);border-radius:10px;
  font-size:13px;font-weight:600;color:var(--accent);
  display:flex;align-items:center;gap:6px;font-family:'Space Grotesk';
}

/* ── LEADERBOARD ── */
.lb-table{display:flex;flex-direction:column;gap:8px;}
.lb-row{
  display:flex;align-items:center;gap:14px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:14px;padding:14px 18px;transition:all .18s;
}
.lb-row:hover{border-color:var(--border2);box-shadow:0 4px 20px rgba(0,0,0,.3);}
.lb-rank{font-family:'Syne';font-weight:800;font-size:22px;width:32px;text-align:center;color:var(--dim);}
.lb-rank.g{color:var(--gold);text-shadow:0 0 16px rgba(245,200,66,.4);}
.lb-rank.s{color:#a8b4c8;}
.lb-rank.b{color:#b87040;}
.lb-info{flex:1;}
.lb-name{font-family:'Syne';font-weight:700;font-size:18px;letter-spacing:-.3px;color:var(--white);}
.lb-detail{font-size:11px;color:var(--dim);margin-top:2px;font-weight:500;font-family:'Space Grotesk';}
.lb-pts{font-family:'Syne';font-weight:800;font-size:28px;color:var(--accent);line-height:1;}
.lb-ptslabel{font-size:10px;color:var(--dim);font-weight:600;text-align:right;font-family:'Space Grotesk';}

/* ── SECTION HEADER ── */
.sh{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
.sh-title{font-family:'Syne';font-weight:800;font-size:24px;letter-spacing:-.5px;color:var(--white);}
.sh-count{
  background:rgba(0,229,160,.1);border:1px solid rgba(0,229,160,.2);
  color:var(--accent);font-size:11px;font-weight:700;
  padding:2px 10px;border-radius:100px;font-family:'Space Grotesk';
}

/* ── ADMIN ── */
.admin-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:16px;padding:22px;margin-bottom:18px;
}
.admin-title{
  font-family:'Syne';font-weight:700;font-size:15px;letter-spacing:-.2px;
  color:var(--accent);margin-bottom:14px;
  border-bottom:1px solid var(--border);padding-bottom:12px;
}
.admin-row{display:grid;grid-template-columns:1fr 36px auto 36px 1fr auto auto;align-items:center;gap:6px;margin-bottom:8px;}
.res-team{font-family:'Space Grotesk';font-weight:600;font-size:12px;color:var(--text);}
.res-team.right{text-align:right;}
.res-input{
  width:36px;height:32px;background:var(--surface2);border:1.5px solid var(--border2);
  border-radius:6px;color:var(--white);font-family:'Syne';font-size:18px;
  font-weight:700;text-align:center;outline:none;-moz-appearance:textfield;
}
.res-input::-webkit-inner-spin-button,.res-input::-webkit-outer-spin-button{-webkit-appearance:none;}
.res-input:focus{border-color:var(--accent);}
.res-btn{
  background:rgba(0,229,160,.15);border:1px solid rgba(0,229,160,.3);
  border-radius:6px;color:var(--accent);font-weight:700;font-size:12px;
  padding:5px 10px;cursor:pointer;transition:all .15s;
}
.res-btn:hover{background:rgba(0,229,160,.3);}
.po-select{
  background:var(--surface2);border:1px solid var(--border2);border-radius:8px;
  color:var(--white);padding:8px 10px;font-family:'DM Sans';font-size:13px;font-weight:600;
  outline:none;width:100%;
}
.po-row{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center;margin-bottom:10px;}
.po-label{font-family:'Space Grotesk';font-weight:600;font-size:13px;color:var(--gold);margin-bottom:6px;}

/* ── EMPTY ── */
.empty{text-align:center;padding:64px 20px;color:var(--dim);}
.empty-txt{font-size:14px;line-height:1.6;font-weight:500;}

/* ── TOAST ── */
#toast{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--accent);color:#000;
  font-family:'Space Grotesk';font-weight:700;font-size:13px;letter-spacing:.3px;
  padding:10px 24px;border-radius:100px;
  transition:transform .25s cubic-bezier(.34,1.56,.64,1);
  z-index:9999;white-space:nowrap;pointer-events:none;
  box-shadow:0 8px 24px rgba(0,229,160,.35);
}
#toast.show{transform:translateX(-50%) translateY(0);}
#nav-admin{display:none;}

/* ── OTHERS TIPS ── */
.others-strip{
  padding:8px 14px 10px;
  border:1px solid var(--border);border-top:none;
  border-radius:0 0 var(--card-radius) var(--card-radius);
  background:rgba(0,0,0,.2);
}
.result-strip+.others-strip{border-radius:0;border-top:none;}
.match-card:has(.others-strip) .result-strip{border-radius:0;}
.match-card:has(.others-strip):not(:has(.result-strip)) .match-row{border-radius:var(--card-radius) var(--card-radius) 0 0;}

  transition:all .18s;white-space:nowrap;
}
.vt-btn:hover{color:var(--text);}
.vt-btn.active{background:var(--accent);color:#000;}

/* ── TODAY HIGHLIGHT ── */
.today-divider{
  color:var(--accent) !important;

}
.today-divider::before{
  content:'';display:inline-block;width:8px;height:8px;

  animation:pulse 1.5s infinite;vertical-align:middle;
}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.5;transform:scale(1.3);}}
.past-divider{opacity:.45;}

function genGroup(grp,teams,startDate,times){
  var matches=[];
  var pairs=[];
  for(var i=0;i<teams.length;i++) for(var j=i+1;j<teams.length;j++) pairs.push([i,j]);
  // 6 matches per group, spread over 3 rounds (2 matches per round, 3 days)
  // round 1: 0-3, 1-2; round 2: 0-1, 2-3; round 3: 0-2, 1-3
  var rounds=[[[0,3],[1,2]],[[0,1],[2,3]],[[0,2],[1,3]]];
  var base=new Date(startDate).getTime();
  rounds.forEach(function(round,ri){
    var d=new Date(base+ri*86400000*7).toISOString().slice(0,10); // roughly spread
    round.forEach(function(pair,pi){
      matches.push({
        id:grp+'_'+teams[pair[0]].id+'_'+teams[pair[1]].id,
        group:grp,
        homeTeam:teams[pair[0]].id,
        awayTeam:teams[pair[1]].id,
        date:d,
        time:times[pi]
      });
    });
  });
  return matches;
}

function openPin(id){
  pinBuf='';pinFirst='';
  if(id==='admin'){
    pinTarget='admin';pinMode='login';
    document.getElementById('po-avatar').innerHTML=makeAvatar('admin','Admin');
    document.getElementById('po-name').textContent='Admin';
  }else{
    pinTarget=null;for(var i=0;i<PLAYERS.length;i++) if(PLAYERS[i].id===id){pinTarget=PLAYERS[i];break;}
    if(!pinTarget)return;
    document.getElementById('po-avatar').innerHTML=makeAvatar(pinTarget.id,pinTarget.name);
    document.getElementById('po-name').textContent=pinTarget.name;
    pinMode=getPin(pinTarget.id)?'login':'setup';
  }
  document.getElementById('po-err').textContent='';
  document.getElementById('pin-overlay').style.display='flex';
  refreshPinUI();
}
function refreshPinUI(){
  var dots='';for(var i=0;i<4;i++) dots+='<div class="pin-dot'+(pinBuf.length>i?' filled':'')+'"></div>';
  document.getElementById('po-dots').innerHTML=dots;
  var lbl=document.getElementById('po-label'),note=document.getElementById('po-note');

  else if(pinMode==='setup'){lbl.textContent='Zvol si PIN (4 číslice)';note.style.display='block';note.textContent='Poprvé – nastav si vlastní PIN!';}
  else{lbl.textContent='Potvrď PIN znovu';note.style.display='none';}
  var kp=document.getElementById('po-keypad');kp.innerHTML='';
  ['1','2','3','4','5','6','7','8','9'].forEach(function(k){
    var b=document.createElement('button');b.className='kbtn';b.textContent=k;
    b.addEventListener('click',function(){kP(k);});kp.appendChild(b);
  });
  var back=document.createElement('button');back.className='kbtn sym';back.textContent='Zpět';back.addEventListener('click',pinClose);kp.appendChild(back);
  var z=document.createElement('button');z.className='kbtn';z.textContent='0';z.addEventListener('click',function(){kP('0');});kp.appendChild(z);
  var d=document.createElement('button');d.className='kbtn sym';d.textContent='⌫';d.addEventListener('click',kDel);kp.appendChild(d);
}
function kP(k){if(pinBuf.length>=4)return;pinBuf+=k;document.getElementById('po-err').textContent='';refreshPinUI();if(pinBuf.length===4)setTimeout(checkPin,80);}
function kDel(){pinBuf=pinBuf.slice(0,-1);document.getElementById('po-err').textContent='';refreshPinUI();}
function pinClose(){document.getElementById('pin-overlay').style.display='none';pinBuf='';pinFirst='';}
function checkPin(){
  if(pinMode==='login'){var ok=pinTarget==='admin'?ADMIN_PIN:getPin(pinTarget.id);if(pinBuf===ok){pinClose();doLogin();}else errPin('Špatný PIN');}
  else if(pinMode==='setup'){pinFirst=pinBuf;pinBuf='';pinMode='setup2';refreshPinUI();}
  else{if(pinBuf===pinFirst){setPin(pinTarget.id,pinBuf);pinClose();renderPlayerGrid();showToast('PIN nastaven!');setTimeout(doLogin,400);}else{errPin('PINy se neshodují');pinMode='setup';pinFirst='';}}
}

      t.addEventListener('click',function(){setGrp(t.getAttribute('data-g'));});
      gt.appendChild(t);
    });

function setViewMode(mode){
  viewMode=mode;renderTipovat();
}

function setGrp(g){
  activeGrp=g;
  document.querySelectorAll('#grp-tabs .itab').forEach(function(t){t.classList.toggle('active',t.getAttribute('data-g')===g);});
  renderMatchList();
}

function calcPts(tip,result){
  if(tip.home===result.home&&tip.away===result.away)return 20;
  var p=0,rw=result.home>result.away?'H':result.home<result.away?'A':'D',tw=tip.home>tip.away?'H':tip.home<tip.away?'A':'D';
  if(rw===tw)p+=10;
  if((tip.home+tip.away)===(result.home+result.away))p+=5;
  return p;
}

function renderMatchList(){
  var el=document.getElementById('match-list');if(!el)return;
  var matches,i;

  if(viewMode==='dny'){
    // All matches sorted by date+time
    matches=GROUP_MATCHES.concat(KNOCKOUT);
    matches.sort(function(a,b){
      var da=a.date+a.time, db=b.date+b.time;
      return da<db?-1:da>db?1:0;
    });
  } else {
    if(activeGrp==='KO') matches=KNOCKOUT;
    else matches=GROUP_MATCHES.filter(function(m){return m.group===activeGrp;});
  }

  var byDate={},dates;
  for(i=0;i<matches.length;i++){var m=matches[i];if(!byDate[m.date])byDate[m.date]=[];byDate[m.date].push(m);}
  dates=Object.keys(byDate).sort();
  el.innerHTML='';

  // In day mode: show today/upcoming section first with a "Dnes" highlight
  var today=new Date().toISOString().slice(0,10);
  var todayRendered=false;

  for(var d=0;d<dates.length;d++){
    var dateStr=dates[d];
    var isToday=dateStr===today;
    var isPast=dateStr<today;

    // Add "Dnes" badge or past opacity
    var divEl=document.createElement('div');
    divEl.className='date-divider'+(isToday?' today-divider':'')+(isPast?' past-divider':'');

    var dt=new Date(dateStr+'T12:00:00');
    var label=dt.toLocaleDateString('cs-CZ',{weekday:'long',day:'numeric',month:'long'});
    if(isToday) label='⚽ Dnes · '+label;

    // In day mode show group badge on each match
    divEl.textContent=label;
    el.appendChild(divEl);

    var ms=byDate[dateStr];
    for(i=0;i<ms.length;i++) el.appendChild(buildMatchCard(ms[i],viewMode==='dny'));
  }
}

function buildMatchCard(m, showGroup){
  var locked=isLocked(m),ht=getTeam(m.homeTeam),at=getTeam(m.awayTeam);
  var isAdmin=currentUser&&currentUser.id==='admin';
  var tip=(!isAdmin&&currentUser)?getTip(currentUser.id,m.id):null;
  var result=getResult(m.id);
  var card=document.createElement('div');card.className='match-card'+(tip?' has-tip':'')+(locked?' locked':'');
  var row=document.createElement('div');row.className='match-row';
  // Time
  var te=document.createElement('div');te.className='mr-time';
  te.innerHTML='<div class="mr-date">'+m.date.slice(5).replace('-','.')+'</div>'
    +'<div class="mr-clock">'+m.time+'</div>'
    +'<span class="mr-lock '+(locked?'closed':'open')+'">'+(locked?'Uzavřeno':'Otevřeno')+'</span>'
    +(m.label?'<div style="font-size:8px;color:var(--gold);font-weight:700;margin-top:1px;">'+m.label+'</div>':(showGroup&&m.group?'<div style="font-size:8px;color:var(--accent);font-weight:700;margin-top:1px;letter-spacing:.5px;">SK. '+m.group+'</div>':''));
  row.appendChild(te);
  // Home
  var he=document.createElement('div');he.className='mr-home';
  he.innerHTML='<span class="t-name right">'+ht.n+'</span><span class="t-flag">'+ht.f+'</span>';
  row.appendChild(he);
  // Score
  var se=document.createElement('div');
  if(isAdmin&&result){
    se.className='mr-result';
    se.innerHTML='<span class="res-num">'+result.home+'</span><span class="res-sep">:</span><span class="res-num">'+result.away+'</span>';
  }else{
    se.className='mr-score';
    var ih=document.createElement('input');ih.type='number';ih.className='score-in';ih.min=0;ih.max=20;ih.placeholder='0';
    ih.id=(isAdmin?'rh_':'h_')+m.id;if(tip!=null&&!isAdmin)ih.value=tip.home;if(locked)ih.disabled=true;
    var sep=document.createElement('span');sep.className='score-sep';sep.textContent=':';
    var ia=document.createElement('input');ia.type='number';ia.className='score-in';ia.min=0;ia.max=20;ia.placeholder='0';
    ia.id=(isAdmin?'ra_':'a_')+m.id;if(tip!=null&&!isAdmin)ia.value=tip.away;if(locked)ia.disabled=true;
    se.appendChild(ih);se.appendChild(sep);se.appendChild(ia);
  }
  row.appendChild(se);
  // Away
  var ae=document.createElement('div');ae.className='mr-away';
  ae.innerHTML='<span class="t-flag">'+at.f+'</span><span class="t-name">'+at.n+'</span>';
  row.appendChild(ae);
  // Action
  var act=document.createElement('div');act.className='mr-action';
  if(isAdmin){
    if(result){
      var okS=document.createElement('span');okS.className='tip-ok';okS.textContent='OK';act.appendChild(okS);
      (function(mid){var db2=document.createElement('button');db2.className='del-btn';db2.textContent='✕';
        db2.addEventListener('click',function(){if(confirm('Smazat výsledek?')){deleteResultLS(mid);showToast('Smazáno');renderMatchList();}});
        act.appendChild(db2);})(m.id);
    }else{
      (function(mid){var sb=document.createElement('button');sb.className='save-btn';sb.textContent='Uložit';
        sb.addEventListener('click',function(){
          var h=parseInt(document.getElementById('rh_'+mid).value),a=parseInt(document.getElementById('ra_'+mid).value);
          if(isNaN(h)||isNaN(a)){showToast('Zadej oba');return;}
          saveResultLS(mid,h,a);showToast('Uloženo!');renderMatchList();});
        act.appendChild(sb);})(m.id);
    }
  }else{
    if(locked){
      var sp=document.createElement('span');sp.className='tip-ok';
      sp.textContent=tip?'Uloženo':'Bez tipu';if(!tip)sp.style.cssText='font-size:10px;color:var(--red);font-weight:700;';
      act.appendChild(sp);
      if(tip&&result){var pts=calcPts(tip,result);var pp=document.createElement('span');pp.className='pts-pill '+(pts===20?'pts-exact':pts>0?'pts-win':'pts-zero');pp.textContent=pts===20?'+20!':pts>0?'+'+pts+'b':'0b';act.appendChild(pp);}
    }else{
      (function(mid,mm){
        var sb=document.createElement('button');sb.className='save-btn';sb.textContent='Uložit';
        sb.addEventListener('click',function(){
          if(!mm||isLocked(mm)){showToast('Uzavřeno!');return;}
          var h=parseInt(document.getElementById('h_'+mid).value),a=parseInt(document.getElementById('a_'+mid).value);
          if(isNaN(h)||isNaN(a)){showToast('Zadej výsledek');return;}
          saveTipLS(currentUser.id,mid,h,a);showToast('Tip uložen!');renderMatchList();});
        act.appendChild(sb);
        if(tip){
          var ok=document.createElement('span');ok.className='tip-ok';ok.textContent='✓';act.appendChild(ok);
          var db3=document.createElement('button');db3.className='del-tip-btn';db3.textContent='✕';
          db3.addEventListener('click',function(){
            if(!mm||isLocked(mm)){showToast('Uzavřeno!');return;}
            deleteTipLS(currentUser.id,mid);showToast('Tip smazán');renderMatchList();});
          act.appendChild(db3);}
      })(m.id,m);
    }
  }
  row.appendChild(act);card.appendChild(row);
  // Result strip for players
  if(!isAdmin&&result){
    var strip=document.createElement('div');strip.className='result-strip';
    strip.innerHTML='<span>Výsledek:</span><span class="rs-score">'+result.home+' : '+result.away+'</span><span style="color:var(--dim)">'+ht.n+' – '+at.n+'</span>';
    card.appendChild(strip);
  }
  // Others' tips – visible only after match is locked
  if(!isAdmin&&locked){
    var others=[];
    for(var pi=0;pi<PLAYERS.length;pi++){
      var p=PLAYERS[pi];
      if(currentUser&&p.id===currentUser.id) continue;
      var otherTip=getTip(p.id,m.id);
      if(otherTip) others.push({name:p.name,id:p.id,tip:otherTip});
    }
    if(others.length>0){
      var ostrip=document.createElement('div');ostrip.className='others-strip';
      var ohtml='<div class="others-label">Tipy ostatních</div><div class="others-list">';
      for(var oi=0;oi<others.length;oi++){
        var o=others[oi];
        var opts=calcPts&&result?calcPts(o.tip,result):null;
        var opill=opts===null?'':opts===20?' <span class="pts-pill pts-exact">+20!</span>':opts>0?' <span class="pts-pill pts-win">+'+opts+'b</span>':' <span class="pts-pill pts-zero">0b</span>';
        ohtml+='<div class="other-tip">'
          +'<span class="other-name">'+o.name+'</span>'
          +'<span class="other-score">'+o.tip.home+':'+o.tip.away+'</span>'
          +opill
          +'</div>';
      }
      ohtml+='</div>';
      ostrip.innerHTML=ohtml;
      card.appendChild(ostrip);
    }
  }
  return card;
}

// ── SCORING ───────────────────────────────────────────────
function playerScore(pid){
  var total=0,exact=0,wins=0,tipped=0,champOk=false,i,m,r,t,pts,rw,tw;
  for(i=0;i<ALL_MATCHES.length;i++){
    m=ALL_MATCHES[i];r=getResult(m.id);if(!r)continue;
    t=getTip(pid,m.id);if(!t)continue;
    tipped++;pts=calcPts(t,r);total+=pts;
    if(pts===20)exact++;
    else{rw=r.home>r.away?'H':r.home<r.away?'A':'D';tw=t.home>t.away?'H':t.home<t.away?'A':'D';if(rw===tw)wins++;}
  }
  var champ=getChampResult();if(champ&&getChampTip(pid)===champ){total+=50;champOk=true;}
  return {total:total,exact:exact,wins:wins,tipped:tipped,champOk:champOk};
}

// ── LEADERBOARD ───────────────────────────────────────────
function renderLeaderboard(){
  var ranked=[],i,sc,p,med,rc;
  for(i=0;i<PLAYERS.length;i++){sc=playerScore(PLAYERS[i].id);ranked.push({p:PLAYERS[i],sc:sc});}
  ranked.sort(function(a,b){return b.sc.total-a.sc.total;});
  var html='<div class="sh"><div class="sh-title">Tabulka tipérů</div></div><div class="lb-table">';
  for(i=0;i<ranked.length;i++){
    p=ranked[i].p;sc=ranked[i].sc;
    med=i===0?'&#129351;':i===1?'&#129352;':i===2?'&#129353;':(i+1)+'.';rc=i===0?'g':i===1?'s':i===2?'b':'';
    html+='<div class="lb-row"><div class="lb-rank '+rc+'">'+med+'</div>'
      +'<div class="avatar-wrap" style="width:40px;height:40px;flex-shrink:0;">'+makeAvatar(p.id,p.name)+'</div>'
      +'<div class="lb-info"><div class="lb-name">'+p.name+'</div>'
      +'<div class="lb-detail">Přesně: '+sc.exact+'× · Vítěz: '+sc.wins+'× · Tipy: '+sc.tipped+(sc.champOk?' · ⚽+50b':'')+'</div></div>'
      +'<div><div class="lb-pts">'+sc.total+'</div><div class="lb-ptslabel">bodů</div></div></div>';
  }
  document.getElementById('tab-leaderboard').innerHTML=html+'</div>';
}

// ── MOJE TIPY ─────────────────────────────────────────────
function renderMoje(){
  var el=document.getElementById('tab-moje'),i,m,t,r,ht,at,pts,ph,rows=[];
  if(!currentUser||currentUser.id==='admin'){el.innerHTML='<div class="empty"><div class="empty-txt">Přihlas se jako hráč</div></div>';return;}
  for(i=0;i<ALL_MATCHES.length;i++){
    m=ALL_MATCHES[i];t=getTip(currentUser.id,m.id);if(!t)continue;
    r=getResult(m.id);ht=getTeam(m.homeTeam);at=getTeam(m.awayTeam);
    pts=r?calcPts(t,r):null;
    ph=pts===null?'':pts===20?'<span class="pts-pill pts-exact">+20!</span>':pts>0?'<span class="pts-pill pts-win">+'+pts+'b</span>':'<span class="pts-pill pts-zero">0b</span>';
    rows.push('<div class="match-card has-tip"><div class="match-row">'
      +'<div class="mr-time"><div class="mr-date">'+m.date.slice(5).replace('-','.')+'</div><div class="mr-clock">'+m.time+'</div></div>'
      +'<div class="mr-home"><span class="t-name right">'+ht.n+'</span><span class="t-flag">'+ht.f+'</span></div>'
      +'<div class="mr-score"><span class="score-static">'+t.home+'</span><span class="score-sep">:</span><span class="score-static">'+t.away+'</span></div>'
      +'<div class="mr-away"><span class="t-flag">'+at.f+'</span><span class="t-name">'+at.n+'</span></div>'
      +'<div class="mr-action">'+ph+(r?'<div style="font-size:9px;color:var(--dim)">Výsl: '+r.home+':'+r.away+'</div>':'')+'</div>'
      +'</div></div>');
  }
  el.innerHTML='<div class="sh"><div class="sh-title">Moje tipy</div><span class="sh-count">'+rows.length+'</span></div>'
    +(rows.length?rows.join(''):'<div class="empty"><div class="empty-txt">Zatím žádné tipy</div></div>');
}

// ── ADMIN ─────────────────────────────────────────────────
var adminGrp='A';
function renderAdmin(){
  var el=document.getElementById('tab-admin'),i,m,pt,champR;
  if(!currentUser||currentUser.id!=='admin'){el.innerHTML='';return;}
  pt=getPoT();champR=getChampResult();
  var champOpts='';
  ALL_TEAMS.filter(function(t){return t.id!=='TBD';}).forEach(function(t){champOpts+='<option value="'+t.id+'"'+(champR===t.id?' selected':'')+'>'+t.f+' '+t.n+'</option>';});

  el.innerHTML='<div class="admin-card"><div class="admin-title">Zadat výsledky</div>'
    +'<div class="inner-tabs" style="margin-bottom:14px">'
    +GROUP_KEYS.map(function(g){return '<div class="itab'+(adminGrp===g?' active':'')+'" data-g="'+g+'">'+(g==='KO'?'Vyřaz.':'Sk. '+g)+'</div>';}).join('')
    +'</div><div id="admin-res"></div></div>'
    +'<div class="admin-card"><div class="admin-title">⚽ Vítěz šampionátu</div>'
    +'<select class="po-select" id="champ-result-sel">'+champOpts+'</select>'
    +'<button class="save-btn" style="margin-top:10px;width:100%" id="save-champ-btn">Uložit šampiona</button>'
    +(champR?'<div style="margin-top:8px;font-size:12px;color:var(--green);font-weight:700;">✅ '+getTeam(champR).f+' '+getTeam(champR).n+'</div>':'')
    +'</div>';

  el.querySelectorAll('.itab').forEach(function(t){t.addEventListener('click',function(){switchAG(t.getAttribute('data-g'));});});
  document.getElementById('save-champ-btn').addEventListener('click',function(){
    var sel=document.getElementById('champ-result-sel');if(!sel||!sel.value){showToast('Vyber tým');return;}
    saveChampResultLS(sel.value);showToast('Šampion uložen!');renderAdmin();
  });
  renderAR();
}
function switchAG(g){
  adminGrp=g;
  document.querySelectorAll('#tab-admin .itab').forEach(function(t){t.classList.toggle('active',t.getAttribute('data-g')===g);});
  renderAR();
}
function renderAR(){
  var el=document.getElementById('admin-res');if(!el)return;
  var matches=adminGrp==='KO'?KNOCKOUT:GROUP_MATCHES.filter(function(m){return m.group===adminGrp;});
  el.innerHTML='';
  matches.forEach(function(m){
    var ht=getTeam(m.homeTeam),at=getTeam(m.awayTeam),r=getResult(m.id);
    var row=document.createElement('div');row.className='admin-row';
    row.innerHTML='<div class="res-team right">'+ht.f+' '+ht.n+'</div>'
      +'<input type="number" class="res-input" id="rh_'+m.id+'" value="'+(r!=null?r.home:'')+'" min="0" max="20">'
      +'<span style="font-size:18px;color:var(--dim);font-family:Teko">:</span>'
      +'<input type="number" class="res-input" id="ra_'+m.id+'" value="'+(r!=null?r.away:'')+'" min="0" max="20">'
      +'<div class="res-team">'+at.n+' '+at.f+'</div>';
    var sb=document.createElement('button');sb.className='res-btn';sb.textContent='✓';
    sb.addEventListener('click',function(){
      var h=parseInt(document.getElementById('rh_'+m.id).value),a=parseInt(document.getElementById('ra_'+m.id).value);
      if(isNaN(h)||isNaN(a)){showToast('Zadej oba');return;}
      saveResultLS(m.id,h,a);showToast('Uloženo!');renderAR();});
    row.appendChild(sb);
    if(r){var db=document.createElement('button');db.className='del-btn';db.textContent='✕';
      db.addEventListener('click',function(){if(confirm('Smazat?')){deleteResultLS(m.id);showToast('Smazáno');renderAR();}});
      row.appendChild(db);}
    el.appendChild(row);
  });
}

// ── TOAST ─────────────────────────────────────────────────
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2500);}

// ── INIT ──────────────────────────────────────────────────
(function(){
  var saved=S.g('session'),user=null,i;
  if(saved){
    if(saved.id==='admin')user={id:'admin',name:'Admin',gender:'m'};
    else for(i=0;i<PLAYERS.length;i++) if(PLAYERS[i].id===saved.id&&getPin(PLAYERS[i].id)){user=PLAYERS[i];break;}
  }
  if(user)showApp(user);else renderPlayerGrid();
  startSync();
})();
</script>
