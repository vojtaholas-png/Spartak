<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spartak VOTOČEK – Statistiky</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--red:#d4121e;--gold:#f0a500;--green:#2ecc71;--dark:#0d0d0d;--dark2:#151515;--dark3:#1e1e1e;--white:#f0f0f0;--muted:#888;--muted2:#555}
body{background:var(--dark);color:var(--white);font-family:Barlow,sans-serif;min-height:100vh}
.nav-top{position:sticky;top:0;z-index:100;background:rgba(13,13,13,.97);border-bottom:1px solid rgba(255,255,255,.07);padding:0 16px}
.nav-brand{display:flex;align-items:center;gap:10px;padding:10px 0 8px}
.nav-brand-text .t1{font-family:Bebas Neue,sans-serif;font-size:18px;letter-spacing:2px;color:var(--white)}
.nav-brand-text .t2{font-size:10px;letter-spacing:3px;color:var(--muted);text-transform:uppercase}
.wrap{max-width:700px;margin:0 auto;padding:24px 16px}
.sh{margin-bottom:20px;border-bottom:1px solid rgba(255,255,255,.08);padding-bottom:12px}
.sh-title{font-family:Bebas Neue,sans-serif;font-size:28px;letter-spacing:2px}
.sh-sub{font-size:11px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-top:2px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:28px}
.stat-box{background:var(--dark2);border:1px solid rgba(255,255,255,.07);padding:20px 16px;text-align:center}
.stat-num{font-family:Bebas Neue,sans-serif;font-size:52px;line-height:1;color:var(--gold)}
.stat-num.green{color:var(--green)}
.stat-num.red{color:var(--red)}
.stat-lbl{font-size:10px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-top:4px}
.card{background:var(--dark2);border:1px solid rgba(255,255,255,.07);padding:16px;margin-bottom:10px}
.day-row{display:flex;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04);gap:12px}
.day-row:last-child{border-bottom:none}
.day-date{font-size:12px;color:var(--muted);min-width:80px}
.day-bar-wrap{flex:1;height:6px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden}
.day-bar{height:6px;background:var(--red);border-radius:3px;transition:width .5s}
.day-count{font-family:Bebas Neue,sans-serif;font-size:16px;color:var(--white);min-width:32px;text-align:right}
.live-dot{display:inline-block;width:8px;height:8px;background:var(--green);border-radius:50%;animation:pulse 1.5s infinite;margin-right:6px}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.4)}}
.loading{text-align:center;padding:40px;color:var(--muted);font-size:14px}
.badge{background:var(--red);color:white;font-size:9px;padding:2px 5px;font-family:monospace;border-radius:2px;position:absolute;top:6px;right:8px}
.refresh-btn{background:none;border:1px solid rgba(255,255,255,.15);color:var(--muted);font-size:11px;letter-spacing:2px;padding:6px 14px;cursor:pointer;font-family:Barlow Condensed,sans-serif;text-transform:uppercase;display:block;margin:0 auto 24px}
.refresh-btn:hover{border-color:var(--red);color:var(--white)}
.no-data{text-align:center;padding:20px;color:var(--muted);font-style:italic;font-size:13px}
.section-title{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.online-badge{background:rgba(46,204,113,.15);border:1px solid rgba(46,204,113,.3);color:var(--green);font-size:11px;letter-spacing:2px;padding:3px 8px;font-family:Barlow Condensed,sans-serif;text-transform:uppercase}
</style>
</head>
<body>

<div class="nav-top" style="position:relative">
  <span class="badge">STATS</span>
  <div class="nav-brand">
    <div class="nav-brand-text">
      <div class="t1">Spartak Votoček</div>
      <div class="t2">Čelákovice · Návštěvnost</div>
    </div>
  </div>
</div>

<div class="wrap">

  <div class="sh" style="margin-top:8px">
    <div class="sh-title">Přehled</div>
    <div class="sh-sub" id="lastUpdate">Načítám...</div>
  </div>

  <div class="grid">
    <div class="stat-box">
      <div class="stat-num" id="totalVisits">–</div>
      <div class="stat-lbl">Celkem návštěv</div>
    </div>
    <div class="stat-box">
      <div class="stat-num green" id="onlineNow">–</div>
      <div class="stat-lbl"><span class="live-dot"></span>Právě online</div>
    </div>
    <div class="stat-box">
      <div class="stat-num" id="todayVisits">–</div>
      <div class="stat-lbl">Dnes</div>
    </div>
    <div class="stat-box">
      <div class="stat-num" id="uniqueDays">–</div>
      <div class="stat-lbl">Aktivních dní</div>
    </div>
  </div>

  <button class="refresh-btn" onclick="loadStats()">↻ Obnovit</button>

  <div class="sh">
    <div class="sh-title">Posledních 14 dní</div>
    <div class="sh-sub">Denní návštěvy</div>
  </div>
  <div class="card" id="chartWrap"><div class="loading">Načítám...</div></div>

  <div class="sh" style="margin-top:24px">
    <div class="sh-title">Poslední návštěvy</div>
    <div class="sh-sub">Živý přehled</div>
  </div>
  <div id="recentWrap"><div class="loading">Načítám...</div></div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
var db;
const FB_CFG = {
  apiKey: "AIzaSyB_BagFO5mf-qDwBVrVbxULXBD9tv0cjVQ",
  authDomain: "spartak-nohejbal.firebaseapp.com",
  projectId: "spartak-nohejbal",
  appId: "1:252334492142:web:71180fbbb65737be34e6ff"
};

firebase.initializeApp(FB_CFG);
db = firebase.firestore();

function todayStr(){ return new Date().toISOString().slice(0,10); }
function nowStr(){ return new Date().toISOString(); }
function fmtDate(d){ var p=d.split('-'); return p[2]+'.'+p[1]+'.'+p[0].slice(2); }
function fmtTime(iso){ var d=new Date(iso); return d.getHours()+':'+String(d.getMinutes()).padStart(2,'0'); }

// ── Track this visit ──────────────────────────────
function trackVisit(){
  var today = todayStr();
  var now = nowStr();
  var sessionKey = 'sv_session_'+today;
  var isNew = !sessionStorage.getItem(sessionKey);

  // Always log as online (update every 30s)
  var onlineRef = db.collection('stats_online').doc('session_'+Date.now()+'_'+Math.random().toString(36).slice(2));
  onlineRef.set({ ts: now, page: 'fanousci', expires: new Date(Date.now() + 60000).toISOString() });

  if(isNew){
    sessionStorage.setItem(sessionKey, '1');
    // Increment daily counter
    var dayRef = db.collection('stats_daily').doc(today);
    db.runTransaction(function(tx){
      return tx.get(dayRef).then(function(snap){
        var count = snap.exists ? (snap.data().count||0) : 0;
        tx.set(dayRef, { count: count+1, date: today });
      });
    });
    // Log visit detail
    db.collection('stats_visits').add({ ts: now, date: today, page: 'fanousci' });
  }

  // Refresh online every 30s
  setInterval(function(){
    onlineRef.set({ ts: new Date().toISOString(), page: 'fanousci', expires: new Date(Date.now() + 60000).toISOString() });
  }, 30000);
}

// ── Load stats ────────────────────────────────────
function loadStats(){
  var now = new Date();
  document.getElementById('lastUpdate').textContent = 'Aktualizováno: '+now.getHours()+':'+String(now.getMinutes()).padStart(2,'0')+':'+String(now.getSeconds()).padStart(2,'0');

  // Online now (sessions active in last 60s)
  db.collection('stats_online').get().then(function(snap){
    var alive = 0;
    var nowIso = new Date().toISOString();
    snap.forEach(function(d){ if(d.data().expires > nowIso) alive++; });
    document.getElementById('onlineNow').textContent = alive;
  }).catch(function(){ document.getElementById('onlineNow').textContent = '?'; });

  // Daily stats - last 14 days
  var days = [];
  for(var i=13;i>=0;i--){
    var d = new Date(); d.setDate(d.getDate()-i);
    days.push(d.toISOString().slice(0,10));
  }

  db.collection('stats_daily').get().then(function(snap){
    var data = {};
    snap.forEach(function(d){ data[d.id] = d.data().count||0; });

    var total = Object.values(data).reduce(function(s,v){ return s+v; }, 0);
    var todayCount = data[todayStr()]||0;
    var activeDays = Object.keys(data).filter(function(k){ return data[k]>0; }).length;

    document.getElementById('totalVisits').textContent = total;
    document.getElementById('todayVisits').textContent = todayCount;
    document.getElementById('uniqueDays').textContent = activeDays;

    // Chart
    var dayData = days.map(function(d){ return {date:d, count:data[d]||0}; });
    var maxCount = Math.max.apply(null, dayData.map(function(d){ return d.count; })) || 1;

    var html = '';
    dayData.forEach(function(d){
      var pct = Math.round(d.count/maxCount*100);
      var isToday = d.date === todayStr();
      html += '<div class="day-row">' +
        '<div class="day-date" style="'+(isToday?'color:var(--gold);font-weight:700':'')+'">'+fmtDate(d.date)+(isToday?' ★':'')+'</div>' +
        '<div class="day-bar-wrap"><div class="day-bar" style="width:'+pct+'%;'+(isToday?'background:var(--gold)':'')+'"></div></div>' +
        '<div class="day-count" style="'+(isToday?'color:var(--gold)':'')+'">'+d.count+'</div>' +
      '</div>';
    });
    document.getElementById('chartWrap').innerHTML = html || '<div class="no-data">Zatím žádné návštěvy.</div>';
  });

  // Recent visits
  db.collection('stats_visits').limit(50).get().then(function(snap){
    if(snap.empty){ document.getElementById('recentWrap').innerHTML = '<div class="no-data">Zatím žádné záznamy.</div>'; return; }
    var visits = [];
    snap.forEach(function(d){ visits.push(d.data()); });
    visits.sort(function(a,b){ return b.ts > a.ts ? 1 : -1; });
    visits = visits.slice(0,20);
    var html = '<div class="card">';
    visits.forEach(function(v){
      var dt = new Date(v.ts);
      var dateStr = v.date === todayStr() ? 'Dnes '+fmtTime(v.ts) : fmtDate(v.date)+' '+fmtTime(v.ts);
      html += '<div class="day-row">' +
        '<div style="font-size:20px">👤</div>' +
        '<div style="flex:1;font-size:13px">'+dateStr+'</div>' +
        '<div style="font-size:11px;color:var(--muted)">fanousci.html</div>' +
      '</div>';
    });
    html += '</div>';
    document.getElementById('recentWrap').innerHTML = html;
  });
}

trackVisit();
loadStats();
setInterval(loadStats, 30000);
</script>
</body>
</html>
