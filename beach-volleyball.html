<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beach Volejbal – Lázně Toušeň</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#063d5c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Beach VB">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --sand:   #f5e6c8; --ocean:  #0a7ea4; --sky:    #38bdf8;
    --deep:   #063d5c; --white:  #ffffff; --text:   #1a2e3b;
    --muted:  #6b8a9a; --green:  #22c55e; --red:    #ef4444;
    --gold:   #f59e0b; --radius: 14px;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--sand); color: var(--text); min-height: 100vh; overflow-x: hidden; }
  body::before {
    content: ''; position: fixed; inset: 0;
    background: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(56,189,248,.25) 0%, transparent 70%),
      radial-gradient(ellipse 60% 40% at 90% 100%, rgba(10,126,164,.15) 0%, transparent 60%),
      linear-gradient(180deg, #daeef7 0%, #f5e6c8 45%, #ede0c0 100%);
    z-index: -2;
  }
  body::after { content: ''; position: fixed; bottom: 0; left: 0; right: 0; height: 120px; background: linear-gradient(to top, rgba(10,62,92,.08), transparent); z-index: -1; }

  #loading-bar { position: fixed; top: 0; left: 0; height: 3px; background: linear-gradient(90deg, var(--sky), var(--ocean)); width: 0; transition: width .4s, opacity .5s; z-index: 1000; }

  /* HEADER */
  header { text-align: center; padding: 44px 20px 24px; }
  .ball-icon { font-size: 3rem; display: block; margin-bottom: 8px; animation: bounce 2.4s ease-in-out infinite; }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
  header h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(2.4rem,7vw,4rem); letter-spacing: .04em; color: var(--deep); line-height: 1; text-shadow: 0 2px 0 rgba(255,255,255,.7); }
  header p { margin-top: 8px; color: var(--ocean); font-weight: 600; font-size: 1rem; }
  .badge { display: inline-flex; align-items: center; gap: 6px; background: var(--deep); color: var(--sand); border-radius: 999px; padding: 5px 16px; font-size: .78rem; font-weight: 600; letter-spacing: .05em; margin-top: 12px; text-transform: uppercase; }
  .badge span { color: var(--sky); }

  /* TABS */
  .tabs { display: flex; gap: 4px; max-width: 780px; margin: 0 auto 24px; padding: 0 18px; }
  .tab-btn { flex: 1; padding: 12px 10px; background: rgba(255,255,255,.5); border: 1.5px solid rgba(255,255,255,.7); border-radius: 10px; font-family: 'Bebas Neue', sans-serif; font-size: 1rem; letter-spacing: .06em; color: var(--muted); cursor: pointer; transition: all .2s; }
  .tab-btn:hover { background: rgba(255,255,255,.75); color: var(--deep); }
  .tab-btn.active { background: linear-gradient(135deg, var(--deep), var(--ocean)); color: white; border-color: transparent; box-shadow: 0 4px 14px rgba(10,126,164,.3); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* CONTAINER */
  .container { max-width: 780px; margin: 0 auto; padding: 0 18px 60px; }

  /* CARDS */
  .card { background: rgba(255,255,255,.82); backdrop-filter: blur(12px); border-radius: var(--radius); padding: 28px 28px 22px; box-shadow: 0 4px 32px rgba(6,61,92,.1), 0 1px 0 rgba(255,255,255,.9) inset; border: 1px solid rgba(255,255,255,.6); margin-bottom: 24px; }
  .card h2 { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; letter-spacing: .05em; color: var(--deep); margin-bottom: 18px; }
  .form-row { display: flex; gap: 12px; flex-wrap: wrap; }
  .form-group { flex: 1; min-width: 140px; display: flex; flex-direction: column; gap: 6px; }
  label { font-size: .82rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
  input[type=text], input[type=password], input[type=time], select {
    border: 1.5px solid rgba(10,126,164,.25); border-radius: 9px; padding: 11px 14px;
    font-family: inherit; font-size: .97rem; background: rgba(255,255,255,.9);
    color: var(--text); outline: none; transition: border-color .2s, box-shadow .2s; width: 100%;
  }
  input:focus, select:focus { border-color: var(--ocean); box-shadow: 0 0 0 3px rgba(10,126,164,.12); }

  /* BUTTONS */
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 11px 18px; border: none; border-radius: 9px; font-family: 'Bebas Neue', sans-serif; font-size: 1rem; letter-spacing: .07em; cursor: pointer; transition: transform .15s, box-shadow .15s, opacity .15s; }
  .btn:hover { transform: translateY(-2px); }
  .btn:active { transform: translateY(0); }
  .btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }
  .btn-primary { background: linear-gradient(135deg, var(--ocean), var(--deep)); color: white; box-shadow: 0 4px 16px rgba(10,126,164,.35); width: 100%; margin-top: 16px; font-size: 1.2rem; padding: 14px; }
  .btn-primary:hover { box-shadow: 0 6px 22px rgba(10,126,164,.45); }
  .btn-green { background: linear-gradient(135deg, #22c55e, #16a34a); color: white; box-shadow: 0 2px 10px rgba(34,197,94,.3); flex: 1; }
  .btn-red   { background: linear-gradient(135deg, #ef4444, #b91c1c); color: white; box-shadow: 0 2px 10px rgba(239,68,68,.3); flex: 1; }
  .btn-amber { background: linear-gradient(135deg, #f59e0b, #d97706); color: white; box-shadow: 0 2px 10px rgba(245,158,11,.3); }
  .btn-ghost { background: rgba(255,255,255,.6); border: 1.5px solid rgba(10,126,164,.2); color: var(--deep); }
  .btn-signed { background: linear-gradient(135deg, #ef4444, #b91c1c) !important; box-shadow: 0 2px 10px rgba(239,68,68,.3) !important; }

  /* SECTION TITLE */
  .section-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; letter-spacing: .05em; color: var(--deep); margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
  .section-title::after { content: ''; flex: 1; height: 2px; background: linear-gradient(to right, var(--ocean), transparent); border-radius: 2px; }

  /* SESSION GRID */
  .sessions-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
  .session-card { background: rgba(255,255,255,.78); backdrop-filter: blur(10px); border-radius: var(--radius); overflow: hidden; box-shadow: 0 2px 20px rgba(6,61,92,.08); border: 1px solid rgba(255,255,255,.6); transition: transform .2s, box-shadow .2s; }
  .session-card:hover { transform: translateY(-3px); box-shadow: 0 6px 28px rgba(6,61,92,.14); }
  .session-card.cancelled { opacity: .65; }
  .session-card.cancelled .session-header { background: linear-gradient(135deg, #64748b, #94a3b8); }
  .session-header { background: linear-gradient(135deg, var(--deep), var(--ocean)); color: white; padding: 16px 20px 14px; display: flex; justify-content: space-between; align-items: flex-start; }
  .session-date { font-family: 'Bebas Neue', sans-serif; font-size: 1.25rem; letter-spacing: .04em; }
  .session-time { font-size: .82rem; opacity: .85; margin-top: 1px; }
  .cancelled-badge { background: #ef4444; border-radius: 5px; padding: 2px 8px; font-size: .72rem; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; margin-top: 4px; display: inline-block; }
  .session-count { background: rgba(255,255,255,.18); border-radius: 8px; padding: 6px 12px; text-align: center; min-width: 54px; flex-shrink: 0; }
  .session-count .num { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; line-height: 1; display: block; }
  .session-count .lbl { font-size: .68rem; opacity: .8; text-transform: uppercase; letter-spacing: .06em; }
  .session-body { padding: 16px 20px; }
  .player-list { list-style: none; display: flex; flex-direction: column; gap: 7px; max-height: 200px; overflow-y: auto; padding-right: 4px; scrollbar-width: thin; scrollbar-color: var(--ocean) transparent; margin-bottom: 12px; min-height: 40px; }
  .empty-msg { color: var(--muted); font-size: .88rem; padding: 10px 0; text-align: center; font-style: italic; }
  .player-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; background: rgba(56,189,248,.08); border-radius: 8px; border: 1px solid rgba(56,189,248,.15); font-size: .9rem; animation: fadeIn .3s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:none} }
  .player-num { width: 22px; height: 22px; background: var(--ocean); color: white; border-radius: 50%; font-size: .72rem; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .player-name { flex: 1; font-weight: 500; }
  .btn-remove { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 1rem; padding: 2px 4px; border-radius: 4px; transition: color .15s, background .15s; }
  .btn-remove:hover { color: var(--red); background: rgba(239,68,68,.08); }
  .session-footer { display: flex; gap: 8px; border-top: 1px solid rgba(10,126,164,.1); padding-top: 12px; }

  /* ADMIN PANEL */
  .admin-login-wrap { max-width: 400px; margin: 0 auto; }
  .admin-badge { display: inline-flex; align-items: center; gap: 8px; background: linear-gradient(135deg, #7c3aed, #4c1d95); color: white; border-radius: 10px; padding: 6px 16px; font-size: .82rem; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; margin-bottom: 20px; }

  .admin-session-card { background: rgba(255,255,255,.78); border-radius: var(--radius); overflow: hidden; box-shadow: 0 2px 16px rgba(6,61,92,.08); border: 1px solid rgba(255,255,255,.6); margin-bottom: 14px; }
  .admin-session-header { background: linear-gradient(135deg, var(--deep), #1e5f7a); color: white; padding: 14px 18px; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
  .admin-session-header .date { font-family: 'Bebas Neue', sans-serif; font-size: 1.15rem; letter-spacing: .04em; }
  .admin-session-header .time { font-size: .82rem; opacity: .85; }
  .admin-session-body { padding: 14px 18px; display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; }
  .admin-time-group { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 120px; }
  .admin-time-group label { font-size: .75rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
  .admin-btns { display: flex; gap: 8px; flex-wrap: wrap; }
  .cancelled-label { background: rgba(239,68,68,.12); border: 1px solid rgba(239,68,68,.25); border-radius: 7px; padding: 6px 12px; font-size: .82rem; font-weight: 700; color: var(--red); display: flex; align-items: center; gap: 6px; }

  /* STATS */
  .stats-info { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 20px; }
  .stats-info-box { flex: 1; min-width: 100px; background: rgba(255,255,255,.82); backdrop-filter: blur(10px); border-radius: 12px; padding: 16px 20px; border: 1px solid rgba(255,255,255,.6); box-shadow: 0 2px 16px rgba(6,61,92,.07); text-align: center; }
  .stats-info-box .big { font-family: 'Bebas Neue', sans-serif; font-size: 2.2rem; color: var(--deep); line-height: 1; display: block; }
  .stats-info-box .lbl { font-size: .75rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .06em; margin-top: 4px; display: block; }
  .stats-card { background: rgba(255,255,255,.82); backdrop-filter: blur(12px); border-radius: var(--radius); box-shadow: 0 4px 32px rgba(6,61,92,.1); border: 1px solid rgba(255,255,255,.6); overflow: hidden; }
  .stats-header-row { display: grid; grid-template-columns: 2rem 1fr 5rem 1fr; gap: 12px; align-items: center; padding: 12px 20px; background: linear-gradient(135deg, var(--deep), var(--ocean)); color: white; font-size: .75rem; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; }
  .stat-row { display: grid; grid-template-columns: 2rem 1fr 5rem 1fr; gap: 12px; align-items: center; padding: 12px 20px; border-bottom: 1px solid rgba(10,126,164,.08); transition: background .15s; animation: fadeIn .3s ease; }
  .stat-row:last-child { border-bottom: none; }
  .stat-row:hover { background: rgba(56,189,248,.06); }
  .stat-rank { font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; color: var(--muted); text-align: center; }
  .stat-rank.gold { color: #f59e0b; } .stat-rank.silver { color: #94a3b8; } .stat-rank.bronze { color: #b45309; }
  .stat-name { font-weight: 600; font-size: .97rem; }
  .stat-count { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; color: var(--ocean); text-align: center; }
  .stat-bar-wrap { height: 8px; background: rgba(10,126,164,.12); border-radius: 99px; overflow: hidden; }
  .stat-bar { height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--sky), var(--ocean)); transition: width .6s cubic-bezier(.34,1.2,.64,1); }
  .stats-empty { padding: 40px; text-align: center; color: var(--muted); font-style: italic; }

  /* TOAST */
  #toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--deep); color: white; padding: 13px 24px; border-radius: 10px; font-weight: 600; font-size: .9rem; box-shadow: 0 6px 24px rgba(0,0,0,.25); z-index: 9999; transition: transform .3s cubic-bezier(.34,1.56,.64,1), opacity .3s; opacity: 0; pointer-events: none; white-space: nowrap; }
  #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  #toast.green { background: #16a34a; } #toast.red { background: #b91c1c; }

  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.4); border-top-color: white; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to{transform:rotate(360deg)} }

  @media(max-width:500px){
    .signup-card{padding:20px 16px 18px}
    .session-header{flex-direction:column;align-items:flex-start;gap:8px}
    .stats-header-row,.stat-row{grid-template-columns:1.6rem 1fr 4rem}
    .stat-bar-wrap{display:none}
    .admin-session-body{flex-direction:column}
  }
</style>
</head>
<body>
<div id="loading-bar"></div>

<header>
  <span class="ball-icon">🏐</span>
  <h1>Beach Volejbal</h1>
  <p>Kurty Lázně Toušeň</p>
  <div class="badge">Každou středu &nbsp;·&nbsp; <span>17:00 – 19:00</span></div>
</header>

<div class="tabs">
  <button class="tab-btn active" onclick="_switchTab('treninky',this)">🏐 Tréninky</button>
  <button class="tab-btn" onclick="_switchTab('statistiky',this)">📊 Statistiky</button>
  <button class="tab-btn" onclick="_switchTab('admin',this)">🔐 Admin</button>
</div>

<!-- TAB: TRÉNINKY -->
<div class="tab-panel active" id="tab-treninky">
  <div class="container">
    <div class="card">
      <h2>📋 Přihlásit se na trénink</h2>
      <div class="form-row">
        <div class="form-group">
          <label for="inp-name">Jméno a příjmení</label>
          <input type="text" id="inp-name" placeholder="Jana Nováková" autocomplete="name">
        </div>
      </div>
      <div class="form-row" style="margin-top:12px">
        <div class="form-group">
          <label for="sel-session">Vybrat trénink</label>
          <select id="sel-session"></select>
        </div>
      </div>
      <button class="btn btn-primary" id="btn-main-signup">✔ Potvrdit účast</button>
    </div>
    <div class="section-title">Nadcházející tréninky</div>
    <div class="sessions-grid" id="sessions-grid">
      <div style="color:var(--muted);padding:20px;text-align:center;grid-column:1/-1"><span class="spinner"></span> Načítám tréninky...</div>
    </div>
  </div>
</div>

<!-- TAB: STATISTIKY -->
<div class="tab-panel" id="tab-statistiky">
  <div class="container">
    <div class="stats-info" id="stats-summary"></div>
    <div class="section-title">Žebříček účasti</div>
    <div class="stats-card" id="stats-table">
      <div class="stats-empty"><span class="spinner"></span> Načítám...</div>
    </div>
  </div>
</div>

<!-- TAB: ADMIN -->
<div class="tab-panel" id="tab-admin">
  <div class="container">

    <!-- LOGIN -->
    <div id="admin-login" class="card admin-login-wrap">
      <h2>🔐 Admin přihlášení</h2>
      <div class="form-group">
        <label for="inp-pwd">Heslo</label>
        <input type="password" id="inp-pwd" placeholder="••••••••" autocomplete="off">
      </div>
      <button class="btn btn-primary" onclick="_adminLogin()">Přihlásit se</button>
    </div>

    <!-- ADMIN PANEL (hidden until login) -->
    <div id="admin-panel" style="display:none">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px">
        <div class="admin-badge">🛡️ Admin režim</div>
        <button class="btn btn-ghost" style="padding:8px 14px;font-family:inherit;font-size:.85rem" onclick="_adminLogout()">Odhlásit se</button>
      </div>
      <div class="section-title">Správa tréninků</div>
      <div id="admin-sessions-list">
        <div style="color:var(--muted);padding:20px;text-align:center"><span class="spinner"></span> Načítám...</div>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, onSnapshot, updateDoc, arrayUnion, arrayRemove, collection, getDocs, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyBZ7DNAtm0B5bT8p_VAabxfPcvMNjQ0zGM",
  authDomain: "beach-tousen.firebaseapp.com",
  projectId: "beach-tousen",
  storageBucket: "beach-tousen.firebasestorage.app",
  messagingSenderId: "629671195613",
  appId: "1:629671195613:web:5308ec3528b127f9ff3c34"
});
const db = getFirestore(app);

const ADMIN_PWD = 'tousen';

// ── DATES ─────────────────────────────────────────────────────────────
function getNextWednesdays(n = 6) {
  const result = [];
  const d = new Date(); d.setHours(0,0,0,0);
  const diff = (3 - d.getDay() + 7) % 7 || 7;
  d.setDate(d.getDate() + diff);
  for (let i = 0; i < n; i++) { result.push(new Date(d)); d.setDate(d.getDate() + 7); }
  return result;
}
const dates = getNextWednesdays(6);
const ids   = dates.map(d => d.toISOString().split('T')[0]);

// sessions[id] = { date, players[], cancelled, timeStart, timeEnd }
const sessions = {};
dates.forEach((d, i) => {
  sessions[ids[i]] = { date: d, players: [], cancelled: false, timeStart: '17:00', timeEnd: '19:00' };
});

let allSessionsData = {};

// ── FORMAT ────────────────────────────────────────────────────────────
const fmtLong  = d => d.toLocaleDateString('cs-CZ', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
const fmtShort = d => d.toLocaleDateString('cs-CZ', { day:'numeric', month:'short' });
const esc  = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const norm = s => s.trim().toLowerCase();

// ── LOADING ───────────────────────────────────────────────────────────
let loaded = 0;
function setBar(p) {
  const b = document.getElementById('loading-bar');
  b.style.width = p + '%';
  if (p >= 100) setTimeout(() => b.style.opacity = '0', 600);
}
setBar(5);

// ── INIT ──────────────────────────────────────────────────────────────
(async () => {
  // Zajisti že každý dokument existuje — ale NIKDY nepřepisuj cancelled/časy
  // Zapisujeme pouze pole "players" pokud dokument neexistuje
  for (const id of ids) {
    const ref = doc(db, 'sessions', id);
    const snap = await getDoc(ref);
    if (!snap.exists()) {
      // Nový dokument — nastav výchozí hodnoty
      await setDoc(ref, { players: [], cancelled: false, timeStart: '17:00', timeEnd: '19:00' });
      console.log('Vytvořen nový dokument:', id);
    } else {
      console.log('Dokument již existuje, nepřepisuji:', id, snap.data());
    }
  }
  setBar(20);
  const snap = await getDocs(collection(db, 'sessions'));
  snap.forEach(d => { allSessionsData[d.id] = d.data()?.players || []; });
  setBar(40);

  ids.forEach(id => {
    onSnapshot(doc(db, 'sessions', id), snap => {
      const data = snap.data() || {};
      sessions[id].players   = data.players   || [];
      sessions[id].cancelled = data.cancelled || false;
      sessions[id].timeStart = data.timeStart || '17:00';
      sessions[id].timeEnd   = data.timeEnd   || '19:00';
      allSessionsData[id]    = sessions[id].players;
      loaded++;
      setBar(40 + (loaded / ids.length) * 60);
      renderAll();
    });
  });
})();

// ── RENDER ALL ────────────────────────────────────────────────────────
function renderAll() {
  renderSelect();
  renderGrid();
  if (document.getElementById('tab-statistiky').classList.contains('active')) renderStats();
  if (document.getElementById('admin-panel').style.display !== 'none') renderAdminSessions();
}

// ── SELECT ────────────────────────────────────────────────────────────
function renderSelect() {
  const sel = document.getElementById('sel-session');
  const prev = sel.value;
  sel.innerHTML = ids.map(id => {
    const s = sessions[id];
    const label = s.cancelled ? '🚫 ZRUŠENO – ' : '';
    return `<option value="${id}">${label}${fmtLong(s.date)} – ${s.players.length} hráčů</option>`;
  }).join('');
  if (prev && ids.includes(prev)) sel.value = prev;
}

// ── SESSION GRID ──────────────────────────────────────────────────────
function renderGrid() {
  const myName = document.getElementById('inp-name').value.trim();
  document.getElementById('sessions-grid').innerHTML = ids.map(id => {
    const s = sessions[id];
    const isSigned  = myName && s.players.some(p => norm(p) === norm(myName));
    const timeLabel = `⏰ ${s.timeStart} – ${s.timeEnd} &nbsp;·&nbsp; Lázně Toušeň`;

    const items = s.players.length
      ? s.players.map((name, i) => `
          <li class="player-item">
            <span class="player-num">${i+1}</span>
            <span class="player-name">${esc(name)}</span>
            <button class="btn-remove" data-id="${id}" data-name="${esc(name)}" title="Odhlásit">✕</button>
          </li>`).join('')
      : '<li class="empty-msg">Zatím nikdo přihlášen</li>';

    const cancelledBadge = s.cancelled ? '<span class="cancelled-badge">Zrušeno</span>' : '';

    return `
    <div class="session-card ${s.cancelled ? 'cancelled' : ''}">
      <div class="session-header">
        <div>
          <div class="session-date">${fmtLong(s.date)}</div>
          <div class="session-time">${timeLabel}</div>
          ${cancelledBadge}
        </div>
        <div class="session-count">
          <span class="num">${s.players.length}</span>
          <span class="lbl">hráčů</span>
        </div>
      </div>
      <div class="session-body">
        ${s.cancelled ? '<div class="empty-msg" style="padding:14px 0">⚠️ Tento trénink byl zrušen</div>' : `
          <ul class="player-list">${items}</ul>
          <div class="session-footer">
            <button class="btn btn-green ${isSigned ? 'btn-signed' : ''}" data-id="${id}">
              ${isSigned ? '✕ Odhlásit se' : '+ Přihlásit se'}
            </button>
          </div>`}
      </div>
    </div>`;
  }).join('');

  document.getElementById('sessions-grid').querySelectorAll('[data-id].btn-green').forEach(btn =>
    btn.addEventListener('click', () => quickJoin(btn.dataset.id)));
  document.getElementById('sessions-grid').querySelectorAll('.btn-remove').forEach(btn =>
    btn.addEventListener('click', () => removePlayer(btn.dataset.id, btn.dataset.name)));
}

// ── STATS ─────────────────────────────────────────────────────────────
function buildStats() {
  const counts = {};
  Object.values(allSessionsData).forEach(players => {
    players.forEach(name => {
      const key = norm(name);
      if (!counts[key]) counts[key] = { display: name, count: 0 };
      counts[key].count++;
    });
  });
  return Object.values(counts).sort((a, b) => b.count - a.count);
}

function renderStats() {
  const stats = buildStats();
  const totalSessions = Object.keys(allSessionsData).length;
  const totalPlayers  = stats.length;
  const totalSignups  = stats.reduce((s, p) => s + p.count, 0);
  const maxCount      = stats[0]?.count || 1;

  document.getElementById('stats-summary').innerHTML = `
    <div class="stats-info-box"><span class="big">${totalPlayers}</span><span class="lbl">Unikátní hráči</span></div>
    <div class="stats-info-box"><span class="big">${totalSessions}</span><span class="lbl">Celkem tréninků</span></div>
    <div class="stats-info-box"><span class="big">${totalSignups}</span><span class="lbl">Celkem přihlášení</span></div>`;

  if (!stats.length) { document.getElementById('stats-table').innerHTML = '<div class="stats-empty">Zatím žádná data 🏖️</div>'; return; }

  const rankIcon = i => {
    if (i === 0) return '<span class="stat-rank gold">🥇</span>';
    if (i === 1) return '<span class="stat-rank silver">🥈</span>';
    if (i === 2) return '<span class="stat-rank bronze">🥉</span>';
    return `<span class="stat-rank">${i+1}</span>`;
  };

  document.getElementById('stats-table').innerHTML = `
    <div class="stats-header-row"><div>#</div><div>Hráč</div><div style="text-align:center">Účastí</div><div>Aktivita</div></div>
    ${stats.map((p, i) => `
    <div class="stat-row">
      ${rankIcon(i)}
      <div class="stat-name">${esc(p.display)}</div>
      <div class="stat-count">${p.count}</div>
      <div class="stat-bar-wrap"><div class="stat-bar" style="width:${Math.round((p.count/maxCount)*100)}%"></div></div>
    </div>`).join('')}`;
}

// ── ADMIN SESSIONS ────────────────────────────────────────────────────
function renderAdminSessions() {
  document.getElementById('admin-sessions-list').innerHTML = ids.map(id => {
    const s = sessions[id];
    return `
    <div class="admin-session-card">
      <div class="admin-session-header">
        <div>
          <div class="date">${fmtLong(s.date)}</div>
          <div class="time">${s.timeStart} – ${s.timeEnd}</div>
        </div>
        ${s.cancelled ? '<span style="background:#ef4444;border-radius:6px;padding:3px 10px;font-size:.75rem;font-weight:700;letter-spacing:.05em">ZRUŠENO</span>' : ''}
      </div>
      <div class="admin-session-body">
        <div class="admin-time-group">
          <label>Začátek</label>
          <input type="time" id="ts-${id}" value="${s.timeStart}">
        </div>
        <div class="admin-time-group">
          <label>Konec</label>
          <input type="time" id="te-${id}" value="${s.timeEnd}">
        </div>
        <div class="admin-btns">
          <button class="btn btn-amber" data-id="${id}" data-action="time" style="padding:10px 14px">💾 Uložit čas</button>
          ${s.cancelled
            ? `<button class="btn btn-green" data-id="${id}" data-action="restore" style="padding:10px 14px">✅ Obnovit</button>`
            : `<button class="btn btn-red" data-id="${id}" data-action="cancel" style="padding:10px 14px">🚫 Zrušit</button>`
          }
        </div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('admin-sessions-list').querySelectorAll('[data-action]').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.id;
      const action = btn.dataset.action;
      if (action === 'time') adminSaveTime(id);
      if (action === 'cancel') adminCancelSession(id);
      if (action === 'restore') adminRestoreSession(id);
    });
  });
}

async function adminSaveTime(id) {
  const start = document.getElementById(`ts-${id}`).value;
  const end   = document.getElementById(`te-${id}`).value;
  if (!start || !end) { showToast('Zadej platný čas', 'red'); return; }
  try {
    await updateDoc(doc(db, 'sessions', id), { timeStart: start, timeEnd: end });
    showToast('Čas uložen ✅', 'green');
  } catch(e) { showToast('Chyba 😕', 'red'); console.error(e); }
}

async function adminCancelSession(id) {
  if (!confirm(`Opravdu zrušit trénink ${fmtShort(sessions[id].date)}?`)) return;
  try {
    await updateDoc(doc(db, 'sessions', id), { cancelled: true });
    showToast('Trénink zrušen 🚫', 'red');
  } catch(e) { showToast('Chyba 😕', 'red'); console.error(e); }
}

async function adminRestoreSession(id) {
  try {
    await updateDoc(doc(db, 'sessions', id), { cancelled: false });
    showToast('Trénink obnoven ✅', 'green');
  } catch(e) { showToast('Chyba 😕', 'red'); console.error(e); }
}

// ── ACTIONS ───────────────────────────────────────────────────────────
async function signupMain() {
  const name = document.getElementById('inp-name').value.trim();
  const id   = document.getElementById('sel-session').value;
  if (!name) { showToast('Zadej prosím své jméno 🙏', 'red'); return; }
  const s = sessions[id];
  if (s.cancelled) { showToast('Tento trénink je zrušen 🚫', 'red'); return; }
  if (s.players.some(p => norm(p) === norm(name))) { showToast('Na tento trénink už jsi přihlášen/a ✅', 'green'); return; }
  setBtnLoading(true);
  try {
    await updateDoc(doc(db, 'sessions', id), { players: arrayUnion(name) });
    showToast(`Přihlášen/a na ${fmtShort(s.date)} 🏐`, 'green');
  } catch(e) { showToast('Chyba při ukládání 😕', 'red'); console.error(e); }
  setBtnLoading(false);
}

async function quickJoin(id) {
  const name = document.getElementById('inp-name').value.trim();
  if (!name) { showToast('Nejprve zadej své jméno ve formuláři výše 👆', 'red'); return; }
  const s = sessions[id];
  if (s.cancelled) { showToast('Tento trénink je zrušen 🚫', 'red'); return; }
  const exact = s.players.find(p => norm(p) === norm(name));
  try {
    if (exact) {
      await updateDoc(doc(db, 'sessions', id), { players: arrayRemove(exact) });
      showToast(`Odhlášen/a z ${fmtShort(s.date)}`, '');
    } else {
      await updateDoc(doc(db, 'sessions', id), { players: arrayUnion(name) });
      showToast(`Přihlášen/a na ${fmtShort(s.date)} 🏐`, 'green');
    }
  } catch(e) { showToast('Chyba 😕', 'red'); console.error(e); }
}

async function removePlayer(id, name) {
  try {
    await updateDoc(doc(db, 'sessions', id), { players: arrayRemove(name) });
    showToast(`${name} odhlášen/a`, '');
  } catch(e) { showToast('Chyba 😕', 'red'); console.error(e); }
}

// ── UTILS ─────────────────────────────────────────────────────────────
function setBtnLoading(on) {
  const btn = document.getElementById('btn-main-signup');
  btn.disabled = on;
  btn.innerHTML = on ? '<span class="spinner"></span> Ukládám...' : '✔ Potvrdit účast';
}
let toastTimer;
function showToast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = '', 2800);
}

document.getElementById('btn-main-signup').addEventListener('click', signupMain);
document.getElementById('inp-name').addEventListener('input', renderGrid);
document.getElementById('inp-pwd').addEventListener('keydown', e => { if (e.key === 'Enter') window._adminLogin(); });

// ── ADMIN AUTH ────────────────────────────────────────────────────────
window._adminLogin = function() {
  const pwd = document.getElementById('inp-pwd').value;
  if (pwd === ADMIN_PWD) {
    document.getElementById('admin-login').style.display = 'none';
    document.getElementById('admin-panel').style.display = 'block';
    renderAdminSessions();
    showToast('Přihlášen jako admin 🛡️', 'green');
  } else {
    showToast('Špatné heslo ❌', 'red');
    document.getElementById('inp-pwd').value = '';
  }
};
window._adminLogout = function() {
  document.getElementById('admin-login').style.display = 'block';
  document.getElementById('admin-panel').style.display = 'none';
  document.getElementById('inp-pwd').value = '';
  showToast('Odhlášen z admin režimu', '');
};

// ── TAB SWITCH ────────────────────────────────────────────────────────
window._switchTab = function(tab, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  btn.classList.add('active');
  if (tab === 'statistiky') renderStats();
};
</script>
