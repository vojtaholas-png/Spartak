<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beach Volejbal – Lázně Toušeň</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --sand:    #f5e6c8;
    --ocean:   #0a7ea4;
    --sky:     #38bdf8;
    --deep:    #063d5c;
    --white:   #ffffff;
    --text:    #1a2e3b;
    --muted:   #6b8a9a;
    --green:   #22c55e;
    --red:     #ef4444;
    --radius:  14px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--sand);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(56,189,248,.25) 0%, transparent 70%),
      radial-gradient(ellipse 60% 40% at 90% 100%, rgba(10,126,164,.15) 0%, transparent 60%),
      linear-gradient(180deg, #daeef7 0%, #f5e6c8 45%, #ede0c0 100%);
    z-index: -2;
  }
  body::after {
    content: '';
    position: fixed; bottom: 0; left: 0; right: 0; height: 120px;
    background: linear-gradient(to top, rgba(10,62,92,.08), transparent);
    z-index: -1;
  }

  header {
    text-align: center;
    padding: 52px 20px 32px;
  }
  .ball-icon {
    font-size: 3rem;
    display: block;
    margin-bottom: 8px;
    animation: bounce 2.4s ease-in-out infinite;
  }
  @keyframes bounce {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-10px); }
  }
  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.6rem, 7vw, 4.2rem);
    letter-spacing: 0.04em;
    color: var(--deep);
    line-height: 1;
    text-shadow: 0 2px 0 rgba(255,255,255,.7);
  }
  header p { margin-top: 8px; color: var(--ocean); font-weight: 600; font-size: 1rem; letter-spacing: .03em; }
  .badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--deep); color: var(--sand);
    border-radius: 999px; padding: 5px 16px;
    font-size: .78rem; font-weight: 600; letter-spacing: .05em;
    margin-top: 14px; text-transform: uppercase;
  }
  .badge span { color: var(--sky); }

  .container { max-width: 780px; margin: 0 auto; padding: 0 18px 60px; }

  #loading-bar {
    position: fixed; top: 0; left: 0; height: 3px;
    background: linear-gradient(90deg, var(--sky), var(--ocean));
    width: 0; transition: width .4s, opacity .5s;
    z-index: 1000;
  }

  .signup-card {
    background: rgba(255,255,255,.82);
    backdrop-filter: blur(12px);
    border-radius: var(--radius);
    padding: 28px 28px 22px;
    box-shadow: 0 4px 32px rgba(6,61,92,.1), 0 1px 0 rgba(255,255,255,.9) inset;
    border: 1px solid rgba(255,255,255,.6);
    margin-bottom: 28px;
  }
  .signup-card h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem; letter-spacing: .05em; color: var(--deep); margin-bottom: 18px;
  }
  .form-row { display: flex; gap: 12px; flex-wrap: wrap; }
  .form-group { flex: 1; min-width: 160px; display: flex; flex-direction: column; gap: 6px; }
  label { font-size: .82rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
  input[type=text], select {
    border: 1.5px solid rgba(10,126,164,.25); border-radius: 9px;
    padding: 11px 14px; font-family: inherit; font-size: .97rem;
    background: rgba(255,255,255,.9); color: var(--text); outline: none;
    transition: border-color .2s, box-shadow .2s; width: 100%;
  }
  input:focus, select:focus {
    border-color: var(--ocean);
    box-shadow: 0 0 0 3px rgba(10,126,164,.12);
  }
  .btn-signup {
    margin-top: 16px; width: 100%; padding: 14px;
    background: linear-gradient(135deg, var(--ocean), var(--deep));
    color: var(--white); border: none; border-radius: 10px;
    font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; letter-spacing: .08em;
    cursor: pointer; transition: transform .15s, box-shadow .15s, opacity .15s;
    box-shadow: 0 4px 16px rgba(10,126,164,.35);
  }
  .btn-signup:hover { transform: translateY(-2px); box-shadow: 0 6px 22px rgba(10,126,164,.45); }
  .btn-signup:active { transform: translateY(0); }
  .btn-signup:disabled { opacity: .5; cursor: not-allowed; transform: none; }

  .section-title {
    font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem;
    letter-spacing: .05em; color: var(--deep); margin-bottom: 16px;
    display: flex; align-items: center; gap: 10px;
  }
  .section-title::after {
    content: ''; flex: 1; height: 2px;
    background: linear-gradient(to right, var(--ocean), transparent); border-radius: 2px;
  }

  .sessions-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px;
  }

  .session-card {
    background: rgba(255,255,255,.78); backdrop-filter: blur(10px);
    border-radius: var(--radius); overflow: hidden;
    box-shadow: 0 2px 20px rgba(6,61,92,.08); border: 1px solid rgba(255,255,255,.6);
    transition: transform .2s, box-shadow .2s;
  }
  .session-card:hover { transform: translateY(-3px); box-shadow: 0 6px 28px rgba(6,61,92,.14); }

  .session-header {
    background: linear-gradient(135deg, var(--deep), var(--ocean));
    color: white; padding: 16px 20px 14px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .session-date { font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; letter-spacing: .04em; }
  .session-time { font-size: .82rem; opacity: .85; margin-top: 1px; }
  .session-count {
    background: rgba(255,255,255,.18); border-radius: 8px;
    padding: 6px 12px; text-align: center; min-width: 54px;
  }
  .session-count .num { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; line-height: 1; display: block; }
  .session-count .lbl { font-size: .68rem; opacity: .8; text-transform: uppercase; letter-spacing: .06em; }

  .session-body { padding: 16px 20px; }
  .player-list {
    list-style: none; display: flex; flex-direction: column; gap: 7px;
    max-height: 220px; overflow-y: auto; padding-right: 4px;
    scrollbar-width: thin; scrollbar-color: var(--ocean) transparent;
    margin-bottom: 12px; min-height: 42px;
  }
  .empty-msg { color: var(--muted); font-size: .88rem; padding: 10px 0; text-align: center; font-style: italic; }
  .player-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px; background: rgba(56,189,248,.08);
    border-radius: 8px; border: 1px solid rgba(56,189,248,.15);
    font-size: .9rem; animation: fadeIn .3s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform: translateY(4px); } to { opacity:1; transform:none; } }
  .player-num {
    width: 22px; height: 22px; background: var(--ocean); color: white;
    border-radius: 50%; font-size: .72rem; font-weight: 700;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .player-name { flex: 1; font-weight: 500; }
  .btn-remove {
    background: none; border: none; cursor: pointer; color: var(--muted);
    font-size: 1rem; line-height: 1; padding: 2px 4px; border-radius: 4px;
    transition: color .15s, background .15s;
  }
  .btn-remove:hover { color: var(--red); background: rgba(239,68,68,.08); }

  .session-footer {
    display: flex; gap: 8px;
    border-top: 1px solid rgba(10,126,164,.1); padding-top: 12px;
  }
  .btn-join {
    flex: 1; padding: 10px;
    background: linear-gradient(135deg, #22c55e, #16a34a);
    color: white; border: none; border-radius: 8px;
    font-family: 'Bebas Neue', sans-serif; font-size: 1rem; letter-spacing: .06em;
    cursor: pointer; transition: transform .15s, box-shadow .15s;
    box-shadow: 0 2px 10px rgba(34,197,94,.3);
  }
  .btn-join:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(34,197,94,.4); }
  .btn-join:disabled { opacity: .5; cursor: not-allowed; transform: none; }
  .btn-join.signed { background: linear-gradient(135deg, #ef4444, #b91c1c); box-shadow: 0 2px 10px rgba(239,68,68,.3); }
  .btn-join.signed:hover { box-shadow: 0 4px 14px rgba(239,68,68,.4); }

  #toast {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--deep); color: white; padding: 13px 24px; border-radius: 10px;
    font-weight: 600; font-size: .9rem; box-shadow: 0 6px 24px rgba(0,0,0,.25);
    z-index: 999; transition: transform .3s cubic-bezier(.34,1.56,.64,1), opacity .3s;
    opacity: 0; pointer-events: none; white-space: nowrap;
  }
  #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  #toast.green { background: #16a34a; }
  #toast.red   { background: #b91c1c; }

  .spinner {
    display: inline-block; width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,.4); border-top-color: white;
    border-radius: 50%; animation: spin .7s linear infinite;
    vertical-align: middle; margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 500px) {
    .signup-card { padding: 20px 16px 18px; }
    .session-header { flex-direction: column; align-items: flex-start; gap: 8px; }
    .session-count { align-self: flex-end; }
  }
</style>
</head>
<body>

<div id="loading-bar"></div>

<header>
  <span class="ball-icon">🏐</span>
  <h1>Beach Volejbal</h1>
  <p>Kurty Lázně Toušeň</p>
  <div class="badge">Každou středu &nbsp;·&nbsp; <span>17:00 – 19:00</span></div>
</header>

<div class="container">
  <div class="signup-card">
    <h2>📋 Přihlásit se na trénink</h2>
    <div class="form-row">
      <div class="form-group">
        <label for="inp-name">Jméno a příjmení</label>
        <input type="text" id="inp-name" placeholder="Jana Nováková" autocomplete="name">
      </div>
    </div>
    <div class="form-row" style="margin-top:12px">
      <div class="form-group">
        <label for="sel-session">Vybrat trénink</label>
        <select id="sel-session"></select>
      </div>
    </div>
    <button class="btn-signup" id="btn-main-signup">✔ Potvrdit účast</button>
  </div>

  <div class="section-title">Nadcházející tréninky</div>
  <div class="sessions-grid" id="sessions-grid">
    <div style="color:var(--muted);padding:20px;text-align:center;grid-column:1/-1">
      <span class="spinner"></span> Načítám tréninky...
    </div>
  </div>
</div>

<div id="toast"></div>

<script type="module">
import { initializeApp }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot, updateDoc, arrayUnion, arrayRemove }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// ── FIREBASE ──────────────────────────────────────────────────────────
const app = initializeApp({
  apiKey: "AIzaSyBZ7DNAtm0B5bT8p_VAabxfPcvMNjQ0zGM",
  authDomain: "beach-tousen.firebaseapp.com",
  projectId: "beach-tousen",
  storageBucket: "beach-tousen.firebasestorage.app",
  messagingSenderId: "629671195613",
  appId: "1:629671195613:web:5308ec3528b127f9ff3c34"
});
const db = getFirestore(app);

// ── DATES ─────────────────────────────────────────────────────────────
function getNextWednesdays(n = 6) {
  const result = [];
  const d = new Date(); d.setHours(0,0,0,0);
  const diff = (3 - d.getDay() + 7) % 7 || 7;
  d.setDate(d.getDate() + diff);
  for (let i = 0; i < n; i++) { result.push(new Date(d)); d.setDate(d.getDate() + 7); }
  return result;
}
const dates  = getNextWednesdays(6);
const ids    = dates.map(d => d.toISOString().split('T')[0]);

// sessions state
const sessions = {};
dates.forEach((d, i) => { sessions[ids[i]] = { date: d, players: [] }; });

// ── FORMAT ────────────────────────────────────────────────────────────
const fmtLong  = d => d.toLocaleDateString('cs-CZ', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
const fmtShort = d => d.toLocaleDateString('cs-CZ', { day:'numeric', month:'short' });
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const norm = s => s.trim().toLowerCase();

// ── LOADING BAR ───────────────────────────────────────────────────────
let loaded = 0;
function setBar(pct) {
  const b = document.getElementById('loading-bar');
  b.style.width = pct + '%';
  if (pct >= 100) setTimeout(() => b.style.opacity = '0', 600);
}
setBar(5);

// ── FIRESTORE ─────────────────────────────────────────────────────────
(async () => {
  // Ensure all session docs exist
  for (const id of ids) {
    await setDoc(doc(db, 'sessions', id), { players: [] }, { merge: true });
  }
  setBar(30);

  // Listen for real-time updates
  ids.forEach(id => {
    onSnapshot(doc(db, 'sessions', id), snap => {
      sessions[id].players = snap.data()?.players || [];
      loaded++;
      setBar(30 + (loaded / ids.length) * 70);
      renderAll();
    });
  });
})();

// ── RENDER ────────────────────────────────────────────────────────────
function renderAll() { renderSelect(); renderGrid(); }

function renderSelect() {
  const sel = document.getElementById('sel-session');
  const prev = sel.value;
  sel.innerHTML = ids.map(id => {
    const s = sessions[id];
    return `<option value="${id}">${fmtLong(s.date)} – ${s.players.length} hráčů</option>`;
  }).join('');
  if (prev && ids.includes(prev)) sel.value = prev;
}

function renderGrid() {
  const myName = document.getElementById('inp-name').value.trim();
  document.getElementById('sessions-grid').innerHTML = ids.map(id => {
    const s = sessions[id];
    const isSigned = myName && s.players.some(p => norm(p) === norm(myName));
    const items = s.players.length
      ? s.players.map((name, i) => `
          <li class="player-item">
            <span class="player-num">${i+1}</span>
            <span class="player-name">${esc(name)}</span>
            <button class="btn-remove" data-id="${id}" data-name="${esc(name)}" title="Odhlásit">✕</button>
          </li>`).join('')
      : '<li class="empty-msg">Zatím nikdo přihlášen</li>';

    return `
    <div class="session-card">
      <div class="session-header">
        <div>
          <div class="session-date">${fmtLong(s.date)}</div>
          <div class="session-time">⏰ 17:00 – 19:00 &nbsp;·&nbsp; Lázně Toušeň</div>
        </div>
        <div class="session-count">
          <span class="num">${s.players.length}</span>
          <span class="lbl">hráčů</span>
        </div>
      </div>
      <div class="session-body">
        <ul class="player-list">${items}</ul>
        <div class="session-footer">
          <button class="btn-join ${isSigned ? 'signed' : ''}" data-id="${id}">
            ${isSigned ? '✕ Odhlásit se' : '+ Přihlásit se'}
          </button>
        </div>
      </div>
    </div>`;
  }).join('');

  // Attach delegated events
  document.getElementById('sessions-grid').querySelectorAll('.btn-join').forEach(btn => {
    btn.addEventListener('click', () => quickJoin(btn.dataset.id));
  });
  document.getElementById('sessions-grid').querySelectorAll('.btn-remove').forEach(btn => {
    btn.addEventListener('click', () => removePlayer(btn.dataset.id, btn.dataset.name));
  });
}

// ── ACTIONS ───────────────────────────────────────────────────────────
async function signupMain() {
  const name = document.getElementById('inp-name').value.trim();
  const id   = document.getElementById('sel-session').value;
  if (!name) { showToast('Zadej prosím své jméno 🙏', 'red'); return; }
  const s = sessions[id];
  if (s.players.some(p => norm(p) === norm(name))) {
    showToast('Na tento trénink už jsi přihlášen/a ✅', 'green'); return;
  }
  setBtnLoading(true);
  try {
    await updateDoc(doc(db, 'sessions', id), { players: arrayUnion(name) });
    showToast(`Přihlášen/a na ${fmtShort(s.date)} 🏐`, 'green');
  } catch(e) { showToast('Chyba při ukládání 😕', 'red'); console.error(e); }
  setBtnLoading(false);
}

async function quickJoin(id) {
  const name = document.getElementById('inp-name').value.trim();
  if (!name) { showToast('Nejprve zadej své jméno ve formuláři výše 👆', 'red'); return; }
  const s = sessions[id];
  const exact = s.players.find(p => norm(p) === norm(name));
  try {
    if (exact) {
      await updateDoc(doc(db, 'sessions', id), { players: arrayRemove(exact) });
      showToast(`Odhlášen/a z ${fmtShort(s.date)}`, '');
    } else {
      await updateDoc(doc(db, 'sessions', id), { players: arrayUnion(name) });
      showToast(`Přihlášen/a na ${fmtShort(s.date)} 🏐`, 'green');
    }
  } catch(e) { showToast('Chyba 😕', 'red'); console.error(e); }
}

async function removePlayer(id, name) {
  try {
    await updateDoc(doc(db, 'sessions', id), { players: arrayRemove(name) });
    showToast(`${name} odhlášen/a`, '');
  } catch(e) { showToast('Chyba 😕', 'red'); console.error(e); }
}

// ── UTILS ─────────────────────────────────────────────────────────────
function setBtnLoading(on) {
  const btn = document.getElementById('btn-main-signup');
  btn.disabled = on;
  btn.innerHTML = on ? '<span class="spinner"></span> Ukládám...' : '✔ Potvrdit účast';
}

let toastTimer;
function showToast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = '', 2800);
}

// ── EVENTS ────────────────────────────────────────────────────────────
document.getElementById('btn-main-signup').addEventListener('click', signupMain);
document.getElementById('inp-name').addEventListener('input', renderGrid);
</script>
</body>
</html>
