<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MS Hokej 2026 – Tipovačka</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@400;500;600;700&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
@import url('https://fonts.googleapis.com/css2?family=Anton&family=Rajdhani:wght@400;500;600;700&family=Oswald:wght@400;500;600;700&display=swap');

:root{
  --bg:#06101e;
  --surface:#0b1a2e;
  --surface2:#102040;
  --border:rgba(255,255,255,0.09);
  --gold:#f0c020;
  --gold2:#c89a10;
  --gold-glow:rgba(240,192,32,.25);
  --ice:#d0eeff;
  --ice2:#a8d8f8;
  --green:#1db954;
  --red:#e03030;
  --dim:#5a7a9a;
  --white:#ffffff;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:var(--bg);
  color:var(--white);
  font-family:'Rajdhani',sans-serif;
  font-weight:500;
  min-height:100vh;
  overflow-x:hidden;
}

/* ── RINK BACKGROUND on body ── */
body::before{
  content:'';
  position:fixed;
  inset:0;
  background:
    /* subtle rink lines */
    radial-gradient(ellipse 80% 40% at 50% 110%, rgba(168,216,248,.04) 0%, transparent 70%),
    radial-gradient(ellipse 60% 30% at 50% -10%, rgba(168,216,248,.03) 0%, transparent 60%);
  pointer-events:none;
  z-index:0;
}
body > *{position:relative;z-index:1;}

/* ── HEADER ── */
.header{
  position:relative;
  background:#06101e;
  border-bottom:3px solid var(--gold);
  padding:0;
  text-align:center;
  overflow:hidden;
}

/* SVG rink drawn via CSS background */
.header-rink{
  position:relative;
  padding:28px 20px 22px;
  background:
    /* center circle */
    radial-gradient(circle 60px at 50% 85%, transparent 58px, rgba(168,216,248,.15) 59px, rgba(168,216,248,.15) 62px, transparent 63px),
    /* center dot */
    radial-gradient(circle 5px at 50% 85%, rgba(168,216,248,.5) 0%, transparent 100%),
    /* blue lines */
    linear-gradient(90deg,
      transparent 28%, rgba(100,160,230,.12) 28%, rgba(100,160,230,.12) 29%,
      transparent 29%, transparent 71%,
      rgba(100,160,230,.12) 71%, rgba(100,160,230,.12) 72%, transparent 72%
    ),
    /* rink outline glow */
    radial-gradient(ellipse 90% 70% at 50% 50%, rgba(10,40,80,.8) 60%, rgba(6,16,30,1) 100%);
}

/* goal creases left & right faint */
.header-rink::before{
  content:'';
  position:absolute;
  inset:0;
  background:
    radial-gradient(ellipse 8% 12% at 2% 50%, rgba(168,216,248,.08) 0%, transparent 100%),
    radial-gradient(ellipse 8% 12% at 98% 50%, rgba(168,216,248,.08) 0%, transparent 100%);
  pointer-events:none;
}

/* red center line */
.header-rink::after{
  content:'';
  position:absolute;
  top:0; bottom:0;
  left:50%; width:2px;
  background:rgba(220,50,50,.2);
  transform:translateX(-50%);
}

.header-pill{
  display:inline-block;
  background:var(--gold);
  color:#06101e;
  font-family:'Oswald';
  font-weight:700;
  font-size:10px;
  letter-spacing:4px;
  text-transform:uppercase;
  padding:3px 14px;
  border-radius:2px;
  margin-bottom:10px;
}

.header h1{
  font-family:'Anton',sans-serif;
  font-size:clamp(42px,10vw,80px);
  letter-spacing:4px;
  line-height:.9;
  background:linear-gradient(160deg, #ffffff 0%, #f0c020 55%, #ff9900 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  text-shadow:none;
  filter:drop-shadow(0 0 30px rgba(240,192,32,.3));
}

.header-sub{
  font-family:'Oswald';
  font-weight:400;
  font-size:12px;
  letter-spacing:6px;
  color:var(--ice2);
  opacity:.7;
  text-transform:uppercase;
  margin-top:6px;
}

.header-flags{
  display:flex;justify-content:center;gap:5px;margin-top:14px;font-size:18px;flex-wrap:wrap;
  opacity:.85;
}

/* ── ICE DIVIDER under header ── */
.ice-line{
  height:4px;
  background:linear-gradient(90deg,
    transparent 0%,
    var(--ice2) 20%,
    #ffffff 50%,
    var(--ice2) 80%,
    transparent 100%);
  opacity:.25;
}

/* ── SCORING BAR ── */
.scoring-bar{
  display:flex;justify-content:center;
  background:rgba(168,216,248,.04);
  border-bottom:1px solid rgba(168,216,248,.08);
  flex-wrap:wrap;
}
.sc-item{
  padding:8px 18px;font-size:12px;color:var(--dim);font-weight:600;
  border-right:1px solid rgba(255,255,255,.05);white-space:nowrap;
  font-family:'Rajdhani';letter-spacing:.5px;
}
.sc-item:last-child{border-right:none;}
.sc-item b{
  font-family:'Anton';font-size:19px;color:var(--gold);
  margin-right:4px;vertical-align:middle;
}

/* ── LOGIN ── */
#login-screen{display:flex;flex-direction:column;align-items:center;padding:40px 16px 60px;min-height:60vh;}
.login-h{
  font-family:'Anton';font-size:28px;letter-spacing:3px;color:var(--ice);
  margin-bottom:4px;text-shadow:0 0 20px rgba(168,216,248,.3);
}
.login-sub{color:var(--dim);font-size:13px;margin-bottom:28px;font-family:'Rajdhani';}
.player-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;max-width:520px;width:100%);}
@media(max-width:480px){.player-grid{grid-template-columns:repeat(2,1fr);}}
.player-btn{
  background:var(--surface);
  border:2px solid var(--border);
  border-radius:14px;padding:18px 10px 14px;
  cursor:pointer;text-align:center;transition:all .2s;
  display:flex;flex-direction:column;align-items:center;gap:8px;
}
.player-btn:hover{
  border-color:var(--gold);
  background:rgba(240,192,32,.07);
  transform:translateY(-3px);
  box-shadow:0 8px 24px rgba(240,192,32,.12);
}
.player-btn.no-pin{border-style:dashed;}
.avatar-wrap{width:52px;height:52px;border-radius:50%;overflow:hidden;flex-shrink:0;}
.avatar-wrap svg{width:100%;height:100%;}
.p-name{font-family:'Oswald';font-weight:600;font-size:15px;letter-spacing:.5px;}
.p-status{font-size:10px;color:var(--dim);font-weight:600;font-family:'Rajdhani';}

/* ── PIN OVERLAY ── */
.pin-overlay{
  position:fixed;inset:0;
  background:rgba(4,10,20,.88);
  backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;z-index:900;padding:20px;
}
.pin-box{
  background:linear-gradient(160deg,var(--surface2),var(--surface));
  border:1px solid rgba(168,216,248,.15);
  border-radius:20px;padding:28px 24px;
  max-width:300px;width:100%;text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,.5);
}
.pin-who{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:16px;}
.pin-who-name{font-family:'Oswald';font-weight:600;font-size:20px;}
.pin-label{
  font-family:'Rajdhani';font-size:11px;color:var(--dim);
  letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;
}
.pin-note{font-size:11px;color:var(--dim);line-height:1.5;margin-bottom:12px;font-family:'Rajdhani';}
.pin-dots{display:flex;justify-content:center;gap:10px;margin-bottom:16px;}
.pin-dot{
  width:13px;height:13px;border-radius:50%;
  border:2px solid var(--dim);background:transparent;transition:all .15s;
}
.pin-dot.filled{background:var(--gold);border-color:var(--gold);box-shadow:0 0 8px var(--gold-glow);}
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.kbtn{
  background:var(--surface2);border:1px solid rgba(168,216,248,.1);
  border-radius:10px;padding:14px;
  font-family:'Anton';font-size:22px;color:var(--white);
  cursor:pointer;transition:all .12s;
}
.kbtn:hover{background:rgba(240,192,32,.12);border-color:rgba(240,192,32,.4);}
.kbtn:active{transform:scale(.92);}
.kbtn.sym{font-family:'Rajdhani';font-size:14px;font-weight:700;color:var(--dim);}
.kbtn.sym:hover{color:var(--white);}
.pin-err{color:var(--red);font-size:12px;font-weight:600;margin-top:8px;min-height:16px;font-family:'Rajdhani';}

/* ── USER BAR ── */
.user-bar{
  display:flex;align-items:center;gap:12px;
  background:rgba(168,216,248,.04);
  border-bottom:1px solid rgba(168,216,248,.08);
  padding:10px 16px;
}
.ub-info{display:flex;align-items:center;gap:10px;flex:1;}
.ub-name{font-family:'Oswald';font-weight:600;font-size:16px;letter-spacing:.5px;}
.ub-sub{font-size:11px;color:var(--dim);font-family:'Rajdhani';}
.logout-btn{
  background:none;border:1px solid var(--border);border-radius:6px;
  color:var(--dim);font-size:12px;font-weight:600;font-family:'Rajdhani';
  padding:5px 12px;cursor:pointer;transition:all .18s;
}
.logout-btn:hover{color:var(--white);border-color:rgba(255,255,255,.25);}

/* ── MAIN NAV ── */
.main-nav{
  display:flex;
  background:var(--surface);
  border-bottom:2px solid rgba(168,216,248,.06);
  overflow-x:auto;scrollbar-width:none;
}
.main-nav::-webkit-scrollbar{display:none;}
.nav-btn{
  flex:0 0 auto;padding:13px 22px;background:none;border:none;
  color:var(--dim);font-family:'Oswald';font-weight:500;font-size:13px;
  letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;
  border-bottom:3px solid transparent;transition:all .15s;white-space:nowrap;
}
.nav-btn:hover{color:var(--ice);}
.nav-btn.active{color:var(--gold);border-bottom-color:var(--gold);}

/* ── CONTENT ── */
.content{max-width:900px;margin:0 auto;padding:18px 14px 40px;}
.inner-tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;}
.itab{
  background:rgba(255,255,255,.04);border:1px solid var(--border);
  border-radius:6px;padding:6px 14px;
  font-family:'Oswald';font-weight:500;font-size:12px;letter-spacing:1px;
  text-transform:uppercase;color:var(--dim);cursor:pointer;transition:all .15s;
}
.itab:hover{color:var(--ice);}
.itab.active{background:rgba(240,192,32,.1);border-color:rgba(240,192,32,.4);color:var(--gold);}

.date-divider{
  font-family:'Oswald';font-size:11px;font-weight:500;letter-spacing:3px;
  text-transform:uppercase;color:var(--ice2);opacity:.5;
  padding:14px 0 6px;border-bottom:1px solid rgba(168,216,248,.08);margin-bottom:8px;
}

/* ── MATCH CARD / ROW ── */
.match-card{margin-bottom:5px;}
.match-card .match-row{
  display:grid;
  grid-template-columns:88px 1fr auto 1fr 100px;
  align-items:stretch;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:10px 10px 0 0;
  overflow:hidden;transition:border-color .15s,box-shadow .15s;min-height:50px;
  border-bottom:none;
}
.match-card:not(:has(.others-toggle)) .match-row,
.match-card .match-row:only-child {
  border-radius:10px;border-bottom:1px solid var(--border);
}
.match-card.has-tip .match-row{border-left:3px solid rgba(29,185,84,.45);}
.match-card.locked .match-row{opacity:.68;}
.match-card .match-row:hover{border-color:rgba(168,216,248,.18);}

/* standalone match-row (moje tipy) */
.match-row{
  display:grid;
  grid-template-columns:88px 1fr auto 1fr 100px;
  align-items:stretch;
  background:var(--surface);border:1px solid var(--border);border-radius:10px;
  overflow:hidden;transition:border-color .15s;min-height:50px;
}

/* time cell */
.mr-time{
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  padding:0 8px;border-right:1px solid var(--border);text-align:center;gap:2px;
  background:rgba(168,216,248,.02);
}
.mr-date{font-size:10px;color:var(--dim);font-weight:600;font-family:'Rajdhani';}
.mr-clock{font-family:'Oswald';font-weight:600;font-size:15px;letter-spacing:.5px;color:var(--ice);}
.mr-lock{font-size:9px;font-weight:700;letter-spacing:.8px;font-family:'Rajdhani';}
.mr-lock.open{color:var(--green);}
.mr-lock.closed{color:var(--red);}

/* teams */
.mr-home{display:flex;align-items:center;gap:7px;padding:0 10px;justify-content:flex-end;}
.mr-away{display:flex;align-items:center;gap:7px;padding:0 10px;}
.t-flag{font-size:18px;line-height:1;flex-shrink:0;}
.t-name{font-family:'Oswald';font-weight:600;font-size:14px;line-height:1.1;letter-spacing:.3px;}
.t-name.right{text-align:right;}

/* score cell */
.mr-score{
  display:flex;align-items:center;gap:4px;padding:4px 8px;
  border-left:1px solid var(--border);border-right:1px solid var(--border);
  background:rgba(0,0,0,.2);
}
.score-in{
  width:36px;height:34px;
  background:rgba(168,216,248,.05);
  border:2px solid rgba(168,216,248,.12);
  border-radius:6px;color:var(--white);
  font-family:'Anton';font-size:22px;
  text-align:center;padding:0;outline:none;-moz-appearance:textfield;
  transition:border-color .15s;
}
.score-in::-webkit-inner-spin-button,.score-in::-webkit-outer-spin-button{-webkit-appearance:none;}
.score-in:focus{border-color:var(--gold);background:rgba(240,192,32,.06);}
.score-in:disabled{opacity:.35;cursor:not-allowed;}
.score-sep{font-family:'Anton';font-size:18px;color:var(--dim);}
.score-static{font-family:'Anton';font-size:22px;color:var(--gold);min-width:36px;text-align:center;}

/* result display */
.mr-result{
  display:flex;align-items:center;gap:3px;padding:4px 10px;
  border-left:1px solid var(--border);border-right:1px solid var(--border);
  background:rgba(240,192,32,.04);
}
.res-num{font-family:'Anton';font-size:24px;color:var(--gold);}
.res-sep{font-family:'Anton';font-size:18px;color:var(--dim);}

/* action cell */
.mr-action{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:5px 8px;gap:3px;border-left:1px solid var(--border);
}
.save-btn{
  background:var(--gold);color:#06101e;border:none;border-radius:6px;
  padding:5px 10px;font-family:'Oswald';font-weight:700;font-size:11px;
  letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .15s;white-space:nowrap;
}
.save-btn:hover{background:var(--gold2);box-shadow:0 4px 12px rgba(240,192,32,.3);}
.tip-ok{font-size:10px;color:var(--green);font-weight:700;font-family:'Rajdhani';}
.pts-pill{font-size:9px;font-weight:700;padding:2px 5px;border-radius:3px;white-space:nowrap;font-family:'Rajdhani';}
.pts-exact{background:rgba(240,192,32,.15);color:var(--gold);}
.pts-win{background:rgba(29,185,84,.12);color:var(--green);}
.pts-zero{background:rgba(255,255,255,.05);color:var(--dim);}

@media(max-width:580px){
  .match-card .match-row,.match-row{grid-template-columns:68px 1fr auto 1fr 82px;}
  .t-name{font-size:12px;}
  .t-flag{font-size:15px;}
  .score-in,.score-static{width:30px;height:30px;font-size:18px;}
  .mr-home,.mr-away{padding:0 6px;gap:4px;}
  .mr-time{padding:0 5px;}
  .save-btn{font-size:10px;padding:4px 7px;}
}

/* ── OTHERS PANEL ── */
.others-toggle{
  background:rgba(168,216,248,.03);border:1px solid var(--border);
  border-top:none;border-radius:0 0 10px 10px;
  padding:6px 14px;font-size:11px;font-weight:600;
  font-family:'Rajdhani';letter-spacing:.5px;
  color:var(--dim);cursor:pointer;transition:all .15s;
  display:flex;align-items:center;gap:6px;
}
.others-toggle:hover{background:rgba(168,216,248,.07);color:var(--ice);}
.others-panel{
  background:rgba(0,0,0,.25);border:1px solid var(--border);border-top:none;
  border-radius:0 0 10px 10px;padding:10px 12px;
}
.others-list{display:flex;flex-direction:column;gap:5px;}
.other-row{
  display:flex;align-items:center;gap:8px;
  padding:5px 8px;background:var(--surface);border-radius:7px;
}
.other-who{
  display:flex;align-items:center;gap:6px;flex:1;
  font-family:'Oswald';font-weight:500;font-size:13px;
}
.other-tip{font-family:'Anton';font-size:18px;color:var(--gold);min-width:50px;text-align:center;}

/* ── LEADERBOARD ── */
.lb-table{display:flex;flex-direction:column;gap:8px;}
.lb-row{
  display:flex;align-items:center;gap:14px;
  background:var(--surface);border:1px solid var(--border);border-radius:12px;
  padding:14px 18px;transition:all .15s;
}
.lb-row:hover{border-color:rgba(168,216,248,.2);box-shadow:0 4px 16px rgba(0,0,0,.3);}
.lb-rank{font-family:'Anton';font-size:26px;width:32px;text-align:center;color:var(--dim);}
.lb-rank.g{color:var(--gold);text-shadow:0 0 12px rgba(240,192,32,.4);}
.lb-rank.s{color:#c0c8d0;}
.lb-rank.b{color:#cd7f32;}
.lb-info{flex:1;}
.lb-name{font-family:'Oswald';font-weight:700;font-size:20px;letter-spacing:.5px;}
.lb-detail{font-size:11px;color:var(--dim);margin-top:2px;font-family:'Rajdhani';}
.lb-pts{font-family:'Anton';font-size:34px;color:var(--gold);line-height:1;}
.lb-ptslabel{font-size:11px;color:var(--dim);font-weight:600;font-family:'Rajdhani';}

/* ── SECTION HEADER ── */
.sh{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.sh-title{font-family:'Anton';font-size:26px;letter-spacing:3px;color:var(--ice);}
.sh-count{
  background:rgba(240,192,32,.1);border:1px solid rgba(240,192,32,.25);
  color:var(--gold);font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px;
  font-family:'Rajdhani';
}

/* ── ADMIN ── */
.admin-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:18px;}
.admin-title{
  font-family:'Anton';font-size:20px;letter-spacing:2px;color:var(--gold);
  margin-bottom:12px;border-bottom:1px solid rgba(240,192,32,.15);padding-bottom:10px;
}
.admin-row{display:grid;grid-template-columns:1fr 38px auto 38px 1fr auto;align-items:center;gap:6px;margin-bottom:8px;}
.res-team{font-family:'Oswald';font-weight:600;font-size:13px;}
.res-team.right{text-align:right;}
.res-input{
  width:38px;height:32px;background:rgba(0,0,0,.3);
  border:2px solid rgba(168,216,248,.12);border-radius:6px;
  color:var(--white);font-family:'Anton';font-size:20px;
  text-align:center;outline:none;-moz-appearance:textfield;
}
.res-input::-webkit-inner-spin-button,.res-input::-webkit-outer-spin-button{-webkit-appearance:none;}
.res-input:focus{border-color:var(--gold);}
.res-btn{
  background:var(--green);color:#fff;border:none;border-radius:6px;
  padding:5px 10px;font-weight:700;font-size:12px;font-family:'Rajdhani';
  cursor:pointer;white-space:nowrap;transition:all .15s;
}
.res-btn:hover{background:#17a844;}
.po-select{
  background:var(--surface2);border:1px solid var(--border);border-radius:7px;
  color:var(--white);padding:7px 8px;font-family:'Rajdhani';font-size:13px;
  outline:none;width:100%;
}
.po-row{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center;margin-bottom:10px;}
.po-label{font-family:'Oswald';font-weight:600;font-size:13px;color:var(--gold);margin-bottom:5px;}

/* ── CHAMPION BLOCK ── */
.champ-block{
  background:linear-gradient(135deg,rgba(240,192,32,.1) 0%,rgba(240,192,32,.03) 100%);
  border:2px solid rgba(240,192,32,.3);border-radius:14px;
  padding:18px 20px;margin-bottom:20px;
  box-shadow:0 0 30px rgba(240,192,32,.06);
}
.champ-title{
  font-family:'Anton';font-size:22px;letter-spacing:3px;color:var(--gold);
  margin-bottom:4px;display:flex;align-items:center;gap:8px;
}
.champ-sub{font-size:12px;color:var(--dim);margin-bottom:14px;font-weight:600;font-family:'Rajdhani';}
.champ-select{
  width:100%;background:var(--surface2);border:2px solid rgba(240,192,32,.25);
  border-radius:10px;color:var(--white);padding:11px 14px;
  font-family:'Oswald';font-weight:600;font-size:16px;
  outline:none;cursor:pointer;transition:border-color .2s;
}
.champ-select:focus{border-color:var(--gold);}
.champ-select:disabled{opacity:.5;cursor:not-allowed;}
.champ-save{
  margin-top:10px;width:100%;background:var(--gold);color:#06101e;border:none;
  border-radius:10px;padding:11px;font-family:'Oswald';font-weight:700;
  font-size:15px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s;
}

  document.getElementById('po-keypad').innerHTML=
    '123456789'.split('').map(k=>`<button class="kbtn" onclick="kP('${k}')">${k}</button>`).join('')+
    `<button class="kbtn sym" onclick="pinClose()">Zpět</button>`+
    `<button class="kbtn" onclick="kP('0')">0</button>`+
    `<button class="kbtn sym" onclick="kDel()">⌫</button>`;
}

function kP(k){
  if(pinBuf.length>=4)return;
  pinBuf+=k;document.getElementById('po-err').textContent='';
  refreshPinUI();
  if(pinBuf.length===4)setTimeout(checkPin,80);
}
function kDel(){pinBuf=pinBuf.slice(0,-1);document.getElementById('po-err').textContent='';refreshPinUI();}
function pinClose(){document.getElementById('pin-overlay').style.display='none';pinBuf='';pinFirst='';}

function checkPin(){
  if(pinMode==='login'){
    const ok=pinTarget==='admin'?ADMIN_PIN:getPin(pinTarget.id);
    if(pinBuf===ok){pinClose();doLogin();}
    else{errPin('Špatný PIN');}
  } else if(pinMode==='setup'){
    pinFirst=pinBuf;pinBuf='';pinMode='setup2';refreshPinUI();
  } else {
    if(pinBuf===pinFirst){setPin(pinTarget.id,pinBuf);pinClose();renderPlayerGrid();showToast('PIN nastaven!');setTimeout(doLogin,500);}
    else{errPin('PINy se neshodují');pinMode='setup';pinFirst='';}
  }
}
function errPin(msg){document.getElementById('po-err').textContent=msg;pinBuf='';refreshPinUI();}

// ── SCORING ───────────────────────────────────────────────
function calcPts(tip,result){
  if(tip.home===result.home&&tip.away===result.away)return 20;
  let p=0;
  const rw=result.home>result.away?'H':result.home<result.away?'A':'D';
  const tw=tip.home>tip.away?'H':tip.home<tip.away?'A':'D';
  if(rw===tw)p+=10;
  if(tip.home===result.home)p+=5;
  if(tip.away===result.away)p+=5;
  return p;
}

function playerScore(pid){
  let total=0,exact=0,wins=0,tipped=0,champOk=false;
  ALL_MATCHES.forEach(m=>{
    const r=getResult(m.id);if(!r)return;
    const t=getTip(pid,m.id);if(!t)return;
    tipped++;const pts=calcPts(t,r);total+=pts;
    if(pts===20)exact++;
    else{const rw=r.home>r.away?'H':r.home<r.away?'A':'D';const tw=t.home>t.away?'H':t.home<t.away?'A':'D';if(rw===tw)wins++;}
  });
  // Champion bonus
  if(champResult && champTipsCache[pid] === champResult){ total+=50; champOk=true; }
  return {total,exact,wins,tipped,champOk};
}

window.saveChampResult=async function(){
  const sel=document.getElementById('champ-result-sel');
  if(!sel||!sel.value){showToast('Vyber tým');return;}
  await fbSetChampResult(sel.value);
  showToast('Šampion uložen! +50 bodům přidáno automaticky.');
};

window.savePoTeams=async function(){
  const obj={};
  PLAYOFF.forEach(m=>{
    const h=document.getElementById(`pt_${m.id}_h`)?.value;
    const a=document.getElementById(`pt_${m.id}_a`)?.value;
    if(h)obj[m.id+'_h']=h;if(a)obj[m.id+'_a']=a;
  });
  await fbSetPoTeams(obj);showToast('Playoff týmy uloženy!');
};

// ── TOAST ─────────────────────────────────────────────────
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
window.showToast=showToast;

window.champChanged=function(){};
window.saveChampTip=async function(){
  const sel=document.getElementById('champ-select');
  if(!sel||!sel.value){showToast('Vyber tým!');return;}
  if(isChampLocked()){showToast('Tip na šampióna je uzavřen!');return;}
  await fbSetChampTip(currentUser.id, sel.value);
  showToast('Tip na vítěze uložen!');
  renderTipovat();
};


// ── REALTIME LISTENERS ────────────────────────────────────
function startListeners(){
  // Listen to all players' tips
  PLAYERS.forEach(p=>{
    onSnapshot(collection(db,'tips',p.id,'matches'), snap=>{
      if(!tipsCache[p.id]) tipsCache[p.id]={};
      snap.forEach(d=>{ tipsCache[p.id][d.id]=d.data(); });
      // refresh current view silently
      refreshCurrentTab();
    });
  });

  // Listen to results
  onSnapshot(collection(db,'results'), snap=>{
    snap.forEach(d=>{ resultsCache[d.id]=d.data(); });
    refreshCurrentTab();
  });

  // Listen to playoff teams
  onSnapshot(doc(db,'config','playoff_teams'), snap=>{
    if(snap.exists()) poTeamsCache=snap.data();
    refreshCurrentTab();
  });

  // Listen to champion tips
  PLAYERS.forEach(p=>{
    onSnapshot(doc(db,'champ_tips',p.id), snap=>{
      if(snap.exists()) champTipsCache[p.id]=snap.data().team;
      else delete champTipsCache[p.id];
      refreshCurrentTab();
    });
  });

  // Listen to champion result
  onSnapshot(doc(db,'config','champ_result'), snap=>{
    champResult = snap.exists() ? snap.data().team : null;
    refreshCurrentTab();
  });
}

function refreshCurrentTab(){
  const active = [...document.querySelectorAll('.nav-btn.active')][0]?.textContent.trim().toLowerCase();
  if(active==='tipovat') renderMatchList();
  if(active==='tabulka') renderLeaderboard();
  if(active==='moje tipy') renderMoje();
}

// ── INIT ──────────────────────────────────────────────────
renderPlayerGrid();
startListeners();
</script>
