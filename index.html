<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TJ Spartak Celakovice</title>
<meta name="theme-color" content="#1b5e20">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Spartak Nohejbal">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--G:#2e7d32;--GD:#1b5e20;--GL:#43a047;--Y:#f9c000;--B:#1a3a6e;--BL:#1e5aaa;--GR:#e2e8f0;--T:#1a2030;--M:#64748b;--R:#dc2626;--BG:#f1f5f9;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Barlow',sans-serif;background:var(--BG);color:var(--T);min-height:100vh;}
.hdr{background:linear-gradient(135deg,var(--GD),var(--G) 55%,var(--GD));box-shadow:0 4px 20px rgba(0,0,0,0.3);}
.hdr-in{display:flex;align-items:center;gap:14px;padding:12px 18px;max-width:860px;margin:0 auto;}
.logo{width:68px;height:68px;border-radius:10px;border:3px solid var(--Y);box-shadow:0 0 18px rgba(249,192,0,0.4);object-fit:contain;background:#fff;padding:3px;flex-shrink:0;}
.hdr-txt h1{font-family:'Bebas Neue',sans-serif;font-size:1.7rem;letter-spacing:0.08em;color:var(--Y);line-height:1;}
.hdr-txt p{font-family:'Barlow Condensed',sans-serif;font-size:0.75rem;letter-spacing:0.16em;text-transform:uppercase;color:rgba(255,255,255,0.65);margin-top:2px;}
.lock-btn{margin-left:auto;border:none;border-radius:20px;padding:7px 15px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:0.78rem;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;white-space:nowrap;flex-shrink:0;background:var(--Y);color:var(--GD);}
.lock-btn.on{background:#4ade80;color:#166534;}
.nav-wrap{background:var(--GD);}
.nav{display:flex;max-width:860px;margin:0 auto;}
.nav-btn{flex:1;padding:11px 6px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:0.82rem;letter-spacing:0.1em;text-transform:uppercase;text-align:center;background:none;border:none;border-bottom:3px solid transparent;color:rgba(255,255,255,0.45);cursor:pointer;}
.nav-btn.act{color:var(--Y);border-bottom-color:var(--Y);}
.main{max-width:860px;margin:0 auto;padding:16px 14px 48px;}
.page{display:none;}.page.act{display:block;}
.wk{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
.wk h2{font-family:'Bebas Neue',sans-serif;font-size:1.28rem;letter-spacing:0.06em;color:var(--GD);}
.wk-nav{display:flex;gap:5px;}
.wkb{background:#fff;border:1.5px solid var(--GR);border-radius:7px;padding:5px 11px;font-size:0.78rem;font-weight:600;cursor:pointer;color:var(--T);}
.wkb:hover{border-color:var(--G);color:var(--G);}
.card{background:#fff;border-radius:13px;box-shadow:0 2px 12px rgba(0,0,0,0.07);margin-bottom:14px;overflow:hidden;}
.c-blue{background:linear-gradient(135deg,var(--B),var(--BL));}
.c-green{background:linear-gradient(135deg,var(--GD),var(--G));}
.c-purple{background:linear-gradient(135deg,#4338ca,#6366f1);}
.c-head{padding:12px 18px;display:flex;align-items:center;justify-content:space-between;}
.c-head .dy{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:0.06em;color:#fff;}
.c-head .dt{font-size:0.72rem;color:rgba(255,255,255,0.6);margin-top:2px;font-family:'Barlow Condensed',sans-serif;}
.c-head h3{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:0.07em;color:#fff;}
.c-head .sub{font-size:0.72rem;color:rgba(255,255,255,0.6);margin-top:2px;font-family:'Barlow Condensed',sans-serif;}
.c-body{padding:13px 18px;}
.t-row{display:flex;align-items:center;gap:10px;margin-bottom:11px;padding-bottom:11px;border-bottom:1px solid var(--GR);flex-wrap:wrap;}
.tlbl{font-family:'Barlow Condensed',sans-serif;font-size:0.72rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--M);}
.tval{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:var(--G);cursor:pointer;border-bottom:2px dashed rgba(46,125,50,0.3);}
.tinput{border:1.5px solid var(--G);border-radius:7px;padding:4px 8px;font-size:0.88rem;outline:none;width:100px;display:none;}
.sec-lbl{font-family:'Barlow Condensed',sans-serif;font-size:0.68rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--M);margin:9px 0 6px;}
.cnt{font-size:0.8rem;color:var(--M);margin-bottom:9px;}.cnt b{color:var(--G);}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(122px,1fr));gap:6px;margin-bottom:3px;}
.chip{display:flex;align-items:center;gap:6px;padding:7px 10px;border-radius:9px;border:2px solid var(--GR);background:var(--BG);cursor:pointer;user-select:none;}
.chip:hover{border-color:#86efac;background:#f0fdf4;}
.chip.on{border-color:var(--G);background:#dcfce7;}
.chip .dot{width:8px;height:8px;border-radius:50%;background:#cbd5e1;flex-shrink:0;}
.chip.on .dot{background:var(--G);}
.chip .nm{font-size:0.78rem;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.chip.tc{border-color:#c7d2fe;}.chip.tc:hover{border-color:#a5b4fc;background:#eef2ff;}
.chip.tc.on{border-color:#6366f1;background:#eef2ff;}.chip.tc.on .dot{background:#6366f1;}
.tbtn{background:var(--Y);color:var(--B);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:0.9rem;padding:4px 12px;border-radius:16px;cursor:pointer;border:none;}
.tbtn.end{background:rgba(255,255,255,0.18);color:#fff;}
.se-day{margin-bottom:22px;}
.se-day-title{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:0.06em;color:var(--GD);margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid var(--GR);}
.team-card{border:2px solid var(--GR);border-radius:11px;margin-bottom:8px;overflow:hidden;}
.team-card.open{border-color:var(--Y);box-shadow:0 0 0 3px rgba(249,192,0,0.15);}
.team-hd{display:flex;align-items:center;padding:10px 14px;cursor:pointer;background:#f8faff;gap:10px;user-select:none;}
.team-card.open .team-hd{background:#fffbeb;}
.team-hd-name{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:0.95rem;letter-spacing:0.05em;color:var(--T);white-space:nowrap;}
.team-hd-pl{flex:1;font-size:0.8rem;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.team-hd-arr{font-size:0.75rem;color:var(--M);white-space:nowrap;}
.team-bd{padding:12px 14px;border-top:1px solid var(--GR);background:#fff;}
.pick-lbl{font-family:'Barlow Condensed',sans-serif;font-size:0.68rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--M);margin-bottom:6px;}
.team-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;min-height:30px;}
.ttag{display:inline-flex;align-items:center;gap:4px;background:var(--G);color:#fff;border-radius:14px;padding:4px 4px 4px 10px;font-size:0.8rem;font-weight:600;}
.ttag-del{background:rgba(0,0,0,0.2);border:none;color:#fff;cursor:pointer;border-radius:50%;width:18px;height:18px;font-size:0.7rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ttag-del:hover{background:var(--R);}
.pick-grid{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;}
.pbtn{border:1.5px solid var(--GR);border-radius:8px;padding:5px 11px;font-size:0.79rem;font-weight:600;cursor:pointer;background:#fff;color:var(--T);}
.pbtn:hover{border-color:var(--G);color:var(--G);background:#f0fdf4;}
.pbtn.in-this{border-color:#bbf7d0;background:#f0fdf4;color:var(--G);cursor:default;}
.pbtn.in-other{opacity:0.4;cursor:not-allowed;background:#f1f5f9;}
.add-teams{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;}
.add-team-btn{border:1.5px dashed var(--GR);border-radius:9px;padding:8px 16px;font-size:0.82rem;font-weight:600;cursor:pointer;background:#fff;color:var(--M);}
.add-team-btn:hover{border-color:var(--G);color:var(--G);}
.lock-note{background:#fffbeb;border:1px solid var(--Y);border-radius:8px;padding:8px 12px;font-size:0.79rem;color:#854d0e;margin-bottom:12px;}
.no-conf{text-align:center;padding:20px;color:var(--M);font-size:0.84rem;}
.prow{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--GR);}
.prow:last-child{border-bottom:none;}
.pnm{font-weight:600;font-size:0.88rem;}.pnum{font-size:0.7rem;color:var(--M);font-family:'Barlow Condensed',sans-serif;}
.add-pl{display:flex;gap:7px;margin-top:11px;padding-top:11px;border-top:1px solid var(--GR);}
.field{flex:1;border:1.5px solid var(--GR);border-radius:8px;padding:7px 12px;font-size:0.86rem;outline:none;color:var(--T);}
.field:focus{border-color:var(--G);}
.btn-g{border:none;border-radius:8px;padding:7px 15px;font-family:'Barlow',sans-serif;font-weight:600;font-size:0.8rem;cursor:pointer;background:var(--G);color:#fff;}
.btn-g:hover{background:var(--GL);}
.btn-o{border:1.5px solid var(--GR);border-radius:8px;padding:7px 15px;font-family:'Barlow',sans-serif;font-weight:600;font-size:0.8rem;cursor:pointer;background:#fff;color:var(--M);}
.btn-del{border:1.5px solid #fecaca;border-radius:7px;padding:5px 12px;font-size:0.76rem;font-weight:600;cursor:pointer;background:#fff5f5;color:var(--R);}
.btn-del:hover{background:#fee2e2;}
.tr-actions{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.tr-act-btn{border:1.5px dashed var(--GR);border-radius:9px;padding:8px 16px;font-size:0.82rem;font-weight:600;cursor:pointer;background:#fff;color:var(--M);}
.tr-act-btn:hover{border-color:var(--G);color:var(--G);}
.tr-act-btn.del{border-color:#fecaca;color:var(--R);background:#fff5f5;border-style:solid;}
.tr-act-btn.del:hover{background:#fee2e2;}
.ov{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;padding:18px;backdrop-filter:blur(3px);}
.ov.open{display:flex;}
.modal{background:#fff;border-radius:16px;padding:24px;width:100%;max-width:320px;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
.modal h2{font-family:'Bebas Neue',sans-serif;font-size:1.35rem;letter-spacing:0.07em;color:var(--GD);margin-bottom:5px;}
.modal p{font-size:0.81rem;color:var(--M);margin-bottom:13px;}
.modal-r{display:flex;gap:8px;margin-top:13px;}
.modal-r button{flex:1;}
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--GD);color:#fff;padding:10px 20px;border-radius:26px;font-size:0.83rem;font-weight:600;z-index:99999;transition:transform .3s;pointer-events:none;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
.loading{text-align:center;padding:40px;color:var(--M);font-size:0.9rem;}
.sync-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#4ade80;margin-left:6px;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
</style>
</head>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB_BagFO5mf-qDwBVrVbxULXBD9tv0cjVQ",
  authDomain: "spartak-nohejbal.firebaseapp.com",
  projectId: "spartak-nohejbal",
  storageBucket: "spartak-nohejbal.firebasestorage.app",
  messagingSenderId: "252334492142",
  appId: "1:252334492142:web:71180fbbb65737be34e6ff"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ── DATA HELPERS ──────────────────────────────────────────────────────────────
var cache = {}; // local cache of all data

async function dbGet(docId) {
  if(cache[docId] !== undefined) return cache[docId];
  var snap = await getDoc(doc(db, "spartak", docId));
  cache[docId] = snap.exists() ? snap.data().v : null;
  return cache[docId];
}
var pendingWrites = {}; // track keys we just wrote

async function dbSet(docId, val) {
  cache[docId] = val;
  pendingWrites[docId] = true; // mark as pending
  await setDoc(doc(db, "spartak", docId), {v: val});
  // Keep pending for 3s after write completes
  setTimeout(function(){ delete pendingWrites[docId]; }, 3000);
}

// Listen for real-time changes
onSnapshot(collection(db, "spartak"), function(snapshot) {
  // Only update cache for keys we didn't just write
  if(appReady) {
    var needRedraw = false;
    snapshot.docChanges().forEach(function(change) {
      var id = change.doc.id;
      if(!pendingWrites[id]) { // only update if WE didn't write it
        var val = change.doc.exists() ? change.doc.data().v : null;
        cache[id] = val;
        needRedraw = true;
      }
    });
    if(needRedraw) {
      if(activePage === "treninky") drawTreninky();
      if(activePage === "sestavy") drawSestavy();
      if(activePage === "hraci") drawHraci();
    }
  }
});

// ── STATE ─────────────────────────────────────────────────────────────────────
window.HESLO = "spartak1997";
window.unlocked = false;
window.weekOff = 0;
window.activePage = "treninky";
window.openTeam = null;

var DEFAULT_PLAYERS = [
  "Fodor Adam","Holas Vojtech","Kalous Vaclav","Matura Daniel",
  "Nesladek Petr","Safr Radek","Vojtisek Marek","Andris Tomas",
  "Kolensky Michal","Bares Michal","Flekac Martin","Frank Radoslav",
  "Seidl Filip","Spilka Martin","JUN SUK LEE","Szlavecz Istvan"
];
var DEFAULT_TRENERI = ["Martin Spilka","Radoslav Frank"];

// Sync getters - use cache directly, instant access
function getPlayersSync() { return cache["players"]||DEFAULT_PLAYERS.slice(); }
function getTreneriSync() { return cache["treneri"]||DEFAULT_TRENERI.slice(); }
function getTrSync(ds) { return cache["t_"+ds]||{conf:[],confT:[],time:"18:00",timeEnd:"20:00"}; }
function getSeSync(ds) { return cache["s_"+ds]||{dv:[],tr3:[]}; }
function getExtraSync(wk) { return cache["ex_"+wk]||[]; }
function getDeletedSync(wk) { return cache["del_"+wk]||[]; }

// Async getters - fetch from Firebase if not in cache
async function getPlayers() { if(cache["players"]!==undefined)return getPlayersSync(); var v=await dbGet("players"); return v||DEFAULT_PLAYERS.slice(); }
async function getTreneri() { if(cache["treneri"]!==undefined)return getTreneriSync(); var v=await dbGet("treneri"); return v||DEFAULT_TRENERI.slice(); }
async function getTr(ds) { if(cache["t_"+ds]!==undefined)return getTrSync(ds); var v=await dbGet("t_"+ds); return v||{conf:[],confT:[],time:"18:00",timeEnd:"20:00"}; }
async function getSe(ds) { if(cache["s_"+ds]!==undefined)return getSeSync(ds); var v=await dbGet("s_"+ds); return v||{dv:[],tr3:[]}; }
async function getExtra(wk) { if(cache["ex_"+wk]!==undefined)return getExtraSync(wk); var v=await dbGet("ex_"+wk); return v||[]; }
async function getDeleted(wk) { if(cache["del_"+wk]!==undefined)return getDeletedSync(wk); var v=await dbGet("del_"+wk); return v||[]; }

// ── DATES ─────────────────────────────────────────────────────────────────────
function weekDates(off) {
  var now=new Date(),day=now.getDay(),mon=new Date(now);
  mon.setDate(now.getDate()-(day===0?6:day-1)+off*7);
  return [2,4].map(function(n){var dt=new Date(mon);dt.setDate(mon.getDate()+(n-1));return dt;});
}
function toDs(dt){return dt.toISOString().split("T")[0];}
function dayFull(dt){var d=["Nedele","Pondeli","Utery","Streda","Ctvrtek","Patek","Sobota"];return d[dt.getDay()];}
function dateStr(dt){return dt.toLocaleDateString("cs-CZ",{day:"numeric",month:"long",year:"numeric"});}
function isToday(dt){var n=new Date();return dt.getFullYear()===n.getFullYear()&&dt.getMonth()===n.getMonth()&&dt.getDate()===n.getDate();}
function wkLbl(){
  if(weekOff===-1)return"Minuly tyden";if(weekOff===0)return"Tento tyden";
  if(weekOff===1)return"Pristi tyden";return weekOff>0?"+"+weekOff+" tydnu":weekOff+" tydnu";
}
function weekKey(off){return"w"+(off>=0?"+":"")+off;}

// ── NAV ───────────────────────────────────────────────────────────────────────
window.goTo = function(page) {
  activePage=page;
  document.querySelectorAll(".page").forEach(function(p){p.classList.remove("act");});
  document.querySelectorAll(".nav-btn").forEach(function(b){b.classList.remove("act");});
  document.getElementById("pg-"+page).classList.add("act");
  document.getElementById("nb-"+page).classList.add("act");
  if(page==="treninky")drawTreninky();
  if(page==="sestavy")drawSestavy();
  if(page==="hraci")drawHraci();
};
window.chgW = function(dir) {
  weekOff=dir===0?0:weekOff+dir;
  document.getElementById("wkl1").textContent=wkLbl();
  var e2=document.getElementById("wkl2");if(e2)e2.textContent=wkLbl();
  drawTreninky();
  if(activePage==="sestavy")drawSestavy();
};

// ── TRENINKY ──────────────────────────────────────────────────────────────────
function drawTreninky() {
  document.getElementById("wkl1").textContent=wkLbl();
  var cont=document.getElementById("trList");
  cont.innerHTML="";

  var players = getPlayersSync();
  var treneri = getTreneriSync();
  var wk=weekKey(weekOff);
  var deleted=getDeletedSync(wk);
  var extras=getExtraSync(wk);
  var fixedDates=weekDates(weekOff);
  var fixedDs=fixedDates.map(function(dt){return toDs(dt);});

  // Action buttons
  var actDiv=document.createElement("div");actDiv.className="tr-actions";
  var addBtn=document.createElement("button");addBtn.className="tr-act-btn";addBtn.textContent="+ Pridat trenink";
  addBtn.addEventListener("click",function(){addTraining();});
  actDiv.appendChild(addBtn);
  if(unlocked && deleted.length>0){
    var restBtn=document.createElement("button");restBtn.className="tr-act-btn";
    restBtn.style.cssText="border-color:var(--G);color:var(--G);";
    restBtn.textContent="↩ Obnovit smazane ("+deleted.length+")";
    restBtn.addEventListener("click",async function(){
      await dbSet("del_"+wk,[]);toast("Treninky obnoveny");drawTreninky();
    });
    actDiv.appendChild(restBtn);
  }
  cont.appendChild(actDiv);

  // Build date list
  var allDates=fixedDates.filter(function(dt){return deleted.indexOf(toDs(dt))===-1;});
  extras.forEach(function(ds){
    if(fixedDs.indexOf(ds)===-1){
      var parts=ds.split("-");
      allDates.push(new Date(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2])));
    }
  });
  allDates.sort(function(a,b){return a-b;});

  for(var di=0; di<allDates.length; di++) {
    let dt=allDates[di];
    let ds=toDs(dt);
    let t=getTrSync(ds);
    let tod=isToday(dt);
    var card=document.createElement("div");card.className="card";

    // Head
    var head=document.createElement("div");head.className="c-head c-blue";head.style.justifyContent="space-between";
    head.innerHTML='<div><div class="dy">'+(tod?"📍 ":"")+dayFull(dt)+'</div><div class="dt">'+dateStr(dt)+'</div></div>'
      +'<div style="display:flex;align-items:center;gap:6px">'
      +'<button class="tbtn" data-ds="'+ds+'" data-w="s">'+t.time+'</button>'
      +'<span style="color:rgba(255,255,255,0.4)">–</span>'
      +'<button class="tbtn end" data-ds="'+ds+'" data-w="e">'+t.timeEnd+'</button>'
      +'</div>';
    head.querySelectorAll(".tbtn").forEach(function(b){
      b.addEventListener("click",function(){editTime(this.dataset.ds,this.dataset.w);});
    });
    card.appendChild(head);

    // Body
    var body=document.createElement("div");body.className="c-body";
    body.innerHTML='<div class="t-row">'
      +'<span class="tlbl">Start</span><span class="tval" id="tv_s_'+ds+'">'+t.time+'</span>'
      +'<input class="tinput" id="ti_s_'+ds+'" type="time" value="'+t.time+'">'
      +'<span class="tlbl" style="margin-left:12px">Konec</span><span class="tval" id="tv_e_'+ds+'">'+t.timeEnd+'</span>'
      +'<input class="tinput" id="ti_e_'+ds+'" type="time" value="'+t.timeEnd+'">'
      +'</div>'
      +'<div class="cnt">Hraci: <b>'+t.conf.length+'</b> z '+players.length+' &nbsp;&middot;&nbsp; Treneri: <b style="color:#6366f1">'+(t.confT||[]).length+'</b> z '+treneri.length+'</div>';

    body.querySelector("#tv_s_"+ds).addEventListener("click",function(){editTime(ds,"s");});
    body.querySelector("#tv_e_"+ds).addEventListener("click",function(){editTime(ds,"e");});
    body.querySelector("#ti_s_"+ds).addEventListener("change",function(){saveTime(ds,"s",this.value);});
    body.querySelector("#ti_s_"+ds).addEventListener("blur",function(){closeTime(ds,"s");});
    body.querySelector("#ti_e_"+ds).addEventListener("change",function(){saveTime(ds,"e",this.value);});
    body.querySelector("#ti_e_"+ds).addEventListener("blur",function(){closeTime(ds,"e");});

    // Player chips
    var plLbl=document.createElement("div");plLbl.className="sec-lbl";plLbl.textContent="Hraci – klikni pro potvrzeni ucasti";
    body.appendChild(plLbl);
    var pgrid=document.createElement("div");pgrid.className="grid";
    players.forEach(function(p,i){
      var on=t.conf.indexOf(p)!==-1;
      var c=document.createElement("div");c.className="chip"+(on?" on":"");
      c.dataset.idx=i;c.dataset.ds=ds;c.dataset.type="p";
      c.innerHTML='<div class="dot"></div><div class="nm">'+p+'</div>';
      pgrid.appendChild(c);
    });
    pgrid.addEventListener("click",function(e){
      var c=e.target.closest(".chip");if(!c)return;
      togConf(c.dataset.ds,parseInt(c.dataset.idx),"p");
    });
    body.appendChild(pgrid);

    var trLbl=document.createElement("div");trLbl.className="sec-lbl";trLbl.style.marginTop="10px";trLbl.textContent="Treneri";
    body.appendChild(trLbl);
    var tgrid=document.createElement("div");tgrid.className="grid";
    treneri.forEach(function(p,i){
      var on=(t.confT||[]).indexOf(p)!==-1;
      var c=document.createElement("div");c.className="chip tc"+(on?" on":"");
      c.dataset.idx=i;c.dataset.ds=ds;c.dataset.type="t";
      c.innerHTML='<div class="dot"></div><div class="nm">'+p+'</div>';
      tgrid.appendChild(c);
    });
    tgrid.addEventListener("click",function(e){
      var c=e.target.closest(".chip");if(!c)return;
      togConf(c.dataset.ds,parseInt(c.dataset.idx),"t");
    });
    body.appendChild(tgrid);

    // Delete training button (only when unlocked)
    if(unlocked){
      var delTrBtn=document.createElement("button");
      delTrBtn.className="tr-act-btn del";
      delTrBtn.style.cssText="width:100%;margin-top:10px;text-align:center;border-radius:8px;padding:8px;";
      delTrBtn.textContent="Smazat trenink";
      delTrBtn.dataset.ds=ds;
      delTrBtn.addEventListener("click",function(){delTraining(this.dataset.ds);});
      body.appendChild(delTrBtn);
    }

    card.appendChild(body);
    cont.appendChild(card);
  }
}

window.togConf = function(ds,idx,type) {
  var players=getPlayersSync(), treneri=getTreneriSync();
  var name=type==="t"?treneri[idx]:players[idx];
  var t=JSON.parse(JSON.stringify(getTrSync(ds))); // deep copy
  var arr=type==="t"?(t.confT||(t.confT=[])):t.conf;
  var i=arr.indexOf(name);
  if(i===-1){arr.push(name);toast(name+" potvrzen ✓");}
  else{arr.splice(i,1);toast(name+" odpotvzen");}
  cache["t_"+ds]=t; // update cache immediately FIRST
  drawTreninky(); // draw from updated cache
  if(activePage==="sestavy")drawSestavy();
  dbSet("t_"+ds,t); // save to Firebase in background
};

window.editTime = function(ds,w){
  document.getElementById("tv_"+w+"_"+ds).style.display="none";
  var i=document.getElementById("ti_"+w+"_"+ds);i.style.display="inline-block";i.focus();
};
window.closeTime = function(ds,w){
  document.getElementById("tv_"+w+"_"+ds).style.display="";
  document.getElementById("ti_"+w+"_"+ds).style.display="none";
};
window.saveTime = function(ds,w,v){
  var t=JSON.parse(JSON.stringify(getTrSync(ds)));
  if(w==="s")t.time=v;else t.timeEnd=v;
  cache["t_"+ds]=t;
  toast((w==="s"?"Start":"Konec")+": "+v);closeTime(ds,w);
  drawTreninky();
  dbSet("t_"+ds,t);
};

window.addTraining = function(){
  var existing=document.getElementById("newTrDateRow");
  if(existing){existing.remove();return;}
  var cont=document.getElementById("trList");
  var row=document.createElement("div");row.id="newTrDateRow";
  row.style.cssText="display:flex;gap:8px;align-items:center;margin-bottom:12px;background:#fff;border-radius:10px;padding:10px 14px;box-shadow:0 2px 8px rgba(0,0,0,0.07);flex-wrap:wrap;";
  row.innerHTML='<label style="font-size:0.82rem;font-weight:600;color:var(--M)">Datum:</label>'
    +'<input type="date" id="newTrDate" style="border:1.5px solid var(--GR);border-radius:8px;padding:6px 10px;font-size:0.86rem;outline:none;flex:1;min-width:140px;">'
    +'<button class="btn-g" id="newTrConfirm">Pridat</button>'
    +'<button class="btn-o" id="newTrCancel">Zrusit</button>';
  cont.insertBefore(row,cont.children[1]||null);
  var now=new Date();document.getElementById("newTrDate").value=toDs(now);
  document.getElementById("newTrConfirm").addEventListener("click",async function(){
    var ds=document.getElementById("newTrDate").value;if(!ds){toast("Vyber datum");return;}
    var wk=weekKey(weekOff);
    var extras=getExtraSync(wk);
    if(extras.indexOf(ds)!==-1){toast("Trenink uz existuje");return;}
    extras.push(ds);extras.sort();
    await dbSet("ex_"+wk,extras);row.remove();toast("Trenink pridan");drawTreninky();
  });
  document.getElementById("newTrCancel").addEventListener("click",function(){row.remove();});
};

window.delTraining = async function(ds){
  var wk=weekKey(weekOff);
  var extras=getExtraSync(wk).filter(function(d){return d!==ds;});
  await dbSet("ex_"+wk,extras);
  var fixedDs=weekDates(weekOff).map(function(d){return toDs(d);});
  if(fixedDs.indexOf(ds)!==-1){
    var deleted=getDeletedSync(wk);
    if(deleted.indexOf(ds)===-1)deleted.push(ds);
    await dbSet("del_"+wk,deleted);
  }
  await dbSet("t_"+ds,null);
  await dbSet("s_"+ds,null);
  toast("Trenink smazan");
  drawTreninky();
  if(activePage==="sestavy")drawSestavy();
};

// ── SESTAVY ───────────────────────────────────────────────────────────────────
function drawSestavy() {
  document.getElementById("wkl2").textContent=wkLbl();
  var cont=document.getElementById("seList");cont.innerHTML="";
  var players=getPlayersSync(),treneri=getTreneriSync();

  var dates=weekDates(weekOff);
  for(var di=0;di<dates.length;di++){
    let dt=dates[di],ds=toDs(dt);
    var t=getTrSync(ds),se=getSeSync(ds);
    var conf=(t.conf||[]).concat(t.confT||[]);
    var section=document.createElement("div");section.className="se-day";
    var title=document.createElement("div");title.className="se-day-title";
    title.textContent=dayFull(dt)+" – "+dateStr(dt)+(conf.length>0?" ("+conf.length+" potvrzenych)":"");
    section.appendChild(title);
    if(!unlocked){var ln=document.createElement("div");ln.className="lock-note";ln.innerHTML="🔒 Klikni na <b>Sestava</b> vpravo nahore pro editaci.";section.appendChild(ln);}
    if(conf.length===0){var nc=document.createElement("div");nc.className="no-conf";nc.textContent="Zadni potvrzeni hraci.";section.appendChild(nc);}
    else {
      se.dv.forEach(function(slot,i){section.appendChild(makeTeam(ds,"dv",i,slot,conf,se,2,3,"Dvojka"));});
      se.tr3.forEach(function(slot,i){section.appendChild(makeTeam(ds,"tr3",i,slot,conf,se,3,4,"Trojka"));});
    }
    if(unlocked){
      var ar=document.createElement("div");ar.className="add-teams";
      var b1=document.createElement("button");b1.className="add-team-btn";b1.textContent="+ Pridat Dvojku";
      b1.dataset.ds=ds;b1.dataset.type="dv";
      b1.addEventListener("click",function(){addTeam(this.dataset.ds,this.dataset.type);});
      var b2=document.createElement("button");b2.className="add-team-btn";b2.textContent="+ Pridat Trojku";
      b2.dataset.ds=ds;b2.dataset.type="tr3";
      b2.addEventListener("click",function(){addTeam(this.dataset.ds,this.dataset.type);});
      ar.appendChild(b1);ar.appendChild(b2);section.appendChild(ar);
    }
    cont.appendChild(section);
  }
}

function makeTeam(ds,type,idx,slot,conf,se,mn,mx,lbl){
  var tid=ds+"|"+type+"|"+idx;
  var isOpen=openTeam===tid&&unlocked;
  var card=document.createElement("div");card.className="team-card"+(isOpen?" open":"");
  var preview=slot.length>0?slot.join(", ")+" ("+slot.length+"/"+mx+")":"prazdny (min "+mn+", max "+mx+")";
  var hd=document.createElement("div");hd.className="team-hd";
  hd.innerHTML='<span class="team-hd-name">'+lbl+" "+(idx+1)+'</span>'
    +'<span class="team-hd-pl" style="color:'+(slot.length>0?"var(--G)":"var(--M)")+'">'+preview+'</span>'
    +(unlocked?'<span class="team-hd-arr">'+(isOpen?"▲ Zavrit":"▼ Upravit")+'</span>':"");
  hd.dataset.tid=tid;
  hd.addEventListener("click",function(){
    if(!unlocked)return;
    openTeam=openTeam===this.dataset.tid?null:this.dataset.tid;drawSestavy();
  });
  card.appendChild(hd);
  if(!isOpen)return card;
  var bd=document.createElement("div");bd.className="team-bd";
  var tagsLbl=document.createElement("div");tagsLbl.className="pick-lbl";tagsLbl.textContent="Hraci v tymu ("+slot.length+"/"+mx+"):";
  bd.appendChild(tagsLbl);
  var tagsDiv=document.createElement("div");tagsDiv.className="team-tags";
  if(slot.length===0){tagsDiv.innerHTML='<span style="color:var(--M);font-style:italic;font-size:0.8rem">Zatim zadni</span>';}
  else{
    slot.forEach(function(p,pi){
      var tag=document.createElement("div");tag.className="ttag";
      var nm=document.createElement("span");nm.textContent=p;
      var del=document.createElement("button");del.className="ttag-del";del.textContent="x";
      del.dataset.ds=ds;del.dataset.type=type;del.dataset.idx=idx;del.dataset.pi=pi;
      del.addEventListener("click",function(e){e.stopPropagation();rmFromSlot(this.dataset.ds,this.dataset.type,parseInt(this.dataset.idx),parseInt(this.dataset.pi));});
      tag.appendChild(nm);tag.appendChild(del);tagsDiv.appendChild(tag);
    });
  }
  bd.appendChild(tagsDiv);
  if(slot.length<mx){
    var pickLbl=document.createElement("div");pickLbl.className="pick-lbl";pickLbl.style.marginTop="8px";pickLbl.textContent="Klikni na hrace pro pridani:";
    bd.appendChild(pickLbl);
    var pg=document.createElement("div");pg.className="pick-grid";
    conf.forEach(function(p,ci){
      var inThis=slot.indexOf(p)!==-1;
      var inOther=false,otherIdx=-1;
      for(var oi=0;oi<se[type].length;oi++){if(oi!==idx&&se[type][oi].indexOf(p)!==-1){inOther=true;otherIdx=oi;break;}}
      var btn=document.createElement("button");
      if(inThis){btn.className="pbtn in-this";btn.textContent="✓ "+p;btn.disabled=true;}
      else if(inOther){btn.className="pbtn in-other";btn.textContent=p+" ("+(type==="dv"?"D":"T")+(otherIdx+1)+")";btn.disabled=true;}
      else{
        btn.className="pbtn";btn.textContent=p;
        btn.dataset.ds=ds;btn.dataset.type=type;btn.dataset.idx=idx;btn.dataset.ci=ci;
        btn.addEventListener("click",function(){addToSlot(this.dataset.ds,this.dataset.type,parseInt(this.dataset.idx),parseInt(this.dataset.ci));});
      }
      pg.appendChild(btn);
    });
    bd.appendChild(pg);
  } else {var fp=document.createElement("p");fp.style.cssText="color:var(--G);font-size:0.82rem;font-weight:600;margin:8px 0";fp.textContent="Tym je plny!";bd.appendChild(fp);}
  var delBtn=document.createElement("button");delBtn.className="btn-del";delBtn.style.marginTop="8px";delBtn.textContent="Smazat tym";
  delBtn.dataset.ds=ds;delBtn.dataset.type=type;delBtn.dataset.idx=idx;
  delBtn.addEventListener("click",function(){rmTeam(this.dataset.ds,this.dataset.type,parseInt(this.dataset.idx));});
  bd.appendChild(delBtn);
  card.appendChild(bd);return card;
}

window.addTeam = function(ds,type){
  var se=JSON.parse(JSON.stringify(getSeSync(ds))); // deep copy
  se[type].push([]);
  cache["s_"+ds]=se; // update cache immediately FIRST
  openTeam=ds+"|"+type+"|"+(se[type].length-1);
  toast((type==="dv"?"Dvojka":"Trojka")+" pridana");
  drawSestavy(); // draw from updated cache
  dbSet("s_"+ds,se); // save to Firebase in background
};
window.rmTeam = async function(ds,type,idx){
  var se=getSeSync(ds);se[type].splice(idx,1);
  openTeam=null;dbSet("s_"+ds,se);
  toast("Tym smazan");drawSestavy();
};
window.addToSlot = function(ds,type,idx,confIdx){
  var t=getTrSync(ds),se=JSON.parse(JSON.stringify(getSeSync(ds))),mx=type==="dv"?3:4;
  var conf=(t.conf||[]).concat(t.confT||[]);
  var p=conf[confIdx];if(!p)return;
  if(se[type][idx].length>=mx){toast("Tym je plny!");return;}
  if(se[type][idx].indexOf(p)!==-1){toast(p+" uz v tymu");return;}
  for(var i=0;i<se[type].length;i++){if(i!==idx&&se[type][i].indexOf(p)!==-1){toast(p+" uz hraje v jiném tymu");return;}}
  se[type][idx].push(p);
  cache["s_"+ds]=se;
  toast(p+" pridan");
  drawSestavy();
  dbSet("s_"+ds,se);
};
window.rmFromSlot = async function(ds,type,idx,pi){
  var se=JSON.parse(JSON.stringify(getSeSync(ds)));se[type][idx].splice(pi,1);
  cache["s_"+ds]=se;drawSestavy();dbSet("s_"+ds,se);toast("Hrac odebran");
};

// ── HRACI ──────────────────────────────────────────────────────────────────────
function drawHraci(){
  var players=getPlayersSync(),treneri=getTreneriSync();
  renderPeople("plBody","plCnt",players,"hracu","#1a3a6e",false,players,treneri);
  renderPeople("trBody","trCnt",treneri,"treneri","#6366f1",true,players,treneri);
}
function renderPeople(bodyId,cntId,arr,unit,numColor,isTr,players,treneri){
  document.getElementById(cntId).textContent=arr.length+" "+unit;
  var body=document.getElementById(bodyId);body.innerHTML="";
  arr.forEach(function(p,i){
    var row=document.createElement("div");row.className="prow";
    var info=document.createElement("div");
    info.innerHTML='<div class="pnm">'+p+'</div><div class="pnum" style="color:'+numColor+'">#'+(i+1)+'</div>';
    row.appendChild(info);
    if(unlocked){
      var btn=document.createElement("button");btn.className="btn-del";btn.textContent="Odebrat";
      btn.dataset.i=i;btn.dataset.istr=isTr?"1":"0";
      btn.addEventListener("click",function(){
        var ii=parseInt(this.dataset.i);
        if(this.dataset.istr==="1")rmTrener(ii);else rmPlayer(ii);
      });
      row.appendChild(btn);
    }
    body.appendChild(row);
  });
  if(unlocked){
    var ar=document.createElement("div");ar.className="add-pl";
    var inputId=isTr?"newTr":"newPl";
    var inp=document.createElement("input");inp.className="field";inp.id=inputId;inp.placeholder="Jmeno...";inp.maxLength=40;
    var addFn=isTr?addTrener:addPlayer;
    inp.addEventListener("keydown",function(e){if(e.key==="Enter")addFn();});
    var btn2=document.createElement("button");btn2.className="btn-g";btn2.textContent="Pridat";
    btn2.addEventListener("click",addFn);
    ar.appendChild(inp);ar.appendChild(btn2);body.appendChild(ar);
  }
}
async function addPlayer(){
  var inp=document.getElementById("newPl");if(!inp)return;
  var n=inp.value.trim();if(!n)return;
  var players=getPlayersSync();
  if(players.indexOf(n)!==-1){toast("Uz existuje");return;}
  players.push(n);dbSet("players",players);inp.value="";drawHraci();toast(n+" pridan");
}
async function rmPlayer(i){
  var players=getPlayersSync();var n=players.splice(i,1)[0];dbSet("players",players);drawHraci();toast(n+" odebran");
}
async function addTrener(){
  var inp=document.getElementById("newTr");if(!inp)return;
  var n=inp.value.trim();if(!n)return;
  var treneri=getTreneriSync();treneri.push(n);dbSet("treneri",treneri);inp.value="";drawHraci();toast(n+" pridan");
}
async function rmTrener(i){
  var treneri=getTreneriSync();var n=treneri.splice(i,1)[0];dbSet("treneri",treneri);drawHraci();toast(n+" odebran");
}

// ── LOCK ──────────────────────────────────────────────────────────────────────
window.handleLock = function(){
  if(unlocked){
    unlocked=false;openTeam=null;
    document.getElementById("lockBtn").textContent="🔒 Sestava";
    document.getElementById("lockBtn").classList.remove("on");
    if(activePage==="sestavy")drawSestavy();
    if(activePage==="hraci")drawHraci();
    toast("Sestavy zamceny");
  } else {
    document.getElementById("modal").classList.add("open");
    setTimeout(function(){document.getElementById("pw").focus();},80);
  }
};
window.closeModal = function(){
  document.getElementById("modal").classList.remove("open");
  document.getElementById("pw").value="";
  document.getElementById("pwErr").style.display="none";
};
window.checkPw = function(){
  if(document.getElementById("pw").value===HESLO){
    unlocked=true;closeModal();
    document.getElementById("lockBtn").textContent="🟢 Odemceno";
    document.getElementById("lockBtn").classList.add("on");
    if(activePage==="sestavy")drawSestavy();
    if(activePage==="hraci")drawHraci();
    drawTreninky();
    toast("Sestavy odemceny");
  } else {
    document.getElementById("pwErr").style.display="block";
    document.getElementById("pw").value="";
  }
};
window.toast = function(m){
  var t=document.getElementById("toast");t.textContent=m;t.classList.add("show");
  clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove("show");},2400);
};

var appReady = false;
// INIT - attach all event listeners
document.querySelectorAll(".nav-btn[data-page]").forEach(function(btn){
  btn.addEventListener("click",function(){ goTo(this.dataset.page); });
});
document.getElementById("wk1-prev").addEventListener("click",function(){ chgW(-1); });
document.getElementById("wk1-dnes").addEventListener("click",function(){ chgW(0); });
document.getElementById("wk1-next").addEventListener("click",function(){ chgW(1); });
document.getElementById("wk2-prev").addEventListener("click",function(){ chgW(-1); });
document.getElementById("wk2-dnes").addEventListener("click",function(){ chgW(0); });
document.getElementById("wk2-next").addEventListener("click",function(){ chgW(1); });
document.getElementById("lockBtn").addEventListener("click",handleLock);
document.getElementById("modalZrusit").addEventListener("click",closeModal);
document.getElementById("modalPrihlasit").addEventListener("click",checkPw);
document.getElementById("modal").addEventListener("click",function(e){if(e.target.id==="modal")closeModal();});
document.getElementById("pw").addEventListener("keydown",function(e){if(e.key==="Enter")checkPw();});

chgW(0);
drawTreninky(); appReady = true;
</script>
