<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Firebase Test</title></head>
<body>
<h2 id="status">Testing Firebase...</h2>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyB_BagFO5mf-qDwBVrVbxULXBD9tv0cjVQ",
  authDomain: "spartak-nohejbal.firebaseapp.com",
  projectId: "spartak-nohejbal",
  storageBucket: "spartak-nohejbal.firebasestorage.app",
  messagingSenderId: "252334492142",
  appId: "1:252334492142:web:71180fbbb65737be34e6ff"
});

const db = getFirestore(app);

document.getElementById('status').textContent = 'Firebase initialized, connecting...';

onSnapshot(collection(db, "spartak"), function(snapshot) {
  document.getElementById('status').textContent = 
    'SUCCESS! Loaded ' + snapshot.size + ' documents from Firebase';
}, function(error) {
  document.getElementById('status').textContent = 'ERROR: ' + error.message;
});
</script>
</body>
</html>
