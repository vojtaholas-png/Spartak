<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>OCHE — Šipky</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;500;600;700&family=Kalam:wght@400;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#101a15;
  --bg2:#16241c;
  --felt:#1b2b21;
  --chalk:#f2ecda;
  --chalk-dim:#c9c2ac;
  --brass:#c9a24b;
  --brass-dim:#8a723a;
  --red:#b5382c;
  --red-dim:#7a2620;
  --green:#2f6b4f;
  --green-dim:#1f4433;
  --muted:#7d8c81;
  --line:#2a3a30;
  --shadow:0 10px 30px rgba(0,0,0,.45);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;}
body{
  background:
    radial-gradient(circle at 50% -10%, rgba(201,162,75,.08), transparent 60%),
    var(--bg);
  color:var(--chalk);
  font-family:'Barlow Condensed',sans-serif;
  overflow-x:hidden;
}
button{font-family:inherit;}
::selection{background:var(--brass);color:#1a1a1a;}

/* ---- App shell ---- */
#app{max-width:520px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;padding-bottom:78px;position:relative;}

header.top{
  padding:22px 20px 14px;
  display:flex;align-items:baseline;justify-content:space-between;
  border-bottom:1px solid var(--line);
  background:linear-gradient(180deg, rgba(201,162,75,.06), transparent);
}
header.top h1{
  font-family:'Bebas Neue',sans-serif;
  font-size:34px;letter-spacing:3px;margin:0;color:var(--chalk);
  text-shadow:0 0 18px rgba(201,162,75,.25);
}
header.top h1 span{color:var(--brass);}
header.top .sub{font-size:13px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;}

main{flex:1;padding:18px 16px 10px;}

.view{display:none;animation:fadein .25s ease;}
.view.active{display:block;}
@keyframes fadein{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

h2.section-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:22px;letter-spacing:2px;color:var(--brass);
  margin:26px 0 12px;padding-bottom:6px;border-bottom:1px dashed var(--line);
}
h2.section-title:first-child{margin-top:0;}

/* ---- cards / chalkboard panels ---- */
.panel{
  background:var(--bg2);
  border:1px solid var(--line);
  border-radius:14px;
  padding:16px;
  box-shadow:var(--shadow);
}
.panel + .panel{margin-top:12px;}

.field{margin-bottom:14px;}
.field label{display:block;font-size:13px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:7px;}
.choice-row{display:flex;gap:8px;flex-wrap:wrap;}
.choice{
  flex:1;min-width:64px;text-align:center;
  padding:10px 8px;border-radius:10px;border:1px solid var(--line);
  background:var(--felt);color:var(--chalk-dim);cursor:pointer;
  font-size:16px;font-weight:600;transition:.15s;
}
.choice.active{background:var(--brass);border-color:var(--brass);color:#1a1408;}
.choice:active{transform:scale(.96);}

.player-check{
  display:flex;align-items:center;gap:10px;
  padding:10px 4px;border-bottom:1px solid var(--line);
  font-size:19px;cursor:pointer;
}
.player-check:last-child{border-bottom:none;}
.player-check .box{
  width:22px;height:22px;border-radius:6px;border:2px solid var(--brass-dim);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.player-check.checked .box{background:var(--brass);border-color:var(--brass);}
.player-check .box::after{content:'';width:11px;height:6px;border-left:2.5px solid #1a1408;border-bottom:2.5px solid #1a1408;transform:rotate(-45deg) translateY(-1px);display:none;}
.player-check.checked .box::after{display:block;}

.btn{
  display:block;width:100%;text-align:center;padding:16px;border-radius:12px;
  border:none;font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;
  cursor:pointer;transition:.15s;
}
.btn:active{transform:scale(.98);}
.btn-primary{background:var(--red);color:var(--chalk);box-shadow:0 6px 18px rgba(181,56,44,.35);}
.btn-ghost{background:transparent;border:1px solid var(--line);color:var(--chalk-dim);}
.btn-green{background:var(--green);color:var(--chalk);}
.btn-small{padding:9px 14px;font-size:15px;border-radius:8px;width:auto;display:inline-block;}

/* ---- Empty state ---- */
.empty{
  text-align:center;padding:40px 20px;color:var(--muted);
}
.empty .glyph{font-size:44px;margin-bottom:10px;opacity:.6;}
.empty p{font-size:16px;line-height:1.5;}

/* ---- Bottom nav ---- */
nav.tabbar{
  position:fixed;bottom:0;left:0;right:0;
  max-width:520px;margin:0 auto;
  display:flex;background:var(--bg2);border-top:1px solid var(--line);
  box-shadow:0 -8px 24px rgba(0,0,0,.4);
}
nav.tabbar button{
  flex:1;background:none;border:none;color:var(--muted);
  padding:10px 2px 12px;font-size:11px;letter-spacing:.5px;
  display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;
}
nav.tabbar button svg{width:21px;height:21px;stroke:var(--muted);fill:none;stroke-width:1.8;}
nav.tabbar button.active{color:var(--brass);}
nav.tabbar button.active svg{stroke:var(--brass);}

/* ---- Dartboard ---- */
.board-wrap{display:flex;justify-content:center;margin:6px 0 4px;}
#dartboard{width:100%;max-width:340px;touch-action:manipulation;user-select:none;}
#dartboard .seg{cursor:pointer;transition:filter .1s;}
#dartboard .seg:active{filter:brightness(1.4);}
#dartboard .num-label{font-family:'Barlow Condensed',sans-serif;font-weight:700;fill:var(--chalk);font-size:15px;pointer-events:none;}
#dartboard .ring-outer{fill:none;stroke:var(--brass-dim);stroke-width:1;}

.mult-row{display:flex;gap:8px;margin:14px 0 10px;}
.mult-btn{
  flex:1;padding:13px;border-radius:12px;border:2px solid var(--line);
  background:var(--felt);color:var(--chalk-dim);font-family:'Bebas Neue',sans-serif;
  font-size:19px;letter-spacing:2px;cursor:pointer;
}
.mult-btn.active[data-m="1"]{background:var(--chalk-dim);color:#1a1a1a;border-color:var(--chalk-dim);}
.mult-btn.active[data-m="2"]{background:var(--red);color:var(--chalk);border-color:var(--red);}
.mult-btn.active[data-m="3"]{background:var(--green);color:var(--chalk);border-color:var(--green);}

.numpad{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin-bottom:14px;}
.num-btn{
  padding:12px 0;text-align:center;border-radius:9px;border:1px solid var(--line);
  background:var(--felt);color:var(--chalk);font-family:'JetBrains Mono',monospace;font-weight:600;font-size:16px;cursor:pointer;
}
.num-btn:active{background:var(--brass);color:#1a1408;}
.num-btn.wide{grid-column:span 5;background:var(--red-dim);color:var(--chalk);font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;}
.util-row{display:flex;gap:8px;margin-bottom:6px;}
.util-btn{
  flex:1;padding:11px 4px;border-radius:10px;border:1px solid var(--line);
  background:var(--felt);color:var(--chalk-dim);font-size:14px;font-weight:600;cursor:pointer;
}
.util-btn:active{background:var(--brass-dim);}

/* ---- Game HUD ---- */
.hud{display:flex;gap:10px;margin-bottom:14px;}
.hud .player-score{
  flex:1;background:var(--bg2);border:1px solid var(--line);border-radius:12px;
  padding:12px 10px;text-align:center;position:relative;overflow:hidden;
}
.hud .player-score.turn{border-color:var(--brass);box-shadow:0 0 0 1px var(--brass) inset,0 0 20px rgba(201,162,75,.15);}
.hud .player-score .pname{font-size:14px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;}
.hud .player-score.turn .pname{color:var(--brass);}
.hud .player-score .pscore{font-family:'JetBrains Mono',monospace;font-size:30px;font-weight:700;color:var(--chalk);line-height:1.15;}
.hud .player-score .plegs{font-size:12px;color:var(--muted);margin-top:2px;}

.turn-darts{display:flex;gap:8px;justify-content:center;margin:12px 0;min-height:40px;}
.dart-chip{
  background:var(--felt);border:1px solid var(--brass-dim);border-radius:9px;
  padding:7px 12px;font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:600;
  display:flex;align-items:center;gap:6px;
}
.dart-chip button{background:none;border:none;color:var(--red);font-size:14px;cursor:pointer;padding:0;line-height:1;}
.dart-chip.placeholder{border-style:dashed;color:var(--muted);opacity:.5;}

.checkout-box{
  background:var(--felt);border:1px dashed var(--brass-dim);border-radius:12px;
  padding:12px 14px;text-align:center;margin:14px 0;
  font-family:'Kalam',cursive;
}
.checkout-box .lbl{font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
.checkout-box .combo{font-size:24px;color:var(--brass);font-weight:700;}
.checkout-box .combo.none{color:var(--muted);font-size:18px;}

.bust-flash{
  text-align:center;font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;
  color:var(--red);padding:10px 0;
}

/* ---- Players list ---- */
.player-row{
  display:flex;align-items:center;gap:12px;padding:13px 4px;border-bottom:1px solid var(--line);
}
.player-row:last-child{border-bottom:none;}
.dart-ico{font-size:20px;}
.player-row .name{flex:1;font-size:19px;}
.player-row button.del{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;}
.add-player-row{display:flex;gap:8px;margin-top:12px;}
.add-player-row input{
  flex:1;background:var(--felt);border:1px solid var(--line);border-radius:10px;
  padding:11px 12px;color:var(--chalk);font-size:16px;font-family:inherit;
}
.add-player-row input:focus{outline:1px solid var(--brass);}

/* ---- Stats ---- */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px;}
.stat-card{background:var(--felt);border:1px solid var(--line);border-radius:12px;padding:14px;text-align:center;}
.stat-card .val{font-family:'JetBrains Mono',monospace;font-size:26px;font-weight:700;color:var(--brass);}
.stat-card .lbl{font-size:12px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:3px;}

/* ---- History ---- */
.hist-item{
  background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:13px 14px;margin-bottom:10px;cursor:pointer;
}
.hist-item .row1{display:flex;justify-content:space-between;font-size:13px;color:var(--muted);}
.hist-item .row2{display:flex;justify-content:space-between;align-items:center;margin-top:6px;}
.hist-item .winner{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;color:var(--brass);}
.hist-item .mode{font-size:13px;color:var(--chalk-dim);}
.hist-detail{margin-top:10px;padding-top:10px;border-top:1px dashed var(--line);display:none;}
.hist-item.open .hist-detail{display:block;}
.hist-detail .prow{display:flex;justify-content:space-between;font-size:15px;padding:4px 0;}

/* ---- Settings ---- */
.setting-row{display:flex;justify-content:space-between;align-items:center;padding:12px 4px;border-bottom:1px solid var(--line);}
.setting-row:last-child{border-bottom:none;}
.toggle{width:46px;height:26px;border-radius:20px;background:var(--felt);border:1px solid var(--line);position:relative;cursor:pointer;}
.toggle.on{background:var(--green);}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:var(--chalk);transition:.15s;}
.toggle.on::after{left:22px;}

.leg-result{
  text-align:center;padding:20px 10px 6px;
}
.leg-result .glyph{font-size:40px;}
.leg-result h3{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;color:var(--brass);margin:8px 0 2px;}
.leg-result p{color:var(--muted);font-size:15px;margin:0 0 16px;}

.toast{
  position:fixed;bottom:90px;left:50%;transform:translateX(-50%);
  background:var(--brass);color:#1a1408;padding:10px 18px;border-radius:10px;
  font-weight:600;font-size:14px;box-shadow:var(--shadow);z-index:50;opacity:0;pointer-events:none;transition:.25s;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-6px);}

select.native{
  width:100%;background:var(--felt);border:1px solid var(--line);border-radius:10px;
  color:var(--chalk);padding:11px 12px;font-size:16px;font-family:inherit;
}
</style>
</head>
<body>
<div id="app">
  <header class="top">
    <div>
      <h1>OCHE<span>•</span></h1>
      <div class="sub">Šipky počítadlo</div>
    </div>
  </header>

  <main>

    <!-- ===== HRA (setup + play) ===== -->
    <section class="view active" id="view-hra">
      <div id="hra-content"></div>
    </section>

    <!-- ===== HRÁČI ===== -->
    <section class="view" id="view-hraci">
      <h2 class="section-title">Hráči</h2>
      <div class="panel">
        <div id="players-list"></div>
        <div class="add-player-row">
          <input type="text" id="new-player-name" placeholder="Jméno hráče" maxlength="20">
          <button class="btn btn-primary btn-small" id="add-player-btn">Přidat</button>
        </div>
      </div>
    </section>

    <!-- ===== STATISTIKA ===== -->
    <section class="view" id="view-stat">
      <h2 class="section-title">Statistika</h2>
      <div class="field">
        <label>Hráč</label>
        <select class="native" id="stat-player-select"></select>
      </div>
      <div id="stat-content"></div>
    </section>

    <!-- ===== HISTORIE ===== -->
    <section class="view" id="view-hist">
      <h2 class="section-title">Historie hry</h2>
      <div id="hist-list"></div>
    </section>

    <!-- ===== NASTAVENÍ ===== -->
    <section class="view" id="view-settings">
      <h2 class="section-title">Nastavení</h2>
      <div class="panel">
        <div class="setting-row">
          <span>Náhodné pořadí hráčů</span>
          <div class="toggle" id="toggle-random"></div>
        </div>
        <div class="setting-row">
          <span>Zvukové efekty</span>
          <div class="toggle" id="toggle-sound"></div>
        </div>
      </div>
      <div class="panel" style="margin-top:14px;">
        <button class="btn btn-ghost" id="reset-data-btn" style="color:var(--red);">Smazat všechna data</button>
      </div>
      <p style="color:var(--muted);font-size:13px;text-align:center;margin-top:18px;">OCHE Šipky · vlastní počítadlo & statistiky</p>
    </section>

  </main>

  <nav class="tabbar">
    <button data-view="hra" class="active">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="4.2"/><circle cx="12" cy="12" r="1"/></svg>
      Hra
    </button>
    <button data-view="hraci">
      <svg viewBox="0 0 24 24"><circle cx="9" cy="8" r="3.2"/><path d="M3 20c0-3.5 2.7-6 6-6s6 2.5 6 6"/><circle cx="17" cy="9" r="2.6"/><path d="M15.5 14c2.6.3 4.5 2.4 4.5 5.5"/></svg>
      Hráči
    </button>
    <button data-view="stat">
      <svg viewBox="0 0 24 24"><path d="M4 20V10M10 20V4M16 20v-7M22 20H2"/></svg>
      Statistika
    </button>
    <button data-view="hist">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l3 2"/><path d="M9 2h6"/></svg>
      Historie
    </button>
    <button data-view="settings">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 00.3 1.9l.1.1a2 2 0 11-2.8 2.8l-.1-.1a1.7 1.7 0 00-1.9-.3 1.7 1.7 0 00-1 1.5V21a2 2 0 11-4 0v-.1a1.7 1.7 0 00-1-1.6 1.7 1.7 0 00-1.9.3l-.1.1a2 2 0 11-2.8-2.8l.1-.1a1.7 1.7 0 00.3-1.9 1.7 1.7 0 00-1.5-1H3a2 2 0 110-4h.1a1.7 1.7 0 001.5-1 1.7 1.7 0 00-.3-1.9l-.1-.1a2 2 0 112.8-2.8l.1.1a1.7 1.7 0 001.9.3H9a1.7 1.7 0 001-1.5V3a2 2 0 114 0v.1a1.7 1.7 0 001 1.5 1.7 1.7 0 001.9-.3l.1-.1a2 2 0 112.8 2.8l-.1.1a1.7 1.7 0 00-.3 1.9V9a1.7 1.7 0 001.5 1H21a2 2 0 110 4h-.1a1.7 1.7 0 00-1.5 1z"/></svg>
      Nastavení
    </button>
  </nav>
</div>
<div class="toast" id="toast"></div>

<script>
/* ============================================================
   OCHE — Šipky: storage helpers
   ============================================================ */
const KEYS = { players:'darts-players', history:'darts-history', active:'darts-active-game', settings:'darts-settings' };
let STATE = { players: [], history: [], active: null, settings: { random:true, sound:false } };

async function loadAll(){
  try{ const v = localStorage.getItem(KEYS.players); STATE.players = v? JSON.parse(v) : []; }catch(e){ STATE.players = []; }
  try{ const v = localStorage.getItem(KEYS.history); STATE.history = v? JSON.parse(v) : []; }catch(e){ STATE.history = []; }
  try{ const v = localStorage.getItem(KEYS.active); STATE.active = v? JSON.parse(v) : null; }catch(e){ STATE.active = null; }
  try{ const v = localStorage.getItem(KEYS.settings); STATE.settings = v? JSON.parse(v) : STATE.settings; }catch(e){}
}
async function savePlayers(){ try{ localStorage.setItem(KEYS.players, JSON.stringify(STATE.players)); }catch(e){ toast('Uložení se nezdařilo'); } }
async function saveHistory(){ try{ localStorage.setItem(KEYS.history, JSON.stringify(STATE.history)); }catch(e){ toast('Uložení se nezdařilo'); } }
async function saveActive(){ try{ if(STATE.active) localStorage.setItem(KEYS.active, JSON.stringify(STATE.active)); else localStorage.removeItem(KEYS.active); }catch(e){} }
async function saveSettings(){ try{ localStorage.setItem(KEYS.settings, JSON.stringify(STATE.settings)); }catch(e){} }

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._h); t._h = setTimeout(()=>t.classList.remove('show'), 1800);
}
function uid(){ return Math.random().toString(36).slice(2,10); }

/* ============================================================
   Navigation
   ============================================================ */
document.querySelectorAll('nav.tabbar button').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('nav.tabbar button').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('view-'+btn.dataset.view).classList.add('active');
    if(btn.dataset.view==='stat') renderStats();
    if(btn.dataset.view==='hist') renderHistory();
    if(btn.dataset.view==='hraci') renderPlayers();
    if(btn.dataset.view==='settings') renderSettings();
  });
});

/* ============================================================
   Checkout suggestion engine
   ============================================================ */
const ALL_THROWS = (()=>{
  const list = [];
  for(let n=20;n>=1;n--){
    list.push({label:'T'+n, value:n*3, type:'T'});
    list.push({label:'D'+n, value:n*2, type:'D'});
    list.push({label:n+'', value:n, type:'S'});
  }
  list.push({label:'BULL', value:25, type:'S'});
  list.push({label:'BULLSEYE', value:50, type:'D'});
  list.sort((a,b)=>b.value-a.value);
  return list;
})();

function isValidFinish(throwObj, mode){
  if(mode==='straight') return true;
  if(mode==='double') return throwObj.type==='D';
  if(mode==='master') return throwObj.type==='D' || throwObj.type==='T';
  return true;
}
function searchCheckout(remaining, dartsLeft, mode){
  if(dartsLeft===0) return remaining===0 ? [] : null;
  for(const th of ALL_THROWS){
    if(th.value > remaining) continue;
    const rem2 = remaining - th.value;
    if(dartsLeft===1){
      if(rem2===0 && isValidFinish(th, mode)) return [th.label];
      continue;
    } else {
      if(rem2===0) continue;
      const sub = searchCheckout(rem2, dartsLeft-1, mode);
      if(sub) return [th.label, ...sub];
    }
  }
  return null;
}
function getCheckout(remaining, mode, maxDarts){
  maxDarts = maxDarts || 3;
  if(remaining<=0 || remaining>170) return null;
  if(remaining===1 && mode!=='straight') return null;
  for(let d=1; d<=maxDarts; d++){
    const res = searchCheckout(remaining, d, mode);
    if(res) return res;
  }
  return null;
}

/* ============================================================
   Dartboard SVG (build once)
   ============================================================ */
const BOARD_ORDER = [20,1,18,4,13,6,10,15,2,17,3,19,7,16,8,11,14,9,12,5];
function polar(cx,cy,r,angleDeg){
  const a = (angleDeg-90) * Math.PI/180;
  return { x: cx + r*Math.cos(a), y: cy + r*Math.sin(a) };
}
function ringPath(cx,cy,rInner,rOuter,startDeg,endDeg){
  const p1 = polar(cx,cy,rOuter,startDeg);
  const p2 = polar(cx,cy,rOuter,endDeg);
  const p3 = polar(cx,cy,rInner,endDeg);
  const p4 = polar(cx,cy,rInner,startDeg);
  const large = (endDeg-startDeg) > 180 ? 1 : 0;
  return `M ${p1.x} ${p1.y} A ${rOuter} ${rOuter} 0 ${large} 1 ${p2.x} ${p2.y} L ${p3.x} ${p3.y} A ${rInner} ${rInner} 0 ${large} 0 ${p4.x} ${p4.y} Z`;
}
function buildDartboard(){
  const cx=150, cy=150, R=140;
  const rings = { dOut:R, dIn:R*0.92, sOut2:R*0.92, tOut:R*0.60, tIn:R*0.54, sOut1:R*0.54, sIn:R*0.16, bullOut:R*0.16, bullIn:R*0.065 };
  let svg = '';
  const seg = 18;
  for(let i=0;i<20;i++){
    const num = BOARD_ORDER[i];
    const start = i*seg - seg/2;
    const end = start + seg;
    const dark = i%2===0;
    const singleFill = dark ? '#efe6cf' : '#1c1a16';
    const bigFill = dark ? '#1c1a16' : '#efe6cf';
    // outer single
    svg += `<path class="seg" data-num="${num}" data-type="S" d="${ringPath(cx,cy,rings.tOut,rings.sOut2,start,end)}" fill="${singleFill}" stroke="#0b0a08" stroke-width="0.6"/>`;
    // double ring
    svg += `<path class="seg" data-num="${num}" data-type="D" d="${ringPath(cx,cy,rings.dIn,rings.dOut,start,end)}" fill="${dark?'#2f6b4f':'#b5382c'}" stroke="#0b0a08" stroke-width="0.6"/>`;
    // treble ring
    svg += `<path class="seg" data-num="${num}" data-type="T" d="${ringPath(cx,cy,rings.tIn,rings.tOut,start,end)}" fill="${dark?'#2f6b4f':'#b5382c'}" stroke="#0b0a08" stroke-width="0.6"/>`;
    // inner single
    svg += `<path class="seg" data-num="${num}" data-type="S" d="${ringPath(cx,cy,rings.sIn,rings.tIn,start,end)}" fill="${bigFill}" stroke="#0b0a08" stroke-width="0.6"/>`;
    // number label
    const lp = polar(cx,cy,R*1.04, i*seg);
    svg += `<text class="num-label" x="${lp.x}" y="${lp.y}" text-anchor="middle" dominant-baseline="middle">${num}</text>`;
  }
  // bull
  svg += `<circle class="seg" data-num="25" data-type="S" cx="${cx}" cy="${cy}" r="${rings.bullOut}" fill="#2f6b4f" stroke="#0b0a08" stroke-width="0.6"/>`;
  svg += `<circle class="seg" data-num="25" data-type="D" cx="${cx}" cy="${cy}" r="${rings.bullIn}" fill="#b5382c" stroke="#0b0a08" stroke-width="0.6"/>`;
  svg += `<circle class="ring-outer" cx="${cx}" cy="${cy}" r="${R}"/>`;
  return `<svg id="dartboard" viewBox="0 0 300 300">${svg}</svg>`;
}

/* ============================================================
   HRA VIEW — setup + play
   ============================================================ */
function renderHra(){
  const el = document.getElementById('hra-content');
  if(STATE.active){ renderPlay(); return; }
  renderSetup();
}

let setupState = { selected:new Set(), x01:501, checkout:'double', legsTo:3 };

function renderSetup(){
  const el = document.getElementById('hra-content');
  if(STATE.players.length===0){
    el.innerHTML = `<div class="empty"><div class="glyph">🎯</div><p>Zatím žádní hráči.<br>Přidej hráče v záložce <b>Hráči</b> a založ hru.</p></div>`;
    return;
  }
  el.innerHTML = `
    <h2 class="section-title">Nová hra</h2>
    <div class="panel">
      <div class="field">
        <label>Hra</label>
        <div class="choice-row" id="x01-row">
          ${[301,501,701,170].map(v=>`<div class="choice ${setupState.x01===v?'active':''}" data-x01="${v}">${v}</div>`).join('')}
        </div>
      </div>
      <div class="field">
        <label>Zavírání (checkout)</label>
        <div class="choice-row" id="checkout-row">
          ${[['double','Double Out'],['master','Master Out'],['straight','Straight Out']].map(([v,l])=>`<div class="choice ${setupState.checkout===v?'active':''}" data-checkout="${v}">${l}</div>`).join('')}
        </div>
      </div>
      <div class="field">
        <label>Hra do</label>
        <div class="choice-row" id="legs-row">
          ${[1,3,5,7].map(v=>`<div class="choice ${setupState.legsTo===v?'active':''}" data-legs="${v}">${v} ${v===1?'legu':'legů'}</div>`).join('')}
        </div>
      </div>
    </div>
    <h2 class="section-title">Kdo hraje</h2>
    <div class="panel">
      <div id="setup-players"></div>
    </div>
    <button class="btn btn-primary" id="start-game-btn" style="margin-top:18px;">START</button>
  `;
  const spEl = document.getElementById('setup-players');
  spEl.innerHTML = STATE.players.map(p=>`
    <div class="player-check ${setupState.selected.has(p.id)?'checked':''}" data-pid="${p.id}">
      <div class="box"></div><div>${escapeHtml(p.name)}</div>
    </div>`).join('');
  spEl.querySelectorAll('.player-check').forEach(row=>{
    row.addEventListener('click', ()=>{
      const id = row.dataset.pid;
      if(setupState.selected.has(id)) setupState.selected.delete(id); else setupState.selected.add(id);
      row.classList.toggle('checked');
    });
  });
  document.querySelectorAll('#x01-row .choice').forEach(c=>c.addEventListener('click',()=>{ setupState.x01=+c.dataset.x01; renderSetup(); }));
  document.querySelectorAll('#checkout-row .choice').forEach(c=>c.addEventListener('click',()=>{ setupState.checkout=c.dataset.checkout; renderSetup(); }));
  document.querySelectorAll('#legs-row .choice').forEach(c=>c.addEventListener('click',()=>{ setupState.legsTo=+c.dataset.legs; renderSetup(); }));
  document.getElementById('start-game-btn').addEventListener('click', startGame);
}

function startGame(){
  let ids = Array.from(setupState.selected);
  if(ids.length===0){ toast('Vyber alespoň jednoho hráče'); return; }
  if(STATE.settings.random){ ids = shuffle(ids); }
  const players = ids.map(id=>{
    const p = STATE.players.find(pp=>pp.id===id);
    return { id: p.id, name: p.name, remaining: setupState.x01, legsWon:0, turns:[] };
  });
  STATE.active = {
    id: uid(), startedAt: Date.now(), x01: setupState.x01, checkout: setupState.checkout,
    legsTo: setupState.legsTo, players, currentPlayer:0, currentTurn:[], legNumber:1,
    legStartScores: players.map(p=>setupState.x01), allLegs: []
  };
  saveActive();
  renderHra();
}
function shuffle(arr){ const a=arr.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

let turnMultiplier = 1;

function renderPlay(){
  const el = document.getElementById('hra-content');
  const g = STATE.active;
  const cp = g.players[g.currentPlayer];
  const dartsIn = g.currentTurn.length;
  const usedSoFar = g.currentTurn.reduce((s,t)=>s+t.value,0);
  const liveRemaining = cp.remaining - usedSoFar;
  const co = getCheckout(liveRemaining, g.checkout, 3-dartsIn);

  el.innerHTML = `
    <div class="hud">
      ${g.players.map((p,i)=>`
        <div class="player-score ${i===g.currentPlayer?'turn':''}">
          <div class="pname">${escapeHtml(p.name)}</div>
          <div class="pscore">${i===g.currentPlayer? liveRemaining : p.remaining}</div>
          <div class="plegs">Legy: ${p.legsWon}</div>
        </div>`).join('')}
    </div>
    <div style="text-align:center;color:var(--muted);font-size:13px;letter-spacing:1px;">LEG ${g.legNumber} · HRA DO ${g.legsTo} · ${g.checkout==='double'?'DOUBLE OUT':g.checkout==='master'?'MASTER OUT':'STRAIGHT OUT'}</div>

    <div class="checkout-box">
      <div class="lbl">Doporučený zdvih pro ${escapeHtml(cp.name)}</div>
      <div class="combo ${co?'':'none'}">${co ? co.join('  ·  ') : (liveRemaining<=1 && g.checkout!=='straight' ? '—' : (liveRemaining>170?'zatím moc':'—'))}</div>
    </div>

    <div class="turn-darts" id="turn-darts">
      ${[0,1,2].map(i=>{
        const t = g.currentTurn[i];
        return t ? `<div class="dart-chip">${t.label}<button data-i="${i}">✕</button></div>` : `<div class="dart-chip placeholder">${i+1}.</div>`;
      }).join('')}
    </div>

    <div class="board-wrap">${buildDartboard()}</div>

    <div class="mult-row">
      <div class="mult-btn ${turnMultiplier===1?'active':''}" data-m="1">SINGLE</div>
      <div class="mult-btn ${turnMultiplier===2?'active':''}" data-m="2">DOUBLE</div>
      <div class="mult-btn ${turnMultiplier===3?'active':''}" data-m="3">TREBLE</div>
    </div>
    <div class="numpad" id="numpad">
      ${Array.from({length:20},(_,i)=>i+1).map(n=>`<div class="num-btn" data-n="${n}">${n}</div>`).join('')}
      <div class="num-btn wide" data-n="25">BULL</div>
    </div>
    <div class="util-row">
      <div class="util-btn" id="miss-btn">MIMO (0)</div>
      <div class="util-btn" id="undo-btn">ZPĚT</div>
      <div class="util-btn" id="end-turn-btn">DALŠÍ HRÁČ</div>
    </div>
  `;

  // multiplier buttons
  el.querySelectorAll('.mult-btn').forEach(b=>b.addEventListener('click', ()=>{
    turnMultiplier = +b.dataset.m; renderPlay();
  }));
  // dartboard clicks
  el.querySelectorAll('#dartboard .seg').forEach(s=>s.addEventListener('click', ()=>{
    const num = +s.dataset.num;
    const baseType = s.dataset.type; // S, D, or T possible zone on board itself
    registerThrow(num, baseType);
  }));
  el.querySelectorAll('#numpad .num-btn').forEach(b=>b.addEventListener('click', ()=>{
    const n = +b.dataset.n;
    if(n===25){ registerThrow(25, turnMultiplier===2?'D':'S'); return; }
    const type = turnMultiplier===3?'T':turnMultiplier===2?'D':'S';
    registerThrow(n, type);
  }));
  el.querySelectorAll('#turn-darts button').forEach(b=>b.addEventListener('click',(e)=>{
    e.stopPropagation();
    g.currentTurn.splice(+b.dataset.i,1);
    renderPlay();
  }));
  document.getElementById('miss-btn').addEventListener('click', ()=>{
    if(g.currentTurn.length>=3) return;
    g.currentTurn.push({label:'MIMO', value:0});
    afterDart();
  });
  document.getElementById('undo-btn').addEventListener('click', ()=>{
    g.currentTurn.pop(); renderPlay();
  });
  document.getElementById('end-turn-btn').addEventListener('click', finishTurn);
}

function registerThrow(boardNum, zoneType){
  const g = STATE.active;
  if(g.currentTurn.length>=3) return;
  let type, value, label;
  if(boardNum===25){
    // bull area: zoneType S=outer bull(25), D=inner bullseye(50)
    if(zoneType==='D'){ type='D'; value=50; label='BULLSEYE'; }
    else { type='S'; value=25; label='BULL'; }
  } else {
    // use chosen multiplier only within the zone that allows it, but keep it simple: honor board zone directly,
    // unless user pre-selected a multiplier via buttons for manual precision — board zone wins if clicked on ring.
    type = zoneType; value = boardNum * (type==='T'?3:type==='D'?2:1);
    label = (type==='T'?'T':type==='D'?'D':'') + boardNum;
  }
  g.currentTurn.push({label, value});
  afterDart();
}

function afterDart(){
  const g = STATE.active;
  renderPlay();
  if(g.currentTurn.length===3){
    setTimeout(finishTurn, 350);
  }
}

function finishTurn(){
  const g = STATE.active;
  if(g.currentTurn.length===0) return;
  const cp = g.players[g.currentPlayer];
  const turnTotal = g.currentTurn.reduce((s,t)=>s+t.value,0);
  const remainingAfter = cp.remaining - turnTotal;
  const lastDart = g.currentTurn[g.currentTurn.length-1];
  const lastIsValidFinish = lastDart.value>0 && isValidFinish({type: lastDart.label.startsWith('T')?'T':lastDart.label.startsWith('D')||lastDart.label==='BULLSEYE'?'D':'S'}, g.checkout);

  let bust = false;
  if(remainingAfter<0) bust = true;
  else if(remainingAfter===0 && !lastIsValidFinish) bust = true;
  else if(remainingAfter===1 && g.checkout!=='straight') bust = true;

  if(bust){
    document.getElementById('hra-content').insertAdjacentHTML('afterbegin', '<div class="bust-flash">PŘESTŘELENO!</div>');
    cp.turns.push({darts:g.currentTurn.slice(), total:0, bust:true});
    g.currentTurn = [];
    setTimeout(nextPlayer, 900);
    return;
  }

  cp.turns.push({darts:g.currentTurn.slice(), total:turnTotal, bust:false});
  cp.remaining = remainingAfter;
  g.currentTurn = [];

  if(cp.remaining===0){
    endLeg(cp);
    return;
  }
  nextPlayer();
}

function nextPlayer(){
  const g = STATE.active;
  if(!g) return;
  turnMultiplier = 1;
  g.currentPlayer = (g.currentPlayer+1) % g.players.length;
  saveActive();
  renderPlay();
}

function endLeg(winner){
  const g = STATE.active;
  winner.legsWon += 1;

  const legRecord = {
    legNumber: g.legNumber,
    winner: winner.name,
    players: g.players.map(p=>({
      name:p.name,
      darts: p.turns.reduce((s,t)=>s+t.darts.length,0),
      totalScored: p.turns.reduce((s,t)=>s+t.total,0),
      turns: p.turns
    }))
  };
  g.allLegs.push(legRecord);

  const won = winner.legsWon >= g.legsTo;

  if(won){
    // save to history
    STATE.history.push({
      id: uid(), date: Date.now(), x01: g.x01, checkout: g.checkout, legsTo: g.legsTo,
      winner: winner.name, players: g.players.map(p=>({name:p.name, legsWon:p.legsWon})),
      legs: g.allLegs
    });
    saveHistory();
    showLegResult(winner.name, true);
    STATE.active = null;
    saveActive();
  } else {
    showLegResult(winner.name, false);
    // reset for next leg
    g.legNumber += 1;
    g.currentPlayer = g.players.findIndex(p=>p.id===winner.id) ; // loser/next starts — simple: winner starts next leg alt could rotate
    g.players.forEach(p=>{ p.remaining = g.x01; p.turns = []; });
    g.currentTurn = [];
    saveActive();
  }
}

function showLegResult(winnerName, gameOver){
  const el = document.getElementById('hra-content');
  el.innerHTML = `
    <div class="leg-result">
      <div class="glyph">🎯</div>
      <h3>${gameOver ? 'VÍTĚZSTVÍ!' : 'LEG VYHRÁN'}</h3>
      <p>${escapeHtml(winnerName)} ${gameOver ? 'vyhrává hru' : 'bere tento leg'}</p>
      <button class="btn btn-primary" id="continue-btn">${gameOver ? 'ZPĚT NA START' : 'DALŠÍ LEG'}</button>
    </div>
  `;
  document.getElementById('continue-btn').addEventListener('click', renderHra);
}

function escapeHtml(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

/* ============================================================
   HRÁČI VIEW
   ============================================================ */
function renderPlayers(){
  const list = document.getElementById('players-list');
  if(STATE.players.length===0){
    list.innerHTML = `<div class="empty" style="padding:20px 0;"><div class="glyph">🎯</div><p>Zatím žádní hráči.</p></div>`;
  } else {
    list.innerHTML = STATE.players.map(p=>`
      <div class="player-row">
        <div class="dart-ico">🎯</div>
        <div class="name">${escapeHtml(p.name)}</div>
        <button class="del" data-id="${p.id}">🗑</button>
      </div>`).join('');
    list.querySelectorAll('.del').forEach(b=>b.addEventListener('click', ()=>{
      STATE.players = STATE.players.filter(p=>p.id!==b.dataset.id);
      savePlayers(); renderPlayers();
    }));
  }
}
document.getElementById('add-player-btn').addEventListener('click', addPlayer);
document.getElementById('new-player-name').addEventListener('keydown', e=>{ if(e.key==='Enter') addPlayer(); });
function addPlayer(){
  const inp = document.getElementById('new-player-name');
  const name = inp.value.trim();
  if(!name){ toast('Zadej jméno hráče'); return; }
  STATE.players.push({id:uid(), name});
  inp.value='';
  savePlayers(); renderPlayers();
}

/* ============================================================
   STATISTIKA VIEW
   ============================================================ */
function populateStatSelect(){
  const sel = document.getElementById('stat-player-select');
  sel.innerHTML = STATE.players.map(p=>`<option value="${p.id}">${escapeHtml(p.name)}</option>`).join('');
}
document.getElementById('stat-player-select').addEventListener('change', renderStats);

function renderStats(){
  populateStatSelect();
  const sel = document.getElementById('stat-player-select');
  const content = document.getElementById('stat-content');
  if(STATE.players.length===0){
    content.innerHTML = `<div class="empty"><div class="glyph">📊</div><p>Přidej hráče a odehraj pár her.</p></div>`;
    return;
  }
  const pid = sel.value;
  const pname = (STATE.players.find(p=>p.id===pid)||{}).name;
  let legsPlayed=0, legsWon=0, dartsTotal=0, scoreTotal=0, checkoutsHit=0, legsWithFinish=0, best180=0, bestLegDarts=Infinity, highestCheckout=0;

  STATE.history.forEach(game=>{
    const mePlayer = game.players.find(p=>p.name===pname);
    if(!mePlayer) return;
    game.legs.forEach(leg=>{
      const me = leg.players.find(p=>p.name===pname);
      if(!me) return;
      legsPlayed++;
      dartsTotal += me.darts;
      scoreTotal += me.totalScored;
      if(leg.winner===pname){
        legsWon++;
        bestLegDarts = Math.min(bestLegDarts, me.darts);
        const lastTurn = me.turns[me.turns.length-1];
        if(lastTurn && !lastTurn.bust){
          highestCheckout = Math.max(highestCheckout, lastTurn.total);
        }
      }
      me.turns.forEach(t=>{ if(t.total>best180) best180=t.total; });
    });
  });

  const avg3 = dartsTotal>0 ? (scoreTotal/dartsTotal*3).toFixed(1) : '0.0';
  const winPct = legsPlayed>0 ? Math.round(legsWon/legsPlayed*100) : 0;

  content.innerHTML = `
    <div class="stat-grid">
      <div class="stat-card"><div class="val">${avg3}</div><div class="lbl">Průměr / 3 šipky</div></div>
      <div class="stat-card"><div class="val">${legsPlayed}</div><div class="lbl">Odehráno legů</div></div>
      <div class="stat-card"><div class="val">${legsWon}</div><div class="lbl">Vyhráno legů</div></div>
      <div class="stat-card"><div class="val">${winPct}%</div><div class="lbl">Úspěšnost</div></div>
      <div class="stat-card"><div class="val">${best180||'—'}</div><div class="lbl">Nejlepší kolo</div></div>
      <div class="stat-card"><div class="val">${bestLegDarts===Infinity?'—':bestLegDarts}</div><div class="lbl">Nejrychlejší leg (šipky)</div></div>
      <div class="stat-card"><div class="val">${highestCheckout||'—'}</div><div class="lbl">Nejvyšší zavření</div></div>
      <div class="stat-card"><div class="val">${dartsTotal}</div><div class="lbl">Šipek celkem</div></div>
    </div>
  `;
}

/* ============================================================
   HISTORIE VIEW
   ============================================================ */
function renderHistory(){
  const el = document.getElementById('hist-list');
  if(STATE.history.length===0){
    el.innerHTML = `<div class="empty"><div class="glyph">🕓</div><p>Historie her je zatím prázdná.</p></div>`;
    return;
  }
  const items = STATE.history.slice().reverse();
  el.innerHTML = items.map(g=>{
    const date = new Date(g.date).toLocaleDateString('cs-CZ', {day:'numeric', month:'numeric', year:'numeric', hour:'2-digit', minute:'2-digit'});
    return `
    <div class="hist-item" data-id="${g.id}">
      <div class="row1"><span>${date}</span><span>${g.x01} · ${g.checkout==='double'?'Double Out':g.checkout==='master'?'Master Out':'Straight Out'}</span></div>
      <div class="row2"><span class="winner">🏆 ${escapeHtml(g.winner)}</span><span class="mode">${g.players.map(p=>escapeHtml(p.name)+' '+p.legsWon).join(' : ')}</span></div>
      <div class="hist-detail">
        ${g.legs.map(leg=>`
          <div class="prow"><b>Leg ${leg.legNumber}</b><span>vítěz: ${escapeHtml(leg.winner)}</span></div>
          ${leg.players.map(p=>`<div class="prow"><span>${escapeHtml(p.name)}</span><span>${p.darts} šipek · ${p.darts>0?(p.totalScored/p.darts*3).toFixed(1):'0.0'} pr.</span></div>`).join('')}
        `).join('<div style="height:8px;"></div>')}
      </div>
    </div>`;
  }).join('');
  el.querySelectorAll('.hist-item').forEach(it=>it.addEventListener('click', ()=>it.classList.toggle('open')));
}

/* ============================================================
   NASTAVENÍ VIEW
   ============================================================ */
function renderSettings(){
  const tR = document.getElementById('toggle-random');
  const tS = document.getElementById('toggle-sound');
  tR.classList.toggle('on', !!STATE.settings.random);
  tS.classList.toggle('on', !!STATE.settings.sound);
}
document.getElementById('toggle-random').addEventListener('click', ()=>{
  STATE.settings.random = !STATE.settings.random; saveSettings(); renderSettings();
});
document.getElementById('toggle-sound').addEventListener('click', ()=>{
  STATE.settings.sound = !STATE.settings.sound; saveSettings(); renderSettings();
});
document.getElementById('reset-data-btn').addEventListener('click', async ()=>{
  if(!confirm('Opravdu smazat všechny hráče, historii i rozehranou hru?')) return;
  STATE.players=[]; STATE.history=[]; STATE.active=null;
  await savePlayers(); await saveHistory(); await saveActive();
  toast('Data smazána'); renderPlayers(); renderHistory(); renderHra();
});

/* ============================================================
   INIT
   ============================================================ */
(async function init(){
  await loadAll();
  renderHra();
  renderPlayers();
})();
</script>
